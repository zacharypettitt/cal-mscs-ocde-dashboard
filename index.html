// ── Stacked Bar Chart (no external library) ──────────────────────────────────
function StackedBarChart({data,height=260}){
  const maxVal=Math.max(1,...data.map(d=>Math.max((d.Contract||0)+(d.Carryover||0),d['Actual Spend']||0)));
  const barH=height-70;const N=data.length;const W=600;const lp=56;const rp=10;

    <svg width="100%" height={height} viewBox={`0 0 ${W} ${height}`} preserveAspectRatio="xMidYMid meet" style={{display:'block'}}>
      {[0,0.25,0.5,0.75,1].map(f=>{
        const y=12+barH*(1-f);const val=Math.round(maxVal*f);
        return(<g key={f}><line x1={lp} y1={y} x2={W-rp} y2={y} stroke="#E2E8F0" strokeWidth="1"/><text x={lp-5} y={y+4} textAnchor="end" fontSize="10" fill="#94A3B8">{val>=1000?'$'+(val/1000).toFixed(0)+'k':'$'+val}</text></g>);
      })}
      {data.map((d,i)=>{
        const gx=lp+i*gw;const cx=gx+gw/2;
        const cH=Math.max(0,Math.round(barH*((d.Contract||0)/maxVal)));
        const cvH=Math.max(0,Math.round(barH*((d.Carryover||0)/maxVal)));
        const aH=Math.max(0,Math.round(barH*((d['Actual Spend']||0)/maxVal)));
        const totalH=cH+cvH;const bottom=12+barH;
        const bx1=cx-bw-gap/2;const bx2=cx+gap/2;
        return(
          <g key={i}>
            <rect x={gx+1} y={8} width={gw-2} height={barH+8} fill={i%2===0?'rgba(241,245,249,0.6)':'transparent'} rx="6"/>
            <line x1={gx} y1={0} x2={gx} y2={barH+20} stroke={i>0?'#E2E8F0':'none'} strokeWidth="1"/>
            {totalH>0&&<>

              {cvH>0&&<rect x={bx1} y={bottom-totalH} width={bw} height={cvH} fill="#F59E0B" rx="3"/>}

            </>}
            {aH>0&&<>
              <rect x={bx2} y={bottom-aH} width={bw} height={aH} fill="#1D4ED8" rx="3"/>
              <text x={bx2+bw/2} y={bottom-aH-5} textAnchor="middle" fontSize="9" fill="#1D4ED8">{(d['Actual Spend']||0)>=1000?'$'+((d['Actual Spend']||0)/1000).toFixed(0)+'k':('$'+(d['Actual Spend']||0))}</text>

  );
}

// ── Shared fiscal calculations — single source of truth for carryover ────────
// Chains contract + carryover forward year over year using ONLY BUDGET.contract
// (the firm, planned contract amount) and actual transaction data (0110029 +
// 0110030). Both Overview and the Multi-Year Carryover view call this same
// function so they can never drift apart again.
function computeFiscalChain(txns){
  const actualByFY={};
  txns.forEach(t=>{
    if(t.account==='0110029'||t.account==='0110030'){
      actualByFY[t.fy]=(actualByFY[t.fy]||0)+t.amt;
    }
  });
  const nowFY=activeGrantFY();
  let carryIn=0;
  return FY_LIST.map(fy=>{
    const b=BUDGET[fy]||{contract:0};
    const contract=b.contract||0;
    const available=contract+carryIn;
    const actual=actualByFY[fy]||0;
    const carryOut=available-actual;
    const row={fy,contract,carryoverIn:carryIn,available,actual,carryoverOut:carryOut,
      isPast:fy<nowFY,isCurrent:fy===nowFY,isFuture:fy>nowFY};
    carryIn=carryOut;
    return row;
  });
}

// COE Reimbursement net position — tracked separately from the primary grant
// contract on purpose. This is pass-through reimbursement money (0110237
// revenue vs 0110238 expense), not CDE contract funds, so it is NOT folded
// into the primary carryover chain above. It's a rolling cumulative balance
// (not reset by fiscal year) since any surplus simply sits in the account.
function computeCoeNetPosition(txns){
  const rev=txns.filter(t=>t.account==='0110237'&&t.sacs_group==='8xxx').reduce((s,t)=>s+t.amt,0);
  const exp=txns.filter(t=>t.account==='0110238').reduce((s,t)=>s+t.amt,0);
  return{rev,exp,net:rev-exp};
}

// ── Payment trigger auto-detection ────────────────────────────────────────────
// Each trigger threshold lives in the structured triggerAmt field (the trigger
// text is display-only and safe to reword). Thresholds are 75% of the PRIOR
// payment's amount. We compare against
// real cumulative primary-allocation spend (0110029+0110030) and real
// cumulative allocation cash received to auto-detect status.
// CASH FILTER (confirmed 2026-07): main allocation payments arrive as CR
// "DEPOSITS" entries in 0110028 (e.g. Pmt 1 on 6/28/2024, Pmts 2+3 combined
// from San Joaquin COE on 6/30/2026). AR entries in 0110028 are OTHER revenue
// (registrations, misc receivables, and known mispostings that belong in
// 0110237) — they are EXCLUDED here and are pending journal-entry corrections
// in the source ledger. Re-verify this pattern when the next allocation
// payment lands.
// NOTE: we deliberately do NOT silently overwrite the manually-recorded status
// on PAYMENTS — real-world cash timing (partial deposits, misposted entries,
// combined payments) can't always be reconstructed perfectly from ledger sums
// alone. Instead we compute a live estimate and flag it wherever it disagrees
// with the recorded status, so a human can confirm rather than auto-trusting
// a formula on compliance-sensitive figures.
function computePaymentReconciliation(txns){
  const cashReceived=txns.filter(t=>t.account==='0110028'&&t.sacs_group==='8xxx'&&t.type==='CR').reduce((s,t)=>s+t.amt,0);
  const primarySpend=txns.filter(t=>t.account==='0110029'||t.account==='0110030').reduce((s,t)=>s+t.amt,0);
  let cumPayments=0,cumTrigger=0;
  return PAYMENTS.map((p,i)=>{
    cumPayments+=p.amt;
    if(i>0&&p.triggerType==='spend') cumTrigger+=p.triggerAmt||0;
    const cashCovers=cashReceived>=cumPayments;
    const triggerMet=primarySpend>=cumTrigger;
    // Report-triggered payments (e.g. Pmt 9, final expense report) never
    // auto-advance to 'ready' on spend alone — approval is a human milestone.
    const estimatedStatus=cashCovers?'received':(p.triggerType==='report'?'pending':(triggerMet?'ready':'pending'));
    return{...p,cumPayments,cumTrigger,estimatedStatus,mismatch:estimatedStatus!==p.status&&!(estimatedStatus==='ready'&&p.status==='future')&&!(estimatedStatus==='pending'&&p.status==='future')};
  });
}

const fmt=n=>"$"+Math.abs(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
// Signed variant for cells where a negative is a real deficit/overage, not
// routine variance — parentheses make direction unambiguous without relying
// on color alone (fmt strips signs by design for lighter contexts).
const fmtSigned=n=>n<0?'('+fmt(n)+')':fmt(n);
const fmtK=n=>n>=1000?"$"+(n/1000).toFixed(0)+"k":fmt(n);
const pct=(a,b)=>b?((a/b)*100).toFixed(1)+"%":"—";

// ── CSV Parser ────────────────────────────────────────────────────────────────
function parseCSVtoTxns(text){
  const lines=text.trim().split(/\r?\n/);
  if(lines.length<2) return [];
  const headers=lines[0].split(',').map(h=>h.replace(/^"|"$/g,'').trim());
  const streamMap={"0110028":"primary","0110029":"primary","0110237":"coe","0110238":"coe"};
  const flowMap={"0110028":"revenue","0110029":"expense","0110237":"revenue","0110238":"expense"};
  const sacsLabel={"1000s":"Certificated Salaries","2000s":"Classified Salaries","3000s":"Employee Benefits","4000s":"Books & Supplies","5000s":"Services & Operating","5100s":"Subagreements","5200s":"Travel & Conference","6000s":"Capital Outlay","7000s":"Indirect Costs","8xxx":"Revenue","9xxx":"Balance Sheet","Other":"Other","Unknown":"Unknown"};
  function sacsGroup(obj){const o=parseInt(obj||"0");if(isNaN(o))return"Unknown";if(o>=1000&&o<=1999)return"1000s";if(o>=2000&&o<=2999)return"2000s";if(o>=3000&&o<=3999)return"3000s";if(o>=4000&&o<=4999)return"4000s";if(o>=5100&&o<=5199)return"5100s";if(o>=5200&&o<=5299)return"5200s";if(o>=5000&&o<=5999)return"5000s";if(o>=6000&&o<=6999)return"6000s";if(o>=7000&&o<=7999)return"7000s";if(o>=8000&&o<=8999)return"8xxx";if(o>=9000&&o<=9999)return"9xxx";return"Other";}
  function parseLine(line){const fields=[];let cur='',inQ=false;for(const c of line){if(c==='"'){inQ=!inQ;}else if(c===','&&!inQ){fields.push(cur.trim());cur='';}else{cur+=c;}}fields.push(cur.trim());return fields;}
  function clean(v){return(v||'').replace(/^="?|"?$/g,'').trim();}
  function toISO(d){const m=(d||'').match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);return m?`${m[3]}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`:(d||'');}
  function toFY(s){const m=(s||'').match(/(\d{4})-(\d{2})/);if(!m)return'Unknown';const yr=+m[1],mo=+m[2];return mo<7?`FY${String(yr-1).slice(-2)}/${String(yr).slice(-2)}`:`FY${String(yr).slice(-2)}/${String(yr+1).slice(-2)}`;}
  const results=[];
  for(let i=1;i<lines.length;i++){
    if(!lines[i].trim()) continue;
    const fields=parseLine(lines[i]);const row={};
    headers.forEach((h,j)=>row[h]=fields[j]||'');
    const rowNum=parseInt(row['RowNum'])||i;
    const acct=clean(row['KEY']||row['Pseudo']||'').replace(/[^0-9]/g,'');
    if(!acct) continue;
    const obj=clean(row['OBJ']||row['Object']||'');
    const date=toISO(row['TRANS_DATE']||row['Date']||'');
    const amt=parseFloat((row['AMT']||row['Amount']||'0').replace(/[,$]/g,''))||0;
    const sg=sacsGroup(obj);
    results.push({id:`${acct}-${rowNum}-imp`,account:acct,stream:streamMap[acct]||'primary',flow:flowMap[acct]||'expense',date,fy:toFY(date),desc:(row['TRANS_DESC']||row['Trans Desc']||'').trim().slice(0,80),type:(row['TRANS_TYPE']||row['Tp']||'').trim(),ref:(row['REF']||row['Primary Ref']||'').trim(),amt,obj,obj_desc:(row['OBJ_DESC']||'').trim(),sacs_group:sg,sacs_label:sacsLabel[sg]||sg,ck:clean(row['CK_NO']||row['Check No']||'')});
  }
  return results;
}

// ── Shared UI ─────────────────────────────────────────────────────────────────
function KpiCard({label,value,sub,color,accent}){
  const style={background:'white',borderRadius:'8px',border:'1px solid #E2E8F0',padding:'16px',display:'flex',flexDirection:'column',gap:'4px'};
  if(accent) style.borderLeft=`4px solid ${accent}`;
  return <div style={style}><span style={{fontSize:'11px',fontWeight:'600',color:'#64748B',textTransform:'uppercase',letterSpacing:'0.05em'}}>{label}</span><span style={{fontSize:'22px',fontWeight:'700',color:color||'#1E293B'}}>{value}</span>{sub&&<span style={{fontSize:'11px',color:'#94A3B8'}}>{sub}</span>}</div>;
}

function StatusBadge({status}){
  const m={received:{bg:'#D1FAE5',color:'#065F46',l:'Received'},ready:{bg:'#DBEAFE',color:'#1D4ED8',l:'Ready to Invoice'},pending:{bg:'#FEF3C7',color:'#92400E',l:'Pending Approval'},future:{bg:'#F3F4F6',color:'#374151',l:'Future'}};
  const s=m[status]||m.future;
  return <span style={{padding:'2px 10px',borderRadius:'20px',fontSize:'11px',fontWeight:'700',background:s.bg,color:s.color}}>{s.l}</span>;
}

function Alert({type,children}){
  const s={warn:{bg:'#FFF7ED',border:'#FED7AA',text:'#92400E'},info:{bg:'#EFF6FF',border:'#BFDBFE',text:'#1E40AF'},success:{bg:'#ECFDF5',border:'#A7F3D0',text:'#065F46'},danger:{bg:'#FEF2F2',border:'#FECACA',text:'#991B1B'}};
  const st=s[type]||s.warn;
  return <div style={{background:st.bg,border:`1px solid ${st.border}`,borderRadius:'8px',padding:'12px 16px',fontSize:'13px',color:st.text}}>{children}</div>;
}

function AcctBadge({account}){
  const p=['0110028','0110029'].includes(account);
  return <span style={{padding:'2px 6px',borderRadius:'4px',fontSize:'11px',fontFamily:'monospace',fontWeight:'600',background:p?'#DBEAFE':'#FEF3C7',color:p?'#1D4ED8':'#92400E'}}>{account}</span>;
}

function SortIcon({col,sortCol,sortDir}){
  if(col!==sortCol) return <span style={{color:'#CBD5E1',fontSize:'10px'}}>↕</span>;
  return <span style={{fontSize:'10px',color:'#1D4ED8'}}>{sortDir==='asc'?'↑':'↓'}</span>;
}

// ── Overview Tab ─────────────────────────────────────────────────────────────

  const [showDone,setShowDone]=useState(false);
  const [editId,setEditId]=useState(null);
  const [assigneeFilter,setAssigneeFilter]=useState('all'); // 'all' | 'me' | 'unassigned'
  const [form,setForm]=useState({title:'',body:'',cat:'general',priority:'medium',assignedTo:'',dueDate:''});
  const [editForm,setEditForm]=useState({});
  const unverifiedCount=useMemo(()=>txns.filter(t=>{const tags=auditTags[t.id]||[];return!tags.includes('verified');}).length,[txns,auditTags]);

  const memberByUid=useMemo(()=>{const m={};(teamMembers||[]).forEach(u=>{m[u.uid]=u;});return m;},[teamMembers]);
  function assigneeName(uid){if(!uid)return null;const u=memberByUid[uid];return u?(u.displayName||u.email):'Unknown user';}
  function assigneePhoto(uid){const u=memberByUid[uid];return u?u.photoURL:null;}

  const allActive=todos.filter(t=>!t.done).sort((a,b)=>({high:0,medium:1,low:2}[a.priority]||1)-({high:0,medium:1,low:2}[b.priority]||1));
  const allDone=todos.filter(t=>t.done);
  function applyAssigneeFilter(list){
    if(assigneeFilter==='me') return list.filter(t=>t.assignedTo===currentUid);
    if(assigneeFilter==='unassigned') return list.filter(t=>!t.assignedTo);
    return list;
  }
  const active=applyAssigneeFilter(allActive);
  const done=applyAssigneeFilter(allDone);
  const myOpenCount=allActive.filter(t=>t.assignedTo===currentUid).length;
  const unassignedOpenCount=allActive.filter(t=>!t.assignedTo).length;

  const priDot={high:'#EF4444',medium:'#F59E0B',low:'#94A3B8'};
  const today=new Date().toISOString().slice(0,10);
  function toggle(id){
    const t=todos.find(x=>x.id===id);if(!t)return;
    const nowDone=!t.done;
    setTodos(ts=>ts.map(x=>x.id===id?{...x,done:nowDone,completedAt:nowDone?today:undefined}:x));
    logActivity(nowDone?'todo_completed':'todo_reopened',`${nowDone?'Completed':'Reopened'}: "${t.title}"`,{todoId:id});
  }
  function del(id){
    const t=todos.find(x=>x.id===id);
    setTodos(ts=>ts.filter(x=>x.id!==id));
    if(t) logActivity('todo_deleted',`Deleted to-do: "${t.title}"`,{todoId:id,category:t.cat});
  }
  function add(){
    if(!form.title.trim())return;
    setTodos(ts=>[...ts,{id:'u'+Date.now(),...form,done:false,createdAt:today}]);

            <button onClick={()=>setShowDone(v=>!v)} style={{background:'none',border:'none',cursor:'pointer',color:'#64748B',fontSize:'13px',fontWeight:'600',display:'flex',alignItems:'center',gap:'6px',padding:'4px 0'}}>{showDone?'v':'>'}  Completed ({done.length})</button>
            {showDone&&<div style={{marginTop:'8px',display:'flex',flexDirection:'column',gap:'5px'}}>{done.map(todo=>(
              <div key={todo.id} style={{background:'#F8FAFC',borderRadius:'10px',padding:'9px 14px',display:'flex',gap:'10px',alignItems:'center'}}>
                {canEdit&&<button onClick={()=>toggle(todo.id)} style={{width:'18px',height:'18px',borderRadius:'3px',border:'none',background:'#10B981',color:'white',cursor:'pointer',fontSize:'11px',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>v</button>}
                <span style={{fontSize:'12px',color:'#94A3B8',textDecoration:'line-through',flex:1}}>{todo.title}</span>
                {todo.assignedTo&&<span style={{display:'flex',alignItems:'center',gap:'4px',fontSize:'11px',color:'#CBD5E1'}}><AssigneeAvatar uid={todo.assignedTo} size={14}/>{assigneeName(todo.assignedTo)}</span>}
                <span style={{fontSize:'11px',color:'#CBD5E1'}}>Done {todo.completedAt}</span>
                {canEdit&&<button onClick={()=>del(todo.id)} style={{background:'none',border:'none',color:'#E2E8F0',cursor:'pointer',fontSize:'14px'}} onMouseOver={e=>e.target.style.color='#EF4444'} onMouseOut={e=>e.target.style.color='#E2E8F0'}>x</button>}
              </div>
            ))}</div>}
          </div>
        )}
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:'11px'}}>
        {ended&&<div style={{background:'#F1F5F9',border:'1px solid #CBD5E1',borderRadius:'12px',padding:'12px 16px'}}>
          <div style={{fontSize:'12px',fontWeight:'700',color:'#475569'}}>Grant period ended June 30, 2027</div>
          <div style={{fontSize:'11px',color:'#64748B',marginTop:'3px'}}>Figures below reflect the final grant year ({activeFY}). Closeout reporting may still be in progress.</div>
        </div>}
        {readyAmt>0&&<div style={{background:'#1D4ED8',borderRadius:'12px',padding:'16px',color:'white'}}>
          <div style={{fontSize:'10px',fontWeight:'700',opacity:.8,letterSpacing:'0.06em',marginBottom:'4px'}}>READY TO INVOICE — PRIMARY ALLOCATION</div>
          <div style={{fontSize:'22px',fontWeight:'700'}}>{fmt(readyAmt)}</div>
          <div style={{fontSize:'11px',opacity:.75,marginTop:'3px'}}>{readyCount} payment{readyCount!==1?'s':''} · spending triggers met</div>
        </div>}
        {paymentMismatchCount>0&&(
          <button onClick={onJumpToAllocation} style={{background:'#FFFBEB',border:'2px solid #FDE68A',borderRadius:'12px',padding:'14px 16px',textAlign:'left',cursor:'pointer',display:'flex',gap:'10px',alignItems:'flex-start'}}>
            <span style={{fontSize:'18px',flexShrink:0}}>⚠️</span>
            <div>
              <div style={{fontWeight:'700',color:'#92400E',fontSize:'13px'}}>{paymentMismatchCount} payment status{paymentMismatchCount!==1?'es':''} may be out of date</div>
              <div style={{fontSize:'11px',color:'#78350F',marginTop:'3px',lineHeight:'1.4'}}>Recent transactions suggest the Allocation Schedule needs review. Click to check →</div>
            </div>
          </button>
        )}
        {owedAmt>0&&<div style={{background:'#92400E',borderRadius:'12px',padding:'16px',color:'white'}}>
          <div style={{fontSize:'10px',fontWeight:'700',opacity:.85,letterSpacing:'0.06em',marginBottom:'4px'}}>OWED BY COE — PARTNER REIMBURSEMENTS</div>
          <div style={{fontSize:'22px',fontWeight:'700'}}>{fmt(owedAmt)}</div>
          <div style={{fontSize:'11px',opacity:.8,marginTop:'3px'}}>{owedCount} payment{owedCount!==1?'s':''} paid, not yet invoiced to COE</div>
        </div>}
        <div style={{background:'white',borderRadius:'12px',border:'1px solid #E2E8F0',padding:'14px'}}>
          <div style={{fontSize:'10px',fontWeight:'700',color:'#64748B',letterSpacing:'0.06em',marginBottom:'10px'}}>PRIMARY ALLOCATION — {activeFY}</div>
          {[['Total contract (5 yrs)',fmt(CONTRACT_TOTAL_DISPLAY)],['Spent to date',fmt(totalExp1)],[`${activeFY} budget available`,fmt(curContract)],[`${activeFY} spent`,fmt(curSpentThisYear)],['Unspent this year',fmt(curUnspent)]].map(([l,v],i)=>(
            <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'3px 0',borderTop:i>0?'1px solid #F8FAFC':'none',fontSize:'12px'}}><span style={{color:'#64748B'}}>{l}</span><span style={{fontWeight:i===4?'700':'500',color:i===4?(curUnspent<0?'#DC2626':'#D97706'):'#1E293B'}}>{v}</span></div>
          ))}
          {CONTRACT_TOTAL_MATCHES?(
            <div style={{fontSize:'10px',color:'#059669',marginTop:'6px'}}>✓ Matches sum of BUDGET contract amounts</div>
          ):(
            <div style={{fontSize:'10px',color:'#D97706',marginTop:'6px'}}>⚠ BUDGET totals {fmt(BUDGET_TOTAL_CONTRACT)} — differs from displayed total, review needed</div>
          )}
        </div>
        <div style={{background:'white',borderRadius:'12px',border:'1px solid #E2E8F0',padding:'14px'}}>
          <div style={{fontSize:'10px',fontWeight:'700',color:'#64748B',letterSpacing:'0.06em',marginBottom:'10px'}}>COE REIMBURSEMENT ({activeFY})</div>
          {[['Revenue received',fmt(fy.rev2||0)],['Expenses paid out',fmt(fy.exp2||0)],['Net balance',fmt((fy.rev2||0)-(fy.exp2||0))]].map(([l,v],i)=>(
            <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'3px 0',borderTop:i>0?'1px solid #F8FAFC':'none',fontSize:'12px'}}><span style={{color:'#64748B'}}>{l}</span><span style={{fontWeight:i===2?'700':'500',color:i===2?((fy.rev2||0)-(fy.exp2||0)>=0?'#059669':'#DC2626'):'#1E293B'}}>{v}</span></div>
          ))}
          <div style={{display:'flex',justifyContent:'space-between',padding:'7px 0 2px',marginTop:'4px',borderTop:'1px dashed #E2E8F0',fontSize:'11px'}}>
            <span style={{color:'#94A3B8'}}>Cumulative net position (all years)</span>
            <span style={{fontWeight:'700',color:coeNet.net>=0?'#059669':'#DC2626'}}>{fmt(coeNet.net)}</span>
          </div>
          <div style={{fontSize:'10px',color:'#CBD5E1',marginTop:'2px'}}>Tracked separately — pass-through funds, not part of primary contract</div>
        </div>
        <div style={{background:'white',borderRadius:'12px',border:'1px solid #E2E8F0',padding:'14px'}}>
          <div style={{fontSize:'10px',fontWeight:'700',color:'#64748B',letterSpacing:'0.06em',marginBottom:'10px'}}>GRANT TIMELINE</div>
          {timeline.map(t=>(
            <div key={t.fy} style={{display:'flex',alignItems:'center',gap:'7px',padding:'3px 0',fontSize:'12px'}}>
              <span style={{display:'inline-block',width:'7px',height:'7px',borderRadius:'50%',background:t.dot,flexShrink:0}}/><span style={{color:'#334155',fontWeight:t.status==='Active'?'700':'400'}}>{t.fy}</span><span style={{marginLeft:'auto',fontSize:'11px',color:t.status==='Active'?'#059669':'#94A3B8',fontWeight:t.status==='Active'?'700':'400'}}>{t.status}</span>
            </div>
          ))}
        </div>
      </div>
      </div>
    </div>
  );
}

// ── Account Usage Guide (editable, managers only) ─────────────────────────────
function AccountGuide({guide,setGuide,userRole}){
  const canManage=userRole==='director'||userRole==='admin_support';
  const [editing,setEditing]=useState(false);
  const [draft,setDraft]=useState(guide);
  useEffect(()=>{if(!editing)setDraft(guide);},[guide,editing]);
  function save(){setGuide(draft);setEditing(false);logActivity('tag_changed','Updated the account usage guide',{});}
  const rows=editing?draft:guide;
  const td={padding:'11px 14px',fontSize:'13px',color:'#334155',borderBottom:'1px solid #F1F5F9',verticalAlign:'top'};
  const th={padding:'10px 14px',fontSize:'11px',fontWeight:'700',color:'#64748B',textTransform:'uppercase',letterSpacing:'0.04em',textAlign:'left',background:'#F8FAFC',borderBottom:'1px solid #E2E8F0'};
  const inp={border:'1px solid #E2E8F0',borderRadius:'6px',padding:'6px 8px',width:'100%',fontSize:'13px'};
  function upd(i,field,val){setDraft(d=>d.map((r,idx)=>idx===i?{...r,[field]:val}:r));}
  return(
    <div style={{background:'white',borderRadius:'16px',border:'1px solid #E2E8F0',padding:'20px',marginTop:'2px'}}>
      <div style={{display:'flex',alignItems:'center',marginBottom:'14px'}}>
        <div>
          <h3 style={{fontSize:'15px',fontWeight:'700',color:'#1E293B',margin:0}}>Account Usage Guide</h3>
          <p style={{fontSize:'12px',color:'#64748B',margin:'2px 0 0'}}>When to use each SACS account. {canManage?'Editable — keep this current for your team.':''}</p>
        </div>
        {canManage&&!editing&&<button onClick={()=>setEditing(true)} style={{marginLeft:'auto',background:'#EFF6FF',border:'1px solid #BFDBFE',borderRadius:'8px',padding:'7px 14px',fontSize:'13px',fontWeight:'600',color:'#1D4ED8',cursor:'pointer'}}>Edit Guide</button>}
        {canManage&&editing&&(
          <div style={{marginLeft:'auto',display:'flex',gap:'8px'}}>
            <button onClick={()=>{setEditing(false);setDraft(guide);}} style={{background:'white',border:'1px solid #E2E8F0',borderRadius:'8px',padding:'7px 14px',fontSize:'13px',fontWeight:'600',color:'#64748B',cursor:'pointer'}}>Cancel</button>
            <button onClick={save} style={{background:'#1D4ED8',border:'none',borderRadius:'8px',padding:'7px 14px',fontSize:'13px',fontWeight:'700',color:'white',cursor:'pointer'}}>Save Guide</button>
          </div>
        )}
      </div>
      <div style={{border:'1px solid #E2E8F0',borderRadius:'12px',overflow:'hidden'}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr><th style={{...th,width:'110px'}}>Account</th><th style={{...th,width:'170px'}}>Name</th><th style={th}>When to use it</th></tr></thead>
          <tbody>
            {rows.map((r,i)=>(
              <tr key={r.account}>
                <td style={{...td,fontFamily:'monospace',fontWeight:'700',color:'#0F172A'}}>{r.account}</td>
                <td style={td}>{editing?<input value={r.title} onChange={e=>upd(i,'title',e.target.value)} style={inp}/>:<span style={{fontWeight:'600'}}>{r.title}</span>}</td>
                <td style={td}>{editing?<textarea value={r.when} onChange={e=>upd(i,'when',e.target.value)} rows={2} style={{...inp,resize:'vertical'}}/>:r.when}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ── Budget vs Actual Tab ─────────────────────────────────────────────────────
function BudgetTab({txns,amendments,setAmendments}){
  const [selFY,setSelFY]=useState(()=>activeGrantFY());
  const [showForm,setShowForm]=useState(false);
  const [newA,setNewA]=useState({date:'',category:'',description:'',amount:''});
  const bud=BUDGET[selFY]||BUDGET['FY25/26'];

  // Single source of truth for carryover — same chain used by Overview & Multi-Year
  const fiscalChain=useMemo(()=>computeFiscalChain(txns),[txns]);
  const chainRow=fiscalChain.find(r=>r.fy===selFY);

  // Per-year actuals
  const actuals=useMemo(()=>{
    const m={};
    txns.filter(t=>t.fy===selFY&&(t.account==='0110029'||t.account==='0110030')).forEach(t=>{m[t.sacs_group]=(m[t.sacs_group]||0)+t.amt;});
    return m;
  },[txns,selFY]);

  // All-years actuals (for combined view) — includes indirect costs (0110030), same scope as per-year actuals above
  const allActuals=useMemo(()=>{
    const m={};
    txns.filter(t=>t.account==='0110029'||t.account==='0110030').forEach(t=>{m[t.sacs_group]=(m[t.sacs_group]||0)+t.amt;});
    return m;
  },[txns]);
  const allBudget=useMemo(()=>{
    const m={};
    Object.values(BUDGET).forEach(b=>b.lines.forEach(l=>{m[l.code]=(m[l.code]||0)+l.budget;}));
    return m;
  },[]);

  const totalActual=bud.lines.reduce((s,l)=>s+(actuals[l.code]||0),0);
  const totalAllActual=Object.values(allActuals).reduce((a,b)=>a+b,0);

  const th={padding:'10px 16px',fontSize:'11px',fontWeight:'700',color:'#64748B',textTransform:'uppercase',letterSpacing:'0.05em',textAlign:'left',background:'#F8FAFC',borderBottom:'1px solid #E2E8F0'};
  const td={padding:'10px 16px',fontSize:'13px',color:'#334155',borderBottom:'1px solid #F8FAFC'};
  const allYears=selFY==='ALL';

  return(
    <div style={{display:'flex',flexDirection:'column',gap:'20px'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'10px'}}>
        <h2 style={{fontSize:'16px',fontWeight:'700',color:'#0F172A',margin:0}}>
          {allYears?'All Years Combined — Primary Expenses (0110029)':'Budget vs. Actual — Primary Expenses (0110029)'}
        </h2>
        <div style={{display:'flex',gap:'5px',flexWrap:'wrap'}}>
          {[...FY_LIST,'ALL'].map(fy=>(
            <button key={fy} onClick={()=>setSelFY(fy)}
              style={{padding:'6px 12px',borderRadius:'6px',fontSize:'13px',fontWeight:'600',border:'1px solid',cursor:'pointer',
                background:selFY===fy?'#1D4ED8':'white',color:selFY===fy?'white':'#64748B',borderColor:selFY===fy?'#1D4ED8':'#E2E8F0'}}>
              {fy==='ALL'?'All Years':fy}
            </button>
          ))}
        </div>
      </div>

      {!allYears&&chainRow&&(()=>{
        const overPlanAmt=totalActual-bud.contract;
        const overAvailableAmt=totalActual-chainRow.available;
        return(
          <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
            {chainRow.carryoverIn>0&&<Alert type="info"><strong>{selFY}</strong> includes <strong>{fmt(chainRow.carryoverIn)}</strong> carryover from prior-year underspend. Combined available: <strong>{fmt(chainRow.available)}</strong></Alert>}
            {overPlanAmt>0&&(
              overAvailableAmt<=0?(
                <Alert type="success">Actual spend of <strong>{fmt(totalActual)}</strong> is <strong>{fmt(overPlanAmt)}</strong> over the <strong>{fmt(bud.contract)}</strong> submitted budget plan — but this is fully covered by <strong>{fmt(chainRow.carryoverIn)}</strong> in carryover from prior-year underspend. Total spending remains within the <strong>{fmt(chainRow.available)}</strong> available for {selFY}. Category-level "over budget" flags below reflect the submitted plan only, not this carryover buffer.</Alert>
              ):(
                <Alert type="warn">Actual spend of <strong>{fmt(totalActual)}</strong> exceeds not just the {fmt(bud.contract)} submitted plan but the full <strong>{fmt(chainRow.available)}</strong> available for {selFY} (plan + carryover) by <strong>{fmt(overAvailableAmt)}</strong>. This is a genuine overage, not carryover coverage — worth review.</Alert>
              )
            )}
          </div>
        );
      })()}

      {/* Single-year view */}
      {!allYears&&<p style={{fontSize:'11px',color:'#94A3B8',margin:'0'}}>Category budgets below reflect the submitted plan only and do not include carryover — see the note above for how total-year spending compares once carryover is included.</p>}
      {!allYears&&<div style={{background:'white',borderRadius:'12px',border:'1px solid #E2E8F0',overflow:'hidden'}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr>
            <th style={th}>SACS Category</th>
            <th style={{...th,textAlign:'right'}}>Budgeted</th>
            <th style={{...th,textAlign:'right'}}>Actual</th>
            <th style={{...th,textAlign:'right'}}>Variance</th>
            <th style={{...th,textAlign:'right'}}>Var %</th>
            <th style={{...th,width:'140px'}}>Utilization</th>
          </tr></thead>
          <tbody>{bud.lines.map(line=>{
            const act=actuals[line.code]||0,v=act-line.budget;
            const u=line.budget>0?Math.min(110,(act/line.budget)*100):0;
            const overBudget=line.budget>0&&v>line.budget*0.10; // only flag OVER budget
            return(
              <tr key={line.code} style={{background:'white'}}>
                <td style={td}><div style={{display:'flex',alignItems:'center',gap:'8px'}}>
                  {overBudget&&<span title="Over budget by >10%">⚠️</span>}
                  <span>{line.label}</span>
                  {line.code==='7000s'&&act===0&&<span style={{padding:'1px 6px',background:'#FEE2E2',color:'#991B1B',borderRadius:'4px',fontSize:'11px',fontWeight:'700'}}>$0 charged</span>}
                </div></td>
                <td style={{...td,textAlign:'right'}}>{line.budget>0?fmt(line.budget):'—'}</td>
                <td style={{...td,textAlign:'right',fontWeight:'600'}}>{act>0?fmt(act):'—'}</td>
                <td style={{...td,textAlign:'right',fontWeight:'700',color:v>0?'#DC2626':v<0?'#059669':'#94A3B8'}}>{line.budget>0?(v>=0?'+'+fmt(v):fmtSigned(v)):'—'}</td>
                <td style={{...td,textAlign:'right',fontSize:'12px',color:overBudget?'#D97706':'#94A3B8'}}>{line.budget>0?((act/line.budget)*100).toFixed(1)+'%':'—'}{overBudget&&' ⚠'}</td>
                <td style={td}><div style={{height:'6px',background:'#F1F5F9',borderRadius:'3px',overflow:'hidden'}}><div style={{height:'100%',borderRadius:'3px',width:Math.min(100,u)+'%',background:u>110?'#DC2626':u>100?'#D97706':'#1D4ED8'}}/></div></td>
              </tr>
            );
          })}</tbody>
          <tfoot><tr style={{background:'#F8FAFC',fontWeight:'700'}}>
            <td style={td}>TOTAL</td>
            <td style={{...td,textAlign:'right'}}>{fmt(bud.contract)}</td>
            <td style={{...td,textAlign:'right'}}>{fmt(totalActual)}</td>
            <td style={{...td,textAlign:'right',color:totalActual-bud.contract>0?'#DC2626':'#059669'}}>{totalActual-bud.contract>=0?'+'+fmt(totalActual-bud.contract):fmtSigned(totalActual-bud.contract)}</td>
            <td style={{...td,textAlign:'right',fontSize:'12px',color:'#94A3B8'}}>{bud.contract>0?((totalActual/bud.contract)*100).toFixed(1)+'%':'—'}</td>
            <td style={td}/>
          </tr></tfoot>
        </table>
      </div>}

      {!allYears&&(()=>{
        // Contract requires a budget amendment when a category exceeds its
        // submitted plan by more than 10% (per-category basis, confirmed 2026-07).
        const overCats=bud.lines.filter(l=>l.budget>0&&(actuals[l.code]||0)>l.budget*1.10);
        if(overCats.length===0) return null;
        const yearAmendments=amendments.filter(a=>a.fy===selFY);
        return(
          <Alert type="warn"><strong>Amendment check ({selFY}):</strong> {overCats.length} categor{overCats.length===1?'y':'ies'} exceed{overCats.length===1?'s':''} the submitted plan by more than 10% — {overCats.map(l=>`${l.label} (${fmt(actuals[l.code]||0)} vs ${fmt(l.budget)} planned)`).join('; ')}. Contract requires budget amendments for &gt;10% variance. {yearAmendments.length>0?`${yearAmendments.length} amendment(s) are logged for ${selFY} below — verify they cover these categories.`:`No amendments are logged for ${selFY} yet.`}</Alert>
        );
      })()}

      {/* All-years combined view */}
      {allYears&&<div style={{background:'white',borderRadius:'12px',border:'1px solid #E2E8F0',overflow:'hidden'}}>
        <div style={{padding:'14px 16px',background:'#F8FAFC',borderBottom:'1px solid #E2E8F0',fontSize:'13px',color:'#64748B'}}>
          Showing total actual spend across FY23/24 – FY25/26 and what share each category represents. Budgets are cumulative across all four Action Plans.
        </div>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr>
            <th style={th}>SACS Category</th>
            <th style={{...th,textAlign:'right'}}>Total Budgeted</th>
            <th style={{...th,textAlign:'right'}}>Total Actual</th>
            <th style={{...th,textAlign:'right'}}>Variance</th>
            <th style={{...th,textAlign:'right'}}>% of Total Spend</th>
            <th style={{...th,width:'140px'}}>Share of Spending</th>
          </tr></thead>
          <tbody>{bud.lines.map(line=>{
            const act=allActuals[line.code]||0;
            const bgt=allBudget[line.code]||0;
            const v=act-bgt;
            const pctSpend=totalAllActual>0?(act/totalAllActual)*100:0;
            return(
              <tr key={line.code} style={{background:'white'}}>
                <td style={td}>{line.label}</td>
                <td style={{...td,textAlign:'right'}}>{bgt>0?fmt(bgt):'—'}</td>
                <td style={{...td,textAlign:'right',fontWeight:'600'}}>{act>0?fmt(act):'—'}</td>
                <td style={{...td,textAlign:'right',fontWeight:'600',color:v>0?'#DC2626':v<0?'#059669':'#94A3B8'}}>{bgt>0?(v>=0?'+'+fmt(v):fmtSigned(v)):'—'}</td>
                <td style={{...td,textAlign:'right',fontWeight:'700',color:'#1D4ED8'}}>{act>0?pctSpend.toFixed(1)+'%':'—'}</td>
                <td style={td}><div style={{height:'8px',background:'#F1F5F9',borderRadius:'4px',overflow:'hidden'}}>
                  <div style={{height:'100%',borderRadius:'4px',width:pctSpend.toFixed(1)+'%',background:'#1D4ED8'}}/>
                </div><div style={{fontSize:'10px',color:'#94A3B8',marginTop:'2px'}}>{pctSpend>0?pctSpend.toFixed(1)+'%':'—'}</div></td>
              </tr>
            );
          })}</tbody>
          <tfoot><tr style={{background:'#F8FAFC',fontWeight:'700'}}>
            <td style={td}>TOTAL</td>
            <td style={{...td,textAlign:'right'}}>{fmt(Object.values(allBudget).reduce((a,b)=>a+b,0))}</td>
            <td style={{...td,textAlign:'right'}}>{fmt(totalAllActual)}</td>
            <td style={{...td,textAlign:'right',color:'#059669'}}>{fmt(totalAllActual-Object.values(allBudget).reduce((a,b)=>a+b,0))}</td>
            <td style={{...td,textAlign:'right'}}>100%</td>
            <td style={td}/>
          </tr></tfoot>
        </table>
      </div>}

      {/* Amendment log — show for single years only */}
      {!allYears&&<div style={{background:'white',borderRadius:'12px',border:'1px solid #E2E8F0',padding:'16px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'12px'}}>
          <span style={{fontWeight:'600',fontSize:'14px',color:'#1E293B'}}>Budget Amendment Log — {selFY}</span>
          <button onClick={()=>setShowForm(v=>!v)} style={{background:'#1D4ED8',color:'white',border:'none',borderRadius:'6px',padding:'6px 12px',fontSize:'12px',fontWeight:'600',cursor:'pointer'}}>+ Add Amendment</button>
        </div>
        {showForm&&(
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 2fr 1fr auto',gap:'8px',marginBottom:'12px',background:'#F8FAFC',padding:'12px',borderRadius:'8px'}}>
            <input placeholder="Date" value={newA.date} onChange={e=>setNewA(p=>({...p,date:e.target.value}))} style={{border:'1px solid #E2E8F0',borderRadius:'6px',padding:'7px 10px'}}/>
            <input placeholder="Category" value={newA.category} onChange={e=>setNewA(p=>({...p,category:e.target.value}))} style={{border:'1px solid #E2E8F0',borderRadius:'6px',padding:'7px 10px'}}/>
            <input placeholder="Description" value={newA.description} onChange={e=>setNewA(p=>({...p,description:e.target.value}))} style={{border:'1px solid #E2E8F0',borderRadius:'6px',padding:'7px 10px'}}/>
            <input placeholder="Amount $" value={newA.amount} onChange={e=>setNewA(p=>({...p,amount:e.target.value}))} style={{border:'1px solid #E2E8F0',borderRadius:'6px',padding:'7px 10px'}}/>
            <button onClick={()=>{if(newA.description){setAmendments(a=>[...a,{...newA,fy:selFY,id:Date.now()}]);setNewA({date:'',category:'',description:'',amount:''});setShowForm(false);}}} style={{background:'#1D4ED8',color:'white',border:'none',borderRadius:'6px',padding:'7px 14px',fontWeight:'600',cursor:'pointer'}}>Save</button>
          </div>
        )}
        {amendments.filter(a=>a.fy===selFY).length===0?
          <p style={{color:'#94A3B8',fontSize:'13px',fontStyle:'italic',margin:0}}>No amendments logged for {selFY}</p>:
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead><tr style={{borderBottom:'1px solid #E2E8F0'}}>{['Date','Category','Description','Amount',''].map(h=><th key={h} style={{padding:'6px 8px',fontSize:'11px',fontWeight:'700',color:'#64748B',textTransform:'uppercase',textAlign:h==='Amount'?'right':'left'}}>{h}</th>)}</tr></thead>
            <tbody>{amendments.filter(a=>a.fy===selFY).map(a=><tr key={a.id} style={{borderBottom:'1px solid #F8FAFC'}}>
              <td style={{padding:'7px 8px',fontSize:'13px'}}>{a.date}</td><td style={{padding:'7px 8px',fontSize:'13px'}}>{a.category}</td>
              <td style={{padding:'7px 8px',fontSize:'13px'}}>{a.description}</td>
              <td style={{padding:'7px 8px',fontSize:'13px',textAlign:'right',fontWeight:'600'}}>{a.amount?fmt(parseFloat(a.amount)||0):'—'}</td>
              <td style={{padding:'7px 8px',textAlign:'right'}}><button onClick={()=>setAmendments(aa=>aa.filter(x=>x.id!==a.id))} style={{background:'none',border:'none',color:'#94A3B8',cursor:'pointer',fontSize:'16px'}} onMouseOver={e=>e.target.style.color='#EF4444'} onMouseOut={e=>e.target.style.color='#94A3B8'}>x</button></td>
            </tr>)}</tbody>
          </table>
        }
      </div>}
    </div>
  );
}

// ── Transaction Ledger Tab ───────────────────────────────────────────────────
function LedgerTab({txns,enrichments,auditTags,onJumpToEnrich}){
  const [filters,setFilters]=useState({search:'',account:'',fy:'',type:'',sacs:'',objCode:''});
  const [sortCol,setSortCol]=useState('date');
  const [sortDir,setSortDir]=useState('desc');
  const [page,setPage]=useState(0);
  const [pageSize,setPageSize]=useState(25); // 25 default; 0 = show all

  // Unique object codes from transactions (for individual code filter)
  const objCodes=useMemo(()=>{
    const src=filters.sacs?txns.filter(t=>t.sacs_group===filters.sacs):txns;
    const m={};src.forEach(t=>{if(t.obj&&!m[t.obj])m[t.obj]=t.obj_desc||t.obj;});
    return Object.entries(m).sort((a,b)=>a[0].localeCompare(b[0]));
  },[txns,filters.sacs]);

  const filtered=useMemo(()=>{
    let r=txns;
    if(filters.search){const q=filters.search.toLowerCase();r=r.filter(t=>t.desc.toLowerCase().includes(q)||t.ref.toLowerCase().includes(q)||t.obj_desc.toLowerCase().includes(q));}
    if(filters.account) r=r.filter(t=>t.account===filters.account);
    if(filters.fy) r=r.filter(t=>t.fy===filters.fy);
    if(filters.type) r=r.filter(t=>t.type===filters.type);
    if(filters.sacs) r=r.filter(t=>t.sacs_group===filters.sacs);
    if(filters.objCode) r=r.filter(t=>t.obj===filters.objCode);
    return [...r].sort((a,b)=>{const v=sortCol==='amt'?a.amt-b.amt:(a[sortCol]||'').localeCompare(b[sortCol]||'');return sortDir==='asc'?v:-v;});
  },[txns,filters,sortCol,sortDir]);

  const PAGE=pageSize>0?pageSize:Math.max(1,filtered.length);
  const pages=Math.ceil(filtered.length/PAGE);
  const shown=filtered.slice(page*PAGE,(page+1)*PAGE);
  function setF(k,v){
    if(k==='sacs') setFilters(f=>({...f,sacs:v,objCode:''})); // reset obj code when SACS changes
    else setFilters(f=>({...f,[k]:v}));
    setPage(0);
  }
  function toggleSort(col){if(sortCol===col)setSortDir(d=>d==='asc'?'desc':'asc');else{setSortCol(col);setSortDir('asc');}}
  const th={padding:'10px 12px',fontSize:'11px',fontWeight:'700',color:'#64748B',textTransform:'uppercase',letterSpacing:'0.05em',textAlign:'left',background:'#F8FAFC',borderBottom:'1px solid #E2E8F0',cursor:'pointer',userSelect:'none',whiteSpace:'nowrap'};
  const td={padding:'10px 12px',fontSize:'12px',color:'#334155',borderBottom:'1px solid #F8FAFC'};
  const inp={border:'1px solid #E2E8F0',borderRadius:'8px',padding:'8px 12px',width:'100%',fontSize:'13px'};
  return(
    <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
      <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
        <span style={{padding:'4px 12px',background:'#FEF3C7',border:'1px solid #FED7AA',borderRadius:'6px',fontSize:'12px',fontWeight:'700',color:'#92400E'}}>READ ONLY — Source Data</span>
        <span style={{fontSize:'13px',color:'#64748B'}}>{filtered.length.toLocaleString()} of {txns.length.toLocaleString()} records</span>
        <label style={{marginLeft:'auto',fontSize:'12px',color:'#64748B',display:'flex',alignItems:'center',gap:'6px'}}>Per page:
          <select value={pageSize} onChange={e=>{setPageSize(parseInt(e.target.value));setPage(0);}} style={{border:'1px solid #E2E8F0',borderRadius:'8px',padding:'5px 8px',fontSize:'12px'}}>
            <option value={5}>5</option><option value={10}>10</option><option value={25}>25</option><option value={100}>100</option><option value={0}>All</option>
          </select>
        </label>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr 1fr 1fr',gap:'8px'}}>
        <input placeholder="Search description, ref, category..." value={filters.search} onChange={e=>setF('search',e.target.value)} style={inp}/>
        <select value={filters.account} onChange={e=>setF('account',e.target.value)} style={inp}>
          <option value="">All Accounts</option>
          {['0110028','0110029','0110030','0110237','0110238'].map(a=><option key={a} value={a}>{ACCT_OPT(a)}</option>)}
        </select>
        <select value={filters.fy} onChange={e=>setF('fy',e.target.value)} style={inp}><option value="">All Years</option>{FY_LIST.map(f=><option key={f} value={f}>{f}</option>)}</select>
        <select value={filters.type} onChange={e=>setF('type',e.target.value)} style={inp}><option value="">All Types</option>{['JE','OH','AR','CR','TR'].map(t=><option key={t} value={t}>{t}</option>)}</select>
        <select value={filters.sacs} onChange={e=>setF('sacs',e.target.value)} style={inp}>{SACS_OPTS.map(([v,l])=><option key={v} value={v}>{l}</option>)}</select>
      </div>
      {/* Object code filter — shows when SACS group selected OR always for fine control */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 3fr',gap:'8px',alignItems:'center'}}>
        <select value={filters.objCode} onChange={e=>setF('objCode',e.target.value)} style={inp}>
          <option value="">{filters.sacs?`All codes in ${filters.sacs}`:'All Object Codes'}</option>
          {objCodes.map(([code,desc])=><option key={code} value={code}>{code}{desc?' — '+desc:''}</option>)}
        </select>
        {(filters.search||filters.account||filters.fy||filters.type||filters.sacs||filters.objCode)&&
          <button onClick={()=>{setFilters({search:'',account:'',fy:'',type:'',sacs:'',objCode:''});setPage(0);}} style={{background:'none',border:'1px solid #E2E8F0',borderRadius:'7px',padding:'7px 14px',cursor:'pointer',color:'#64748B',fontSize:'13px',width:'fit-content'}}>Clear all filters</button>
        }
      </div>
      <div style={{background:'white',borderRadius:'12px',border:'1px solid #E2E8F0',overflow:'hidden'}}>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',minWidth:'1000px'}}>
            <thead>
              <tr>
                {[['date','Date'],['account','Account'],['type','Type'],['desc','Description'],['obj','Obj Code'],['obj_desc','Category'],['sacs_label','SACS'],['amt','Amount']].map(([col,lbl])=>(
                  <th key={col} onClick={()=>toggleSort(col)} style={th}>
                    <span style={{display:'flex',alignItems:'center',gap:'4px'}}>{lbl} <span style={{fontSize:'9px',color:sortCol===col?'#1D4ED8':'#CBD5E1'}}>{sortCol===col?(sortDir==='asc'?'↑':'↓'):'↕'}</span></span>
                  </th>
                ))}
                <th style={th}>Flags</th>
                <th style={{...th,cursor:'default',width:'40px'}}/>
              </tr>
            </thead>
            <tbody>
              {shown.map(t=>{
                const enr=enrichments[t.id];const tags=auditTags[t.id]||[];
                return(
                  <tr key={t.id} style={{background:'white'}} onMouseOver={e=>e.currentTarget.style.background='#F8FAFC'} onMouseOut={e=>e.currentTarget.style.background='white'}>
                    <td style={{...td,whiteSpace:'nowrap'}}>{t.date}</td>
                    <td style={td}><div style={{display:'flex',flexDirection:'column',gap:'2px'}}><AcctBadge account={t.account}/><span style={{fontSize:'10px',color:'#94A3B8'}}>{ACCT_LABEL[t.account]}</span></div></td>
                    <td style={{...td,color:'#94A3B8'}}>{t.type}</td>
                    <td style={{...td,maxWidth:'200px'}}><div style={{fontWeight:'500',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{enr?.desc||t.desc}</div>{enr?.desc&&<div style={{fontSize:'10px',color:'#94A3B8',fontStyle:'italic',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.desc}</div>}</td>
                    <td style={{...td,fontFamily:'monospace',fontWeight:'600',color:'#475569'}}>{t.obj}</td>
                    <td style={td}>{t.obj_desc}</td>
                    <td style={{...td,color:'#64748B'}}>{t.sacs_label}</td>
                    <td style={{...td,textAlign:'right',fontWeight:'700',color:t.amt<0?'#DC2626':'#1E293B',whiteSpace:'nowrap'}}>{fmt(t.amt)}</td>
                    <td style={td}><div style={{display:'flex',flexWrap:'wrap',gap:'3px'}}>{tags.map(tag=>{const ti=AUDIT_TAGS.find(x=>x.id===tag);return ti?<span key={tag} style={{padding:'1px 6px',borderRadius:'20px',fontSize:'10px',fontWeight:'700',background:ti.bg,color:ti.color}}>{ti.label.split(' ')[0]}</span>:null;})}</div></td>
                    <td style={td}><button onClick={()=>onJumpToEnrich(t.id)} title="Open in Enrichment & Audit" style={{background:'none',border:'none',cursor:'pointer',fontSize:'14px',color:'#CBD5E1',padding:'2px'}} onMouseOver={e=>e.target.style.color='#1D4ED8'} onMouseOut={e=>e.target.style.color='#CBD5E1'}>✏️</button></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
      {pages>1&&(
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <span style={{fontSize:'13px',color:'#64748B'}}>Page {page+1} of {pages}</span>
          <div style={{display:'flex',gap:'8px'}}>
            <button disabled={page===0} onClick={()=>setPage(p=>p-1)} style={{padding:'7px 16px',borderRadius:'8px',border:'1px solid #E2E8F0',background:'white',cursor:page===0?'not-allowed':'pointer',color:page===0?'#CBD5E1':'#334155',fontWeight:'600',fontSize:'13px'}}>Prev</button>
            <button disabled={page>=pages-1} onClick={()=>setPage(p=>p+1)} style={{padding:'7px 16px',borderRadius:'8px',border:'1px solid #E2E8F0',background:'white',cursor:page>=pages-1?'not-allowed':'pointer',color:page>=pages-1?'#CBD5E1':'#334155',fontWeight:'600',fontSize:'13px'}}>Next</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Enrichment & Audit Tab ───────────────────────────────────────────────────
function EnrichmentTab({txns,enrichments,setEnrichments,auditTags,setAuditTags,jumpToId,clearJump,userRole}){
  const canManage=userRole==='director'||userRole==='admin_support';
  const [filters,setFilters]=useState({search:'',account:'',fy:'',sacs:'',objCode:'',tagged:'all'});
  const [page,setPage]=useState(0);
  const [selected,setSelected]=useState(()=>new Set());
  const [batchDesc,setBatchDesc]=useState('');
  const [batchNote,setBatchNote]=useState('');
  const [batchMode,setBatchMode]=useState(null); // 'desc' | 'note' | null
  const rowRefs=useRef({});
  const [pageSize,setPageSize]=useState(25); // 25 default; 0 = show all
  function setF(k,v){
    if(k==='sacs') setFilters(f=>({...f,sacs:v,objCode:''}));
    else setFilters(f=>({...f,[k]:v}));
    setPage(0);
  }

  const objCodes=useMemo(()=>{
    const src=filters.sacs?txns.filter(t=>t.sacs_group===filters.sacs):txns;
    const m={};src.forEach(t=>{if(t.obj&&!m[t.obj])m[t.obj]=t.obj_desc||t.obj;});
    return Object.entries(m).sort((a,b)=>a[0].localeCompare(b[0]));
  },[txns,filters.sacs]);

  const filtered=useMemo(()=>{
    let r=txns;
    if(filters.search){const q=filters.search.toLowerCase();r=r.filter(t=>t.desc.toLowerCase().includes(q)||(enrichments[t.id]?.desc||'').toLowerCase().includes(q)||t.obj_desc.toLowerCase().includes(q));}
    if(filters.account) r=r.filter(t=>t.account===filters.account);
    if(filters.fy) r=r.filter(t=>t.fy===filters.fy);
    if(filters.sacs) r=r.filter(t=>t.sacs_group===filters.sacs);
    if(filters.objCode) r=r.filter(t=>t.obj===filters.objCode);
    if(filters.tagged==='tagged') r=r.filter(t=>(auditTags[t.id]||[]).length>0||enrichments[t.id]?.desc);
    if(filters.tagged==='untagged') r=r.filter(t=>!(auditTags[t.id]||[]).length&&!enrichments[t.id]?.desc);
    if(filters.tagged==='verified') r=r.filter(t=>(auditTags[t.id]||[]).includes('verified'));
    if(filters.tagged==='unverified') r=r.filter(t=>!(auditTags[t.id]||[]).includes('verified'));
    return r;
  },[txns,filters,enrichments,auditTags]);

  const PAGE=pageSize>0?pageSize:Math.max(1,filtered.length);

  const pages=Math.ceil(filtered.length/PAGE);
  const shown=filtered.slice(page*PAGE,(page+1)*PAGE);
  const shownIds=useMemo(()=>shown.map(t=>t.id),[shown]);
  const allShownSelected=shownIds.length>0&&shownIds.every(id=>selected.has(id));
  const someShownSelected=shownIds.some(id=>selected.has(id));

  useEffect(()=>{
    if(!jumpToId) return;
    const idx=filtered.findIndex(t=>t.id===jumpToId);
    if(idx===-1){clearJump();return;}
    const tp=Math.floor(idx/PAGE);setPage(tp);
    setTimeout(()=>{const el=rowRefs.current[jumpToId];if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.style.outline='3px solid #3B82F6';el.style.borderRadius='12px';setTimeout(()=>{if(el){el.style.outline='';el.style.borderRadius='';}},2500);}clearJump();},150);
  },[jumpToId]);

  function updateEnr(id,field,val){setEnrichments(e=>({...e,[id]:{...(e[id]||{}),[field]:val}}));}
  function toggleTag(id,tagId){
    setAuditTags(t=>{
      const cur=t[id]||[];
      const next=cur.includes(tagId)?cur.filter(x=>x!==tagId):[...cur,tagId];
      const tag=AUDIT_TAGS.find(x=>x.id===tagId);
      const action=cur.includes(tagId)?'removed':'added';
      logActivity('tag_changed',`${action==='added'?'Tagged':'Untagged'} transaction as "${tag?tag.label:tagId}"`,{txnId:id,tag:tagId,action});
      return{...t,[id]:next};
    });
  }

  // ── Selection helpers ──────────────────────────────────────────────────────
  function toggleSelect(id){setSelected(s=>{const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n;});}
  function toggleSelectAllShown(){setSelected(s=>{const n=new Set(s);if(allShownSelected)shownIds.forEach(id=>n.delete(id));else shownIds.forEach(id=>n.add(id));return n;});}
  function clearSelection(){setSelected(new Set());}

  // ── Batch verify (works on a given id list) ────────────────────────────────
  function setVerifiedFor(ids,verified){
    if(ids.length===0) return;
    setAuditTags(t=>{
      const next={...t};
      ids.forEach(id=>{
        const cur=next[id]||[];
        if(verified) next[id]=cur.includes('verified')?cur:[...cur,'verified'];
        else next[id]=cur.filter(x=>x!=='verified');
        if(next[id].length===0) delete next[id];
      });
      return next;
    });
    logActivity('tag_changed',`${verified?'Verified':'Un-verified'} ${ids.length} transaction${ids.length!==1?'s':''} (batch)`,{count:ids.length,action:verified?'added':'removed',tag:'verified'});
  }
  const verifyAllFiltered=()=>setVerifiedFor(filtered.map(t=>t.id),true);
  const unverifyAllFiltered=()=>setVerifiedFor(filtered.map(t=>t.id),false);
  const verifySelected=()=>{setVerifiedFor([...selected],true);};
  const unverifySelected=()=>{setVerifiedFor([...selected],false);};

  // ── Batch description / note (applies to selection) ────────────────────────
  function applyBatchDesc(){
    const ids=[...selected];
    if(ids.length===0||!batchDesc.trim()) return;
    setEnrichments(e=>{const n={...e};ids.forEach(id=>{n[id]={...(n[id]||{}),desc:batchDesc.trim()};});return n;});
    logActivity('tag_changed',`Applied batch description to ${ids.length} transaction${ids.length!==1?'s':''}`,{count:ids.length});
    setBatchDesc('');setBatchMode(null);
  }
  function applyBatchNote(){
    const ids=[...selected];
    if(ids.length===0||!batchNote.trim()) return;
    // Append to any existing note rather than overwrite, so batch tagging is additive
    setEnrichments(e=>{const n={...e};ids.forEach(id=>{const prev=(n[id]||{}).notes||'';n[id]={...(n[id]||{}),notes:prev?prev+'\n'+batchNote.trim():batchNote.trim()};});return n;});
    logActivity('tag_changed',`Applied batch note to ${ids.length} transaction${ids.length!==1?'s':''}`,{count:ids.length});
    setBatchNote('');setBatchMode(null);
  }

  const inp={border:'1px solid #E2E8F0',borderRadius:'8px',padding:'8px 12px',width:'100%',fontSize:'13px'};
  const selCount=selected.size;

  return(
    <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
      <div style={{display:'flex',alignItems:'center',gap:'10px',flexWrap:'wrap'}}>
        <span style={{padding:'4px 12px',background:'#EFF6FF',border:'1px solid #BFDBFE',borderRadius:'6px',fontSize:'12px',fontWeight:'700',color:'#1E40AF'}}>ENRICHMENT LAYER — Edits do not affect source data</span>
        <span style={{fontSize:'13px',color:'#64748B'}}>{filtered.length.toLocaleString()} records shown</span>
        <label style={{marginLeft:'auto',fontSize:'12px',color:'#64748B',display:'flex',alignItems:'center',gap:'6px'}}>Per page:
          <select value={pageSize} onChange={e=>{setPageSize(parseInt(e.target.value));setPage(0);}} style={{border:'1px solid #E2E8F0',borderRadius:'8px',padding:'5px 8px',fontSize:'12px'}}>
            <option value={5}>5</option><option value={10}>10</option><option value={25}>25</option><option value={100}>100</option><option value={0}>All</option>
          </select>
        </label>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr 1fr',gap:'8px'}}>
        <input placeholder="Search..." value={filters.search} onChange={e=>setF('search',e.target.value)} style={inp}/>
        <select value={filters.account} onChange={e=>setF('account',e.target.value)} style={inp}>
          <option value="">All Accounts</option>
          {['0110028','0110029','0110030','0110237','0110238'].map(a=><option key={a} value={a}>{ACCT_OPT(a)}</option>)}
        </select>
        <select value={filters.fy} onChange={e=>setF('fy',e.target.value)} style={inp}><option value="">All Years</option>{FY_LIST.map(f=><option key={f} value={f}>{f}</option>)}</select>
        <select value={filters.sacs} onChange={e=>setF('sacs',e.target.value)} style={inp}>{SACS_OPTS.map(([v,l])=><option key={v} value={v}>{l}</option>)}</select>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px',alignItems:'center'}}>
        <select value={filters.objCode} onChange={e=>setF('objCode',e.target.value)} style={inp}>
          <option value="">{filters.sacs?`All codes in ${filters.sacs}`:'All Object Codes'}</option>
          {objCodes.map(([code,desc])=><option key={code} value={code}>{code}{desc?' — '+desc:''}</option>)}
        </select>
        <div style={{display:'flex',gap:'6px',flexWrap:'wrap'}}>
          {[['all','All'],['verified','Verified'],['unverified','Unverified'],['tagged','Enriched'],['untagged','Untouched']].map(([v,l])=>(
            <button key={v} onClick={()=>setF('tagged',v)} style={{padding:'6px 12px',borderRadius:'20px',fontSize:'12px',fontWeight:'600',border:'1px solid',cursor:'pointer',background:filters.tagged===v?'#1E293B':'white',color:filters.tagged===v?'white':'#64748B',borderColor:filters.tagged===v?'#1E293B':'#E2E8F0',whiteSpace:'nowrap'}}>{l}</button>
          ))}
        </div>
      </div>

      {/* ── Batch action bar ──────────────────────────────────────────────── */}
      {canManage&&(
        <div style={{background:'#F8FAFC',border:'1px solid #E2E8F0',borderRadius:'10px',padding:'12px 14px',display:'flex',flexDirection:'column',gap:'10px'}}>
          <div style={{display:'flex',alignItems:'center',gap:'10px',flexWrap:'wrap'}}>
            <label style={{display:'flex',alignItems:'center',gap:'6px',fontSize:'12px',fontWeight:'600',color:'#334155',cursor:'pointer'}}>
              <input type="checkbox" checked={allShownSelected} ref={el=>{if(el)el.indeterminate=someShownSelected&&!allShownSelected;}} onChange={toggleSelectAllShown}/>
              Select page ({shownIds.length})
            </label>
            <span style={{fontSize:'12px',color:selCount>0?'#1D4ED8':'#94A3B8',fontWeight:'700'}}>{selCount} selected</span>
            {selCount>0&&<button onClick={clearSelection} style={{fontSize:'11px',color:'#64748B',background:'none',border:'none',cursor:'pointer',textDecoration:'underline'}}>clear</button>}

          <thead><tr><th style={{...th,textAlign:'left'}}>Fiscal Year</th><th style={{...th,textAlign:'right'}}>Contract</th><th style={{...th,textAlign:'right'}}>Carryover In</th><th style={{...th,textAlign:'right'}}>Total Available</th><th style={{...th,textAlign:'right'}}>Actual Spent</th><th style={{...th,textAlign:'right'}}>Carryover Out</th><th style={{...th,textAlign:'left'}}>Notes</th></tr></thead>
          <tbody>{rows.map((r,i)=>(
            <tr key={r.fy} style={{background:r.isCurrent?'#EFF6FF':'white'}} onMouseOver={e=>e.currentTarget.style.background=r.isCurrent?'#DBEAFE':'#F8FAFC'} onMouseOut={e=>e.currentTarget.style.background=r.isCurrent?'#EFF6FF':'white'}>
              <td style={{...td,fontWeight:'700'}}>{r.fy}{r.isCurrent&&<span style={{marginLeft:'6px',fontSize:'10px',fontWeight:'700',color:'#1D4ED8'}}>CURRENT</span>}</td>
              <td style={{...td,textAlign:'right'}}>{fmt(r.contract)}</td>
              <td style={{...td,textAlign:'right',color:r.carryoverIn<0?'#DC2626':'#D97706',fontWeight:'600'}}>{r.carryoverIn!==0?fmtSigned(r.carryoverIn):'--'}</td>
              <td style={{...td,textAlign:'right',fontWeight:'700'}}>{fmt(r.available)}</td>
              <td style={{...td,textAlign:'right',color:r.actual<0?'#059669':'#334155'}}>{r.actual!==0?fmtSigned(r.actual):<span style={{color:'#94A3B8',fontStyle:'italic'}}>none yet</span>}</td>
              <td style={{...td,textAlign:'right',fontWeight:'700',color:r.carryoverOut<0?'#DC2626':r.carryoverOut>0?'#D97706':'#059669'}}>{fmtSigned(r.carryoverOut)}</td>

        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'12px'}}>

      </div>
    </div>
  );

// ── Upload Modal ──────────────────────────────────────────────────────────────
function UploadModal({onClose,onImport,existingCount,existingTxns}){
  const [mode,setMode]=useState('incremental');
  const [preview,setPreview]=useState(null);
  const [parsed,setParsed]=useState(null);
  const [error,setError]=useState('');
  const [loading,setLoading]=useState(false);
  const [showAllNew,setShowAllNew]=useState(false);
  const [replaceConfirm,setReplaceConfirm]=useState('');
  const fileRef=useRef();

  const existingIds=useMemo(()=>new Set((existingTxns||[]).map(t=>t.id)),[existingTxns]);

  // Recompute what's "new" vs "already in database" whenever the parsed data
  // or the selected mode changes, so switching modes updates the preview live.
  const diff=useMemo(()=>{
    if(!parsed) return null;
    if(mode!=='incremental') return{newRows:parsed,alreadyExists:[],renumberSuspect:false};
    const newRows=parsed.filter(r=>!existingIds.has(r.id));
    const alreadyExists=parsed.filter(r=>existingIds.has(r.id));
    // Transaction IDs are RowNum-based. If the ledger export ever renumbers
    // rows, old data re-appears as "new" under fresh IDs. Signature: a large
    // share of "new" rows dated inside the range we already have.
    const existingDates=(existingTxns||[]).map(t=>t.date).filter(Boolean).sort();
    const existingMax=existingDates[existingDates.length-1]||'';
    const backdated=newRows.filter(r=>r.date&&existingMax&&r.date<=existingMax).length;
    const renumberSuspect=newRows.length>20&&backdated/newRows.length>0.25;
    return{newRows,alreadyExists,renumberSuspect,backdated};
  },[parsed,mode,existingIds,existingTxns]);

  function readFileAsText(file){
    return new Promise((resolve,reject)=>{
      const reader=new FileReader();
      reader.onload=ev=>resolve(ev.target.result);
      reader.onerror=()=>reject(new Error(`Could not read ${file.name}`));
      reader.readAsText(file);
    });
  }

  async function handleFiles(e){
    const files=Array.from(e.target.files||[]);
    if(files.length===0) return;
    setError('');setLoading(true);setPreview(null);setParsed(null);setShowAllNew(false);
    try{
      const perFile=[];
      let allRows=[];
      for(const file of files){
        const text=await readFileAsText(file);
        const rows=parseCSVtoTxns(text);
        perFile.push({name:file.name,count:rows.length});
        allRows=allRows.concat(rows);
      }
      if(allRows.length===0){setError('No valid transactions found in the selected file(s). Check the format.');setLoading(false);return;}
      const seen=new Set();const deduped=[];
      allRows.forEach(r=>{if(!seen.has(r.id)){seen.add(r.id);deduped.push(r);}});
      const accts=[...new Set(deduped.map(r=>r.account))].filter(Boolean).sort();
      const dates=deduped.map(r=>r.date).filter(Boolean).sort();
      setParsed(deduped);
      setPreview({count:deduped.length,accts,min:dates[0],max:dates[dates.length-1],files:perFile,duplicatesSkipped:allRows.length-deduped.length});
    }catch(err){
      setError('Could not parse file(s): '+err.message);
    }
    setLoading(false);
  }
  function confirm(){
    if(!parsed)return;
    // For incremental mode, only the genuinely-new rows get written — matches
    // what the preview below shows, so what you see is what gets committed.
    const toSend=mode==='incremental'?(diff?diff.newRows:parsed):parsed;
    onImport(toSend,mode);onClose();
  }
  const modeBtn=(v,label,desc)=>(
    <button onClick={()=>setMode(v)} style={{textAlign:'left',padding:'14px',borderRadius:'10px',border:`2px solid ${mode===v?'#1D4ED8':'#E2E8F0'}`,background:mode===v?'#EFF6FF':'white',cursor:'pointer',width:'100%'}}>
      <div style={{fontWeight:'700',fontSize:'13px',color:mode===v?'#1D4ED8':'#334155'}}>{label}</div>
      <div style={{fontSize:'12px',color:'#64748B',marginTop:'4px'}}>{desc}</div>
    </button>
  );
  const newRowsToShow=diff?(showAllNew?diff.newRows:diff.newRows.slice(0,15)):[];
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000}}>
      <div style={{background:'white',borderRadius:'16px',width:'100%',maxWidth:'620px',margin:'0 20px',boxShadow:'0 25px 50px rgba(0,0,0,0.25)',maxHeight:'90vh',overflow:'auto'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'18px 22px',borderBottom:'1px solid #E2E8F0'}}>
          <h3 style={{margin:0,fontSize:'16px',fontWeight:'700',color:'#1E293B'}}>Import Transactions</h3>
          <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',color:'#94A3B8',fontSize:'22px',lineHeight:1}} onMouseOver={e=>e.target.style.color='#64748B'} onMouseOut={e=>e.target.style.color='#94A3B8'}>×</button>
        </div>
        <div style={{padding:'20px 22px',display:'flex',flexDirection:'column',gap:'16px'}}>
          <p style={{margin:0,fontSize:'13px',color:'#64748B'}}>Current database: <strong style={{color:'#1E293B'}}>{existingCount.toLocaleString()} transactions</strong></p>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}}>
            {modeBtn('incremental','Incremental','Add only new transactions (checks Firestore IDs). Use for monthly updates.')}
            {modeBtn('replace','Full Replace','Replace entire Firestore dataset. Use to reload all CSVs.')}
          </div>
          <div onClick={()=>fileRef.current?.click()} style={{border:'2px dashed #CBD5E1',borderRadius:'12px',padding:'28px',textAlign:'center',cursor:'pointer'}} onMouseOver={e=>{e.currentTarget.style.borderColor='#3B82F6';e.currentTarget.style.background='#F0F9FF';}} onMouseOut={e=>{e.currentTarget.style.borderColor='#CBD5E1';e.currentTarget.style.background='transparent';}}>
            <div style={{fontSize:'24px',marginBottom:'6px'}}>📁</div>
            <div style={{fontWeight:'600',color:'#475569'}}>Click to select one or more CSV files</div>
            <div style={{fontSize:'12px',color:'#94A3B8',marginTop:'4px'}}>Select all 5 account exports at once (0110028, 0110029, 0110030, 0110237, 0110238) — same format as the original ledger exports</div>
            <input ref={fileRef} type="file" accept=".csv" multiple style={{display:'none'}} onChange={handleFiles}/>
          </div>
          {loading&&<div style={{fontSize:'13px',color:'#64748B',textAlign:'center'}}>Parsing file(s)…</div>}
          {error&&<div style={{background:'#FEF2F2',border:'1px solid #FECACA',borderRadius:'8px',padding:'12px',fontSize:'13px',color:'#991B1B'}}>{error}</div>}
          {preview&&(
            <div style={{background:'#ECFDF5',border:'1px solid #A7F3D0',borderRadius:'12px',padding:'14px'}}>
              <div style={{fontWeight:'700',color:'#065F46',marginBottom:'8px'}}>✅ {preview.files.length} file{preview.files.length!==1?'s':''} parsed successfully</div>
              <div style={{display:'flex',flexDirection:'column',gap:'3px',marginBottom:'10px'}}>
                {preview.files.map(f=>(
                  <div key={f.name} style={{display:'flex',justifyContent:'space-between',fontSize:'12px',color:'#065F46'}}>
                    <span>{f.name}</span><span style={{fontWeight:'600'}}>{f.count.toLocaleString()} rows</span>
                  </div>
                ))}
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px',fontSize:'13px',color:'#065F46',paddingTop:'8px',borderTop:'1px solid #A7F3D0'}}>
                <div><strong>Combined total parsed:</strong> {preview.count.toLocaleString()}</div>
                <div><strong>Accounts:</strong> {preview.accts.join(', ')}</div>
                <div><strong>Dates:</strong> {preview.min} – {preview.max}</div>
                {preview.duplicatesSkipped>0&&<div><strong>Duplicates skipped:</strong> {preview.duplicatesSkipped}</div>}
              </div>
              {mode==='replace'&&(
                <div style={{marginTop:'10px',paddingTop:'10px',borderTop:'1px solid #A7F3D0'}}>
                  <div style={{fontSize:'12px',color:'#991B1B',fontWeight:'700',marginBottom:'8px'}}>⚠ This will replace all {existingCount.toLocaleString()} existing transactions with these {preview.count.toLocaleString()}. Enrichments and audit tags are stored separately and are not affected.</div>
                  <label style={{display:'block',fontSize:'11px',color:'#64748B',fontWeight:'600',marginBottom:'4px'}}>Type REPLACE to enable the button:</label>
                  <input value={replaceConfirm} onChange={e=>setReplaceConfirm(e.target.value)} placeholder="REPLACE" style={{border:'1px solid #FECACA',borderRadius:'8px',padding:'7px 10px',fontSize:'13px',width:'160px',fontFamily:'monospace'}}/>
                </div>
              )}
            </div>
          )}

          {/* Incremental review step — shows exactly what's about to be added before committing */}
          {mode==='incremental'&&diff&&(
            <div style={{background:'white',border:'1px solid #E2E8F0',borderRadius:'12px',padding:'14px'}}>
              <div style={{display:'flex',gap:'16px',marginBottom:'10px'}}>
                <div><span style={{fontSize:'20px',fontWeight:'700',color:'#1D4ED8'}}>{diff.newRows.length.toLocaleString()}</span><span style={{fontSize:'12px',color:'#64748B',marginLeft:'6px'}}>new — will be added</span></div>
                <div><span style={{fontSize:'20px',fontWeight:'700',color:'#94A3B8'}}>{diff.alreadyExists.length.toLocaleString()}</span><span style={{fontSize:'12px',color:'#64748B',marginLeft:'6px'}}>already in database — will be skipped</span></div>
              </div>
              {diff.renumberSuspect&&(
                <div style={{background:'#FFFBEB',border:'1px solid #FDE68A',borderRadius:'8px',padding:'10px 12px',fontSize:'12px',color:'#92400E',marginBottom:'10px'}}>
                  ⚠ <strong>{diff.backdated.toLocaleString()} of the {diff.newRows.length.toLocaleString()} "new" rows are dated inside the range already in the database.</strong> This pattern can mean the ledger export renumbered its rows (transaction IDs are row-number based), which would import duplicates under new IDs. Spot-check the preview below against existing data before committing — if rows look like duplicates, use Full Replace instead.
                </div>
              )}
              {diff.newRows.length===0?(
                <div style={{fontSize:'13px',color:'#94A3B8',fontStyle:'italic'}}>Nothing new to add — every parsed row already exists in Firestore.</div>
              ):(
                <>
                  <div style={{fontSize:'11px',fontWeight:'700',color:'#64748B',letterSpacing:'0.05em',textTransform:'uppercase',marginBottom:'8px'}}>Preview of new transactions</div>
                  <div style={{maxHeight:'260px',overflowY:'auto',border:'1px solid #F1F5F9',borderRadius:'8px'}}>
                    <table style={{width:'100%',borderCollapse:'collapse',fontSize:'12px'}}>
                      <thead style={{position:'sticky',top:0,background:'#F8FAFC'}}>
                        <tr>
                          <th style={{padding:'6px 10px',textAlign:'left',color:'#64748B',fontWeight:'700'}}>Date</th>
                          <th style={{padding:'6px 10px',textAlign:'left',color:'#64748B',fontWeight:'700'}}>Account</th>
                          <th style={{padding:'6px 10px',textAlign:'left',color:'#64748B',fontWeight:'700'}}>Description</th>
                          <th style={{padding:'6px 10px',textAlign:'right',color:'#64748B',fontWeight:'700'}}>Amount</th>
                        </tr>
                      </thead>
                      <tbody>
                        {newRowsToShow.map(r=>(
                          <tr key={r.id} style={{borderTop:'1px solid #F8FAFC'}}>
                            <td style={{padding:'6px 10px',whiteSpace:'nowrap',color:'#334155'}}>{r.date}</td>
                            <td style={{padding:'6px 10px',fontFamily:'monospace',color:'#475569'}}>{r.account}</td>
                            <td style={{padding:'6px 10px',color:'#334155',maxWidth:'220px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.desc}</td>
                            <td style={{padding:'6px 10px',textAlign:'right',fontWeight:'600',color:r.amt<0?'#DC2626':'#1E293B'}}>{fmt(r.amt)}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                  {diff.newRows.length>15&&(
                    <button onClick={()=>setShowAllNew(v=>!v)} style={{background:'none',border:'none',color:'#1D4ED8',fontSize:'12px',fontWeight:'600',cursor:'pointer',padding:'8px 0 0'}}>
                      {showAllNew?'Show fewer':`Show all ${diff.newRows.length.toLocaleString()} new rows`}
                    </button>
                  )}
                </>
              )}
            </div>
          )}
        </div>
        <div style={{display:'flex',gap:'10px',padding:'16px 22px',borderTop:'1px solid #E2E8F0',justifyContent:'flex-end'}}>
          <button onClick={onClose} style={{padding:'8px 18px',borderRadius:'8px',border:'1px solid #E2E8F0',background:'white',cursor:'pointer',color:'#64748B',fontWeight:'600',fontSize:'13px'}}>Cancel</button>
          <button onClick={confirm} disabled={!parsed||(mode==='incremental'&&diff&&diff.newRows.length===0)||(mode==='replace'&&replaceConfirm!=='REPLACE')} style={(()=>{const ok=parsed&&!(mode==='incremental'&&diff&&diff.newRows.length===0)&&!(mode==='replace'&&replaceConfirm!=='REPLACE');return{padding:'8px 20px',borderRadius:'8px',border:'none',background:ok?'#1D4ED8':'#E2E8F0',color:ok?'white':'#94A3B8',cursor:ok?'pointer':'not-allowed',fontWeight:'700',fontSize:'13px'};})()}>
            {mode==='incremental'?(diff?`Add ${diff.newRows.length.toLocaleString()} New Transactions`:'Add New Transactions'):'Replace All Data'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Allocation Schedule (extracted from old Revenue Tracker) ──────────────────
function AllocationView({txns}){
  const receivedTotal=PAYMENTS.filter(p=>p.status==='received').reduce((s,p)=>s+p.amt,0);
  const readyTotal=PAYMENTS.filter(p=>p.status==='ready').reduce((s,p)=>s+p.amt,0);
  const receivedNums=PAYMENTS.filter(p=>p.status==='received').map(p=>p.n);
  const readyNums=PAYMENTS.filter(p=>p.status==='ready').map(p=>p.n);
  const remainingNums=PAYMENTS.filter(p=>p.status!=='received'&&p.status!=='ready').map(p=>p.n);
  // Compress a list of payment numbers into a compact label, e.g. [1,2,3]→"Pmts 1–3", [4,6,7]→"Pmts 4, 6–7"
  function pmtRangeLabel(nums){
    if(nums.length===0)return 'none';
    const s=[...nums].sort((a,b)=>a-b);
    const parts=[];let start=s[0],prev=s[0];
    for(let i=1;i<=s.length;i++){
      const cur=s[i];
      if(cur===prev+1){prev=cur;continue;}
      parts.push(start===prev?String(start):start+'\u2013'+prev);
      start=cur;prev=cur;
    }
    return(nums.length===1?'Pmt ':'Pmts ')+parts.join(', ');
  }
  const reconciled=useMemo(()=>computePaymentReconciliation(txns),[txns]);
  const mismatchCount=reconciled.filter(p=>p.mismatch).length;
  return(
    <div style={{display:'flex',flexDirection:'column',gap:'16px'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'12px'}}>
        <KpiCard label={'Received ('+pmtRangeLabel(receivedNums)+')'} value={fmt(receivedTotal)} accent="#059669"/>
        <KpiCard label={'Ready to Invoice ('+pmtRangeLabel(readyNums)+')'} value={fmt(readyTotal)} color="#1D4ED8" accent="#1D4ED8"/>
        <KpiCard label={'Remaining ('+pmtRangeLabel(remainingNums)+')'} value={fmt(CONTRACT_TOTAL_DISPLAY-receivedTotal-readyTotal)} accent="#64748B"/>
      </div>
      {readyNums.length>0?(
        <Alert type="success"><strong>{pmtRangeLabel(readyNums)}</strong> ({fmt(readyTotal)}) have met their spending triggers and are eligible to invoice. Eligibility reflects ledger spend thresholds — invoicing and CDE approval are still manual steps.</Alert>
      ):(
        <Alert type="info">No payments are currently awaiting invoice. Statuses update as spend thresholds are met and deposits are recorded.</Alert>
      )}
      {mismatchCount>0&&(
        <Alert type="warn"><strong>{mismatchCount} payment{mismatchCount!==1?'s':''}</strong> {mismatchCount!==1?'have':'has'} a recorded status that doesn't match what the ledger data suggests — see the "System check" note under each flagged row below. Status is kept manual since real-world cash timing can't always be reconstructed automatically; use these as a prompt to double-check, not an auto-correction.</Alert>
      )}
      <div style={{background:'white',borderRadius:'12px',border:'1px solid #E2E8F0',overflow:'hidden'}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr style={{background:'#F8FAFC',borderBottom:'1px solid #E2E8F0'}}>{['Pmt #','Allocation','Grant Year','Amount','Trigger Condition','Status'].map((h,i)=><th key={h} style={{padding:'10px 16px',fontSize:'11px',fontWeight:'700',color:'#64748B',textTransform:'uppercase',textAlign:i===3?'right':'left'}}>{h}</th>)}</tr></thead>
          <tbody>{reconciled.map(p=>(<React.Fragment key={p.n}>
            <tr style={{background:p.status==='ready'?'#EFF6FF':p.status==='pending'?'#FFFBEB':'white',borderBottom:p.mismatch?'none':'1px solid #F8FAFC'}}>
              <td style={{padding:'10px 16px',fontWeight:'700',color:'#1E293B'}}>Pmt {p.n}</td>
              <td style={{padding:'10px 16px',color:'#64748B'}}>{p.alloc}</td>
              <td style={{padding:'10px 16px',color:'#64748B'}}>{p.fy}</td>
              <td style={{padding:'10px 16px',textAlign:'right',fontWeight:'700'}}>{fmt(p.amt)}</td>
              <td style={{padding:'10px 16px',color:'#64748B',fontSize:'12px'}}>{p.trigger}</td>
              <td style={{padding:'10px 16px'}}><StatusBadge status={p.status}/></td>
            </tr>
            {p.mismatch&&(
              <tr style={{background:p.status==='ready'?'#EFF6FF':p.status==='pending'?'#FFFBEB':'white',borderBottom:'1px solid #F8FAFC'}}>
                <td colSpan={6} style={{padding:'0 16px 10px',fontSize:'11px',color:'#D97706'}}>
                  ⚠ System check: ledger data suggests this payment may now be <strong>"{p.estimatedStatus}"</strong> instead of the recorded "{p.status}" — worth a manual review.
                </td>
              </tr>
            )}
          </React.Fragment>))}</tbody>
        </table>
      </div>
      <p style={{fontSize:'11px',color:'#94A3B8',margin:0}}>Status above is set manually. The system check compares real cumulative cash received (0110028) and cumulative primary spend (0110029+0110030) against each payment's trigger threshold, but does not auto-override — timing and partial deposits can't always be reconstructed precisely from ledger sums alone.</p>
    </div>
  );
}
