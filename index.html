// ── Stacked Bar Chart (no external library) ──────────────────────────────────
function StackedBarChart({data,height=260}){
  const maxVal=Math.max(1,...data.map(d=>Math.max((d.Contract||0)+(d.Carryover||0),d['Actual Spend']||0)));
  const barH=height-70;const N=data.length;const W=600;const lp=56;const rp=10;
  const gw=(W-lp-rp)/N;const bw=Math.max(22,gw*0.34);const gap=gw*0.08;
  return(
    <svg width="100%" height={height} viewBox={`0 0 ${W} ${height}`} preserveAspectRatio="xMidYMid meet" style={{display:'block'}}>
      {[0,0.25,0.5,0.75,1].map(f=>{
        const y=12+barH*(1-f);const val=Math.round(maxVal*f);
        return(<g key={f}><line x1={lp} y1={y} x2={W-rp} y2={y} stroke="#E2E8F0" strokeWidth="1"/><text x={lp-5} y={y+4} textAnchor="end" fontSize="10" fill="#94A3B8">{val>=1000?'$'+(val/1000).toFixed(0)+'k':'$'+val}</text></g>);
      })}
      {data.map((d,i)=>{
        const gx=lp+i*gw;const cx=gx+gw/2;
        const cH=Math.max(0,Math.round(barH*((d.Contract||0)/maxVal)));
        const cvH=Math.max(0,Math.round(barH*((d.Carryover||0)/maxVal)));
        const aH=Math.max(0,Math.round(barH*((d['Actual Spend']||0)/maxVal)));
        const totalH=cH+cvH;const bottom=12+barH;
        const bx1=cx-bw-gap/2;const bx2=cx+gap/2;
        return(
          <g key={i}>
            <rect x={gx+1} y={8} width={gw-2} height={barH+8} fill={i%2===0?'rgba(241,245,249,0.6)':'transparent'} rx="6"/>
            <line x1={gx} y1={0} x2={gx} y2={barH+20} stroke={i>0?'#E2E8F0':'none'} strokeWidth="1"/>
            {totalH>0&&<>
              <rect x={bx1} y={bottom-cH} width={bw} height={cH} fill="#93C5FD"/>
              {cvH>0&&<rect x={bx1} y={bottom-totalH} width={bw} height={cvH} fill="#F59E0B" rx="3"/>}
              {cH===0&&totalH>0&&<rect x={bx1} y={bottom-totalH} width={bw} height={totalH} fill="#93C5FD" rx="3"/>}
              <text x={bx1+bw/2} y={bottom-totalH-5} textAnchor="middle" fontSize="9" fill="#64748B">{((d.Contract||0)+(d.Carryover||0))>=1000?'$'+(((d.Contract||0)+(d.Carryover||0))/1000).toFixed(0)+'k':('$'+((d.Contract||0)+(d.Carryover||0)))}</text>
            </>}
            {aH>0&&<>
              <rect x={bx2} y={bottom-aH} width={bw} height={aH} fill="#1D4ED8" rx="3"/>
              <text x={bx2+bw/2} y={bottom-aH-5} textAnchor="middle" fontSize="9" fill="#1D4ED8">{(d['Actual Spend']||0)>=1000?'$'+((d['Actual Spend']||0)/1000).toFixed(0)+'k':('$'+(d['Actual Spend']||0))}</text>
            </>}
            <text x={cx} y={height-32} textAnchor="middle" fontSize="12" fontWeight="700" fill="#334155">{d.fy}</text>
            <text x={bx1+bw/2} y={height-20} textAnchor="middle" fontSize="9" fill="#94A3B8">Available</text>
            <text x={bx2+bw/2} y={height-20} textAnchor="middle" fontSize="9" fill="#94A3B8">Spent</text>
          </g>
        );
      })}
      <g transform={`translate(55,${height-6})`}><rect width="12" height="10" fill="#93C5FD" rx="2" y="-9"/><text x="15" y="0" fontSize="10" fill="#64748B">Contract</text></g>
      <g transform={`translate(155,${height-6})`}><rect width="12" height="10" fill="#F59E0B" rx="2" y="-9"/><text x="15" y="0" fontSize="10" fill="#64748B">Carryover</text></g>
      <g transform={`translate(255,${height-6})`}><rect width="12" height="10" fill="#1D4ED8" rx="2" y="-9"/><text x="15" y="0" fontSize="10" fill="#64748B">Actual Spend</text></g>
    </svg>
  );
}

// (legacy simple bar — kept for reference, not used)
function SimpleBarChart({data,bars,height=220}){
  const maxVal=Math.max(1,...data.flatMap(d=>bars.map(b=>d[b.key]||0)));
  const barH=height-50;const W=100/data.length;
  const colors=bars.map(b=>b.color);
  return(
    <div style={{width:'100%',overflowX:'auto'}}>
      <svg width="100%" height={height} viewBox={`0 0 600 ${height}`} preserveAspectRatio="xMidYMid meet">
        {/* Y-axis labels */}
        {[0,0.25,0.5,0.75,1].map(f=>{
          const y=10+barH*(1-f);const val=Math.round(maxVal*f);
          return <g key={f}><line x1="45" y1={y} x2="580" y2={y} stroke="#E2E8F0" strokeWidth="1"/><text x="40" y={y+4} textAnchor="end" fontSize="10" fill="#94A3B8">{val>=1000?'$'+(val/1000).toFixed(0)+'k':'$'+val}</text></g>;
        })}
        {/* Bars */}
        {data.map((d,i)=>{
          const slotW=535/data.length;const x=45+i*slotW;const bw=Math.max(8,slotW/bars.length-4);
          return(
            <g key={i}>
              {bars.map((b,j)=>{
                const val=d[b.key]||0;const bh=barH*(val/maxVal);const by=10+barH-bh;
                const bx=x+j*(bw+2);
                return <rect key={j} x={bx} y={by} width={bw} height={bh} fill={b.color} rx="2"/>;
              })}
              <text x={x+slotW/2-6} y={height-10} textAnchor="middle" fontSize="11" fill="#64748B">{d.fy}</text>
            </g>
          );
        })}
        {/* Legend */}
        {bars.map((b,i)=>(
          <g key={i} transform={`translate(${50+i*120},${height-28})`}>
            <rect width="12" height="12" fill={b.color} rx="2" y="-10"/>
            <text x="16" y="1" fontSize="11" fill="#64748B">{b.label}</text>
          </g>
        ))}
      </svg>
    </div>
  );
}

// ── CSV Parser ────────────────────────────────────────────────────────────────
function parseCSVtoTxns(text){
  const lines=text.trim().split(/\r?\n/);
  if(lines.length<2) return [];
  const headers=lines[0].split(',').map(h=>h.replace(/^"|"$/g,'').trim());
  const streamMap={"0110028":"primary","0110029":"primary","0110237":"coe","0110238":"coe"};
  const flowMap={"0110028":"revenue","0110029":"expense","0110237":"revenue","0110238":"expense"};
  const sacsLabel={"1000s":"Certificated Salaries","2000s":"Classified Salaries","3000s":"Employee Benefits","4000s":"Books & Supplies","5000s":"Services & Operating","5100s":"Subagreements","5200s":"Travel & Conference","6000s":"Capital Outlay","7000s":"Indirect Costs","8xxx":"Revenue","9xxx":"Balance Sheet","Other":"Other","Unknown":"Unknown"};
  function sacsGroup(obj){const o=parseInt(obj||"0");if(isNaN(o))return"Unknown";if(o>=1000&&o<=1999)return"1000s";if(o>=2000&&o<=2999)return"2000s";if(o>=3000&&o<=3999)return"3000s";if(o>=4000&&o<=4999)return"4000s";if(o>=5100&&o<=5199)return"5100s";if(o>=5200&&o<=5299)return"5200s";if(o>=5000&&o<=5999)return"5000s";if(o>=6000&&o<=6999)return"6000s";if(o>=7000&&o<=7999)return"7000s";if(o>=8000&&o<=8999)return"8xxx";if(o>=9000&&o<=9999)return"9xxx";return"Other";}
  function parseLine(line){const fields=[];let cur='',inQ=false;for(const c of line){if(c==='"'){inQ=!inQ;}else if(c===','&&!inQ){fields.push(cur.trim());cur='';}else{cur+=c;}}fields.push(cur.trim());return fields;}
  function clean(v){return(v||'').replace(/^="?|"?$/g,'').trim();}
  function toISO(d){const m=(d||'').match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);return m?`${m[3]}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`:(d||'');}
  function toFY(s){const m=(s||'').match(/(\d{4})-(\d{2})/);if(!m)return'Unknown';const yr=+m[1],mo=+m[2];return mo<7?`FY${String(yr-1).slice(-2)}/${String(yr).slice(-2)}`:`FY${String(yr).slice(-2)}/${String(yr+1).slice(-2)}`;}
  const results=[];
  for(let i=1;i<lines.length;i++){
    if(!lines[i].trim()) continue;
    const fields=parseLine(lines[i]);const row={};
    headers.forEach((h,j)=>row[h]=fields[j]||'');
    const rowNum=parseInt(row['RowNum'])||i;
    const acct=clean(row['KEY']||row['Pseudo']||'').replace(/[^0-9]/g,'');
    if(!acct) continue;
    const obj=clean(row['OBJ']||row['Object']||'');
    const date=toISO(row['TRANS_DATE']||row['Date']||'');
    const amt=parseFloat((row['AMT']||row['Amount']||'0').replace(/[,$]/g,''))||0;
    const sg=sacsGroup(obj);
    results.push({id:`${acct}-${rowNum}-imp`,account:acct,stream:streamMap[acct]||'primary',flow:flowMap[acct]||'expense',date,fy:toFY(date),desc:(row['TRANS_DESC']||row['Trans Desc']||'').trim().slice(0,80),type:(row['TRANS_TYPE']||row['Tp']||'').trim(),ref:(row['REF']||row['Primary Ref']||'').trim(),amt,obj,obj_desc:(row['OBJ_DESC']||'').trim(),sacs_group:sg,sacs_label:sacsLabel[sg]||sg,ck:clean(row['CK_NO']||row['Check No']||'')});
  }
  return results;
}

  const totalActual=bud.lines.reduce((s,l)=>s+(actuals[l.code]||0),0);
  const th={padding:'10px 16px',fontSize:'11px',fontWeight:'700',color:'#64748B',textTransform:'uppercase',letterSpacing:'0.05em',textAlign:'left',background:'#F8FAFC',borderBottom:'1px solid #E2E8F0'};

        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr>
            <th style={th}>SACS Category</th>
            <th style={{...th,textAlign:'right'}}>Budgeted</th>
            <th style={{...th,textAlign:'right'}}>Actual</th>
            <th style={{...th,textAlign:'right'}}>Variance</th>
            <th style={{...th,textAlign:'right'}}>Var %</th>
            <th style={{...th,width:'160px'}}>Utilization</th>
          </tr></thead>

            {bud.lines.map(line=>{

                  <td style={{...td,textAlign:'right',fontWeight:'700',color:v>0?'#DC2626':v<0?'#059669':'#94A3B8'}}>{line.budget>0?(v>=0?'+':'')+fmt(v):'—'}</td>
                  <td style={{...td,textAlign:'right',fontSize:'12px',color:over10?'#D97706':'#94A3B8'}}>{line.budget>0?pct(act,line.budget):'—'}{over10&&' ⚠'}</td>
                  <td style={td}><div style={{height:'6px',background:'#F1F5F9',borderRadius:'3px',overflow:'hidden'}}><div style={{height:'100%',borderRadius:'3px',width:Math.min(100,u)+'%',background:u>110?'#DC2626':u>100?'#D97706':'#1D4ED8'}}/></div></td>
                </tr>
              );
            })}
          </tbody>
          <tfoot>
            <tr style={{background:'#F8FAFC',fontWeight:'700'}}>
              <td style={td}>TOTAL</td>
              <td style={{...td,textAlign:'right'}}>{fmt(bud.contract)}</td>
              <td style={{...td,textAlign:'right'}}>{fmt(totalActual)}</td>
              <td style={{...td,textAlign:'right',color:totalActual-bud.contract>0?'#DC2626':'#059669'}}>{(totalActual-bud.contract>=0?'+':'')+fmt(totalActual-bud.contract)}</td>
              <td style={{...td,textAlign:'right',fontSize:'12px',color:'#94A3B8'}}>{pct(totalActual,bud.contract)}</td>
              <td style={td}/>
            </tr>
          </tfoot>
        </table>
      </div>
      {selFY==='FY24/25'&&<Alert type="warn"><strong>Budget Amendment Review:</strong> FY24/25 shows $86,100 in consultant services and $28,236 in travel — neither appeared in Plan B. Contract requires amendments for &gt;10% variance. Confirm documentation exists.</Alert>}
      <div style={{background:'white',borderRadius:'12px',border:'1px solid #E2E8F0',padding:'16px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'12px'}}>
          <span style={{fontWeight:'600',fontSize:'14px',color:'#1E293B'}}>Budget Amendment Log — {selFY}</span>
          <button onClick={()=>setShowForm(v=>!v)} style={{background:'#1D4ED8',color:'white',border:'none',borderRadius:'6px',padding:'6px 12px',fontSize:'12px',fontWeight:'600',cursor:'pointer',display:'flex',alignItems:'center',gap:'4px'}}>+ Add Amendment</button>
        </div>
        {showForm&&(
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 2fr 1fr auto',gap:'8px',marginBottom:'12px',background:'#F8FAFC',padding:'12px',borderRadius:'8px'}}>
            <input placeholder="Date" value={newA.date} onChange={e=>setNewA(p=>({...p,date:e.target.value}))} style={{border:'1px solid #E2E8F0',borderRadius:'6px',padding:'7px 10px'}}/>
            <input placeholder="Category" value={newA.category} onChange={e=>setNewA(p=>({...p,category:e.target.value}))} style={{border:'1px solid #E2E8F0',borderRadius:'6px',padding:'7px 10px'}}/>
            <input placeholder="Description" value={newA.description} onChange={e=>setNewA(p=>({...p,description:e.target.value}))} style={{border:'1px solid #E2E8F0',borderRadius:'6px',padding:'7px 10px'}}/>
            <input placeholder="Amount $" value={newA.amount} onChange={e=>setNewA(p=>({...p,amount:e.target.value}))} style={{border:'1px solid #E2E8F0',borderRadius:'6px',padding:'7px 10px'}}/>
            <button onClick={()=>{if(newA.description){setAmendments(a=>[...a,{...newA,fy:selFY,id:Date.now()}]);setNewA({date:'',category:'',description:'',amount:''});setShowForm(false);}}} style={{background:'#1D4ED8',color:'white',border:'none',borderRadius:'6px',padding:'7px 14px',fontWeight:'600',cursor:'pointer'}}>Save</button>
          </div>
        )}
        {amendments.filter(a=>a.fy===selFY).length===0?<p style={{color:'#94A3B8',fontSize:'13px',fontStyle:'italic',margin:0}}>No amendments logged for {selFY}</p>:
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead><tr style={{borderBottom:'1px solid #E2E8F0'}}>{['Date','Category','Description','Amount',''].map(h=><th key={h} style={{padding:'6px 8px',fontSize:'11px',fontWeight:'700',color:'#64748B',textTransform:'uppercase',textAlign:h==='Amount'?'right':'left'}}>{h}</th>)}</tr></thead>
            <tbody>{amendments.filter(a=>a.fy===selFY).map(a=><tr key={a.id} style={{borderBottom:'1px solid #F8FAFC'}}><td style={{padding:'7px 8px',fontSize:'13px'}}>{a.date}</td><td style={{padding:'7px 8px',fontSize:'13px'}}>{a.category}</td><td style={{padding:'7px 8px',fontSize:'13px'}}>{a.description}</td><td style={{padding:'7px 8px',fontSize:'13px',textAlign:'right',fontWeight:'600'}}>{a.amount?fmt(parseFloat(a.amount)||0):'—'}</td><td style={{padding:'7px 8px',textAlign:'right'}}><button onClick={()=>setAmendments(aa=>aa.filter(x=>x.id!==a.id))} style={{background:'none',border:'none',color:'#94A3B8',cursor:'pointer',fontSize:'16px'}} onMouseOver={e=>e.target.style.color='#EF4444'} onMouseOut={e=>e.target.style.color='#94A3B8'}>×</button></td></tr>)}</tbody>
          </table>
        }
      </div>
    </div>
  );
}

                          <input placeholder="Amount $" value={row.amount||''} onChange={e=>setEditPartners(r=>r.map((x,j)=>j===i?{...x,amount:e.target.value}:x))} style={inp}/>
                          <input placeholder="0110238 Txn ID" value={row.txnId238||''} onChange={e=>setEditPartners(r=>r.map((x,j)=>j===i?{...x,txnId238:e.target.value}:x))} style={{...inp,background:'#FFF7ED',borderColor:'#FED7AA'}}/>
                          <label style={{display:'flex',alignItems:'center',gap:'4px',fontSize:'12px',whiteSpace:'nowrap'}}><input type="checkbox" checked={!!row.paid} onChange={e=>setEditPartners(r=>r.map((x,j)=>j===i?{...x,paid:e.target.checked}:x))}/> Paid</label>
                          {editPartners.length>1&&<button onClick={()=>setEditPartners(r=>r.filter((_,j)=>j!==i))} style={{background:'none',border:'none',color:'#94A3B8',cursor:'pointer',fontSize:'16px'}}>x</button>}
                        </div>))}
                        <button onClick={()=>setEditPartners(r=>[...r,{id:Date.now(),partner:'',amount:'',txnId238:'',paid:false}])} style={{background:'none',border:'none',color:'#1D4ED8',fontSize:'12px',cursor:'pointer',padding:0,fontWeight:'600'}}>+ Add partner</button>
                      </div>
                      <div style={{display:'flex',gap:'8px',justifyContent:'flex-end'}}>
                        <button onClick={()=>setEditingId(null)} style={{border:'1px solid #E2E8F0',background:'white',borderRadius:'8px',padding:'7px 14px',cursor:'pointer',color:'#64748B',fontSize:'13px'}}>Cancel</button>
                        <button onClick={()=>saveEdit(ev.id)} style={{background:'#1D4ED8',color:'white',border:'none',borderRadius:'8px',padding:'7px 14px',fontWeight:'600',cursor:'pointer',fontSize:'13px'}}>Save Changes</button>
                      </div>
                    </div>
                  ):(
                    <div key={ev.id} style={{padding:'12px 16px',borderBottom:'1px solid #F8FAFC'}}>
                      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between'}}>
                        <div style={{flex:1}}>
                          <div style={{fontWeight:'600',fontSize:'14px',color:'#1E293B'}}>{ev.eventName}</div>
                          <div style={{fontSize:'12px',color:'#64748B',marginTop:'2px'}}>{ev.subject} - {ev.coe} COE - {ev.date||'No date'}</div>
                          {ev.txn237&&<div style={{fontSize:'11px',color:'#059669',marginTop:'3px',fontWeight:'600'}}>COE receipt matched: {ev.txn237}</div>}
                          <div style={{display:'flex',flexWrap:'wrap',gap:'6px',marginTop:'8px'}}>
                            {ev.partners.map((p,pi)=><span key={pi} style={{padding:'2px 8px',borderRadius:'20px',fontSize:'11px',fontWeight:'600',background:p.paid?'#D1FAE5':'#F1F5F9',color:p.paid?'#065F46':'#475569'}}>{p.partner}: {fmt(parseFloat(p.amount)||0)} {p.paid?'(paid)':'(pending)'}{p.txnId238?' ['+p.txnId238+']':''}</span>)}
                          </div>
                        </div>
                        <div style={{display:'flex',alignItems:'center',gap:'8px',marginLeft:'12px',flexShrink:0}}>
                          <span style={{padding:'3px 10px',borderRadius:'20px',fontSize:'11px',fontWeight:'700',background:statusBg[ev.invoiceStatus]||'#F1F5F9',color:statusTc[ev.invoiceStatus]||'#64748B'}}>{statusL[ev.invoiceStatus]||ev.invoiceStatus}</span>
                          <button onClick={()=>startEdit(ev)} style={{background:'#EFF6FF',border:'1px solid #BFDBFE',borderRadius:'6px',padding:'4px 10px',cursor:'pointer',color:'#1D4ED8',fontSize:'12px',fontWeight:'600'}}>Edit</button>
                          <button onClick={()=>setEvents(es=>es.filter(x=>x.id!==ev.id))} style={{background:'none',border:'none',color:'#94A3B8',cursor:'pointer',fontSize:'18px'}} onMouseOver={e=>e.target.style.color='#EF4444'} onMouseOut={e=>e.target.style.color='#94A3B8'}>x</button>
                        </div>
                      </div>
                    </div>
                  )
                ))}
              </div>
            ))}</div>
          }
        </div>
      )}
    </div>
  );
}

// ── Transaction Ledger Tab ────────────────────────────────────────────────────
function LedgerTab({txns,enrichments,auditTags,onJumpToEnrich}){
  const [filters,setFilters]=useState({search:'',account:'',fy:'',type:'',sacs:''});
  const [sortCol,setSortCol]=useState('date');
  const [sortDir,setSortDir]=useState('desc');
  const [page,setPage]=useState(0);
  const PAGE=50;
  const filtered=useMemo(()=>{
    let r=txns;
    if(filters.search){const q=filters.search.toLowerCase();r=r.filter(t=>t.desc.toLowerCase().includes(q)||t.ref.toLowerCase().includes(q)||t.obj_desc.toLowerCase().includes(q));}
    if(filters.account) r=r.filter(t=>t.account===filters.account);
    if(filters.fy) r=r.filter(t=>t.fy===filters.fy);
    if(filters.type) r=r.filter(t=>t.type===filters.type);
    if(filters.sacs) r=r.filter(t=>t.sacs_group===filters.sacs);
    return [...r].sort((a,b)=>{const v=sortCol==='amt'?a.amt-b.amt:(a[sortCol]||'').localeCompare(b[sortCol]||'');return sortDir==='asc'?v:-v;});
  },[txns,filters,sortCol,sortDir]);
  const pages=Math.ceil(filtered.length/PAGE);
  const shown=filtered.slice(page*PAGE,(page+1)*PAGE);
  function setF(k,v){setFilters(f=>({...f,[k]:v}));setPage(0);}
  function toggleSort(col){if(sortCol===col)setSortDir(d=>d==='asc'?'desc':'asc');else{setSortCol(col);setSortDir('asc');}}
  const th={padding:'10px 12px',fontSize:'11px',fontWeight:'700',color:'#64748B',textTransform:'uppercase',letterSpacing:'0.05em',textAlign:'left',background:'#F8FAFC',borderBottom:'1px solid #E2E8F0',cursor:'pointer',userSelect:'none',whiteSpace:'nowrap'};
  const td={padding:'10px 12px',fontSize:'12px',color:'#334155',borderBottom:'1px solid #F8FAFC'};
  const inp={border:'1px solid #E2E8F0',borderRadius:'8px',padding:'8px 12px',width:'100%',fontSize:'13px'};
  return(
    <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
      <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
        <span style={{padding:'4px 12px',background:'#FEF3C7',border:'1px solid #FED7AA',borderRadius:'6px',fontSize:'12px',fontWeight:'700',color:'#92400E'}}>READ ONLY — Source Data</span>
        <span style={{fontSize:'13px',color:'#64748B'}}>{filtered.length.toLocaleString()} of {txns.length.toLocaleString()} records</span>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr 1fr 1fr',gap:'8px'}}>
        <input placeholder="🔍 Search description, ref, category…" value={filters.search} onChange={e=>setF('search',e.target.value)} style={inp}/>
        <select value={filters.account} onChange={e=>setF('account',e.target.value)} style={inp}>
          <option value="">All Accounts</option>
          {['0110028','0110029','0110237','0110238'].map(a=><option key={a} value={a}>{ACCT_OPT(a)}</option>)}
        </select>
        <select value={filters.fy} onChange={e=>setF('fy',e.target.value)} style={inp}><option value="">All Years</option>{FY_LIST.slice(0,3).map(f=><option key={f} value={f}>{f}</option>)}</select>
        <select value={filters.type} onChange={e=>setF('type',e.target.value)} style={inp}><option value="">All Types</option>{['JE','OH','AR','CR','TR'].map(t=><option key={t} value={t}>{t}</option>)}</select>
        <select value={filters.sacs} onChange={e=>setF('sacs',e.target.value)} style={inp}>{SACS_OPTS.map(([v,l])=><option key={v} value={v}>{l}</option>)}</select>
      </div>
      <div style={{background:'white',borderRadius:'12px',border:'1px solid #E2E8F0',overflow:'hidden'}}>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',minWidth:'1000px'}}>
            <thead>
              <tr>
                {[['date','Date'],['account','Account'],['type','Type'],['desc','Description'],['obj_desc','Category'],['sacs_label','SACS Group'],['amt','Amount']].map(([col,lbl])=>(
                  <th key={col} onClick={()=>toggleSort(col)} style={th}>
                    <span style={{display:'flex',alignItems:'center',gap:'4px'}}>{lbl} <SortIcon col={col} sortCol={sortCol} sortDir={sortDir}/></span>
                  </th>
                ))}
                <th style={th}>Flags</th>
                <th style={{...th,cursor:'default',width:'40px'}}/>
              </tr>
            </thead>
            <tbody>
              {shown.map(t=>{
                const enr=enrichments[t.id];
                const tags=auditTags[t.id]||[];
                return(
                  <tr key={t.id} style={{background:'white'}} onMouseOver={e=>e.currentTarget.style.background='#F8FAFC'} onMouseOut={e=>e.currentTarget.style.background='white'}>
                    <td style={{...td,whiteSpace:'nowrap'}}>{t.date}</td>
                    <td style={td}>
                      <div style={{display:'flex',flexDirection:'column',gap:'2px'}}>
                        <AcctBadge account={t.account}/>
                        <span style={{fontSize:'10px',color:'#94A3B8'}}>{ACCT_LABEL[t.account]}</span>
                      </div>
                    </td>
                    <td style={{...td,color:'#94A3B8'}}>{t.type}</td>
                    <td style={{...td,maxWidth:'220px'}}>
                      <div style={{fontWeight:'500',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{enr?.desc||t.desc}</div>
                      {enr?.desc&&<div style={{fontSize:'10px',color:'#94A3B8',fontStyle:'italic',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.desc}</div>}
                    </td>
                    <td style={td}>{t.obj_desc}</td>
                    <td style={{...td,color:'#64748B'}}>{t.sacs_label}</td>
                    <td style={{...td,textAlign:'right',fontWeight:'700',color:t.amt<0?'#DC2626':'#1E293B',whiteSpace:'nowrap'}}>{fmt(t.amt)}</td>
                    <td style={td}>
                      <div style={{display:'flex',flexWrap:'wrap',gap:'3px'}}>
                        {tags.map(tag=>{const ti=AUDIT_TAGS.find(x=>x.id===tag);return ti?<span key={tag} style={{padding:'1px 6px',borderRadius:'20px',fontSize:'10px',fontWeight:'700',background:ti.bg,color:ti.color}}>{ti.label.split(' ')[0]}</span>:null;})}
                      </div>
                    </td>
                    <td style={td}>
                      <button onClick={()=>onJumpToEnrich(t.id)} title="Open in Enrichment & Audit" style={{background:'none',border:'none',cursor:'pointer',fontSize:'14px',color:'#CBD5E1',padding:'2px'}} onMouseOver={e=>e.target.style.color='#1D4ED8'} onMouseOut={e=>e.target.style.color='#CBD5E1'}>✏️</button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
      {pages>1&&(
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <span style={{fontSize:'13px',color:'#64748B'}}>Page {page+1} of {pages}</span>
          <div style={{display:'flex',gap:'8px'}}>
            <button disabled={page===0} onClick={()=>setPage(p=>p-1)} style={{padding:'7px 16px',borderRadius:'8px',border:'1px solid #E2E8F0',background:'white',cursor:page===0?'not-allowed':'pointer',color:page===0?'#CBD5E1':'#334155',fontWeight:'600',fontSize:'13px'}}>← Prev</button>
            <button disabled={page>=pages-1} onClick={()=>setPage(p=>p+1)} style={{padding:'7px 16px',borderRadius:'8px',border:'1px solid #E2E8F0',background:'white',cursor:page>=pages-1?'not-allowed':'pointer',color:page>=pages-1?'#CBD5E1':'#334155',fontWeight:'600',fontSize:'13px'}}>Next →</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Enrichment & Audit Tab ────────────────────────────────────────────────────
function EnrichmentTab({txns,enrichments,setEnrichments,auditTags,setAuditTags,jumpToId,clearJump}){
  const [filters,setFilters]=useState({search:'',account:'',fy:'',sacs:'',tagged:'all'});
  const [page,setPage]=useState(0);
  const rowRefs=useRef({});
  const PAGE=25;
  function setF(k,v){setFilters(f=>({...f,[k]:v}));setPage(0);}
  const filtered=useMemo(()=>{
    let r=txns;
    if(filters.search){const q=filters.search.toLowerCase();r=r.filter(t=>t.desc.toLowerCase().includes(q)||(enrichments[t.id]?.desc||'').toLowerCase().includes(q)||t.obj_desc.toLowerCase().includes(q));}
    if(filters.account) r=r.filter(t=>t.account===filters.account);
    if(filters.fy) r=r.filter(t=>t.fy===filters.fy);
    if(filters.sacs) r=r.filter(t=>t.sacs_group===filters.sacs);
    if(filters.tagged==='tagged') r=r.filter(t=>(auditTags[t.id]||[]).length>0||enrichments[t.id]?.desc);
    if(filters.tagged==='untagged') r=r.filter(t=>!(auditTags[t.id]||[]).length&&!enrichments[t.id]?.desc);
    return r;
  },[txns,filters,enrichments,auditTags]);
  const pages=Math.ceil(filtered.length/PAGE);
  const shown=filtered.slice(page*PAGE,(page+1)*PAGE);
  useEffect(()=>{
    if(!jumpToId) return;
    const idx=filtered.findIndex(t=>t.id===jumpToId);
    if(idx===-1){setFilters({search:'',account:'',fy:'',sacs:'',tagged:'all'});setPage(0);setTimeout(()=>clearJump(),200);return;}
    const tp=Math.floor(idx/PAGE);setPage(tp);
    setTimeout(()=>{const el=rowRefs.current[jumpToId];if(el){el.scrollIntoView({behavior:'smooth',block:'center'});el.style.outline='3px solid #3B82F6';el.style.borderRadius='12px';setTimeout(()=>{if(el){el.style.outline='';el.style.borderRadius='';}},2500);}clearJump();},150);
  },[jumpToId]);
  function updateEnr(id,field,val){setEnrichments(e=>({...e,[id]:{...(e[id]||{}),[field]:val}}));}
  function toggleTag(id,tagId){setAuditTags(t=>{const cur=t[id]||[];return{...t,[id]:cur.includes(tagId)?cur.filter(x=>x!==tagId):[...cur,tagId]};});}
  const inp={border:'1px solid #E2E8F0',borderRadius:'8px',padding:'8px 12px',width:'100%',fontSize:'13px'};
  return(
    <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
      <div style={{display:'flex',alignItems:'center',gap:'10px',flexWrap:'wrap'}}>
        <span style={{padding:'4px 12px',background:'#EFF6FF',border:'1px solid #BFDBFE',borderRadius:'6px',fontSize:'12px',fontWeight:'700',color:'#1E40AF'}}>ENRICHMENT LAYER — Edits do not affect source data</span>
        <span style={{fontSize:'13px',color:'#64748B'}}>{filtered.length.toLocaleString()} records shown</span>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr 1fr',gap:'8px'}}>
        <input placeholder="🔍 Search…" value={filters.search} onChange={e=>setF('search',e.target.value)} style={inp}/>
        <select value={filters.account} onChange={e=>setF('account',e.target.value)} style={inp}>
          <option value="">All Accounts</option>
          {['0110028','0110029','0110237','0110238'].map(a=><option key={a} value={a}>{ACCT_OPT(a)}</option>)}
        </select>
        <select value={filters.fy} onChange={e=>setF('fy',e.target.value)} style={inp}><option value="">All Years</option>{FY_LIST.slice(0,3).map(f=><option key={f} value={f}>{f}</option>)}</select>
        <select value={filters.sacs} onChange={e=>setF('sacs',e.target.value)} style={inp}>{SACS_OPTS.map(([v,l])=><option key={v} value={v}>{l}</option>)}</select>
      </div>
      <div style={{display:'flex',gap:'8px'}}>
        {[['all','All'],['tagged','Enriched / Tagged'],['untagged','Not Yet Enriched']].map(([v,l])=>(
          <button key={v} onClick={()=>setF('tagged',v)} style={{padding:'6px 14px',borderRadius:'20px',fontSize:'12px',fontWeight:'600',border:'1px solid',cursor:'pointer',background:filters.tagged===v?'#1E293B':'white',color:filters.tagged===v?'white':'#64748B',borderColor:filters.tagged===v?'#1E293B':'#E2E8F0'}}>{l}</button>
        ))}
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
        {shown.map(t=>{
          const enr=enrichments[t.id]||{};
          const tags=auditTags[t.id]||[];
          const hasData=tags.length>0||enr.desc;
          return(
            <div key={t.id} ref={el=>rowRefs.current[t.id]=el} style={{background:hasData?'#FAFCFF':'white',borderRadius:'12px',border:hasData?'1px solid #BFDBFE':'1px solid #E2E8F0',padding:'14px'}}>
              <div style={{display:'grid',gridTemplateColumns:'100px 1fr 1.8fr 1.4fr 80px',gap:'14px',alignItems:'start'}}>
                <div>
                  <div style={{fontSize:'11px',color:'#94A3B8',marginBottom:'6px'}}>{t.date.slice(5)}</div>
                  <AcctBadge account={t.account}/>
                  <div style={{fontSize:'10px',color:'#94A3B8',marginTop:'4px'}}>{t.type}</div>
                </div>
                <div>
                  <div style={{fontSize:'10px',color:'#94A3B8',fontWeight:'600',marginBottom:'4px'}}>Original (read-only)</div>
                  <div style={{fontSize:'11px',fontFamily:'monospace',background:'#F8FAFC',borderRadius:'6px',padding:'5px 8px',color:'#475569',wordBreak:'break-all'}}>{t.desc}</div>
                  <div style={{fontSize:'11px',color:'#94A3B8',marginTop:'4px'}}>{t.obj_desc} · {t.sacs_label}</div>
                </div>
                <div>
                  <div style={{fontSize:'10px',color:'#94A3B8',fontWeight:'600',marginBottom:'4px'}}>Full description (editable)</div>
                  <input value={enr.desc||''} onChange={e=>updateEnr(t.id,'desc',e.target.value)} placeholder="Expand the truncated description here…" style={{...inp,marginBottom:'6px'}}/>
                  <textarea value={enr.notes||''} onChange={e=>updateEnr(t.id,'notes',e.target.value)} placeholder="Notes…" rows={1} style={{...inp,resize:'none'}}/>
                </div>
                <div>
                  <div style={{fontSize:'10px',color:'#94A3B8',fontWeight:'600',marginBottom:'6px'}}>Audit Tags</div>
                  <div style={{display:'flex',flexWrap:'wrap',gap:'4px'}}>
                    {AUDIT_TAGS.map(tag=>(
                      <button key={tag.id} onClick={()=>toggleTag(t.id,tag.id)} style={{padding:'3px 8px',borderRadius:'20px',fontSize:'11px',fontWeight:'600',border:'1px solid',cursor:'pointer',background:tags.includes(tag.id)?tag.bg:'white',color:tags.includes(tag.id)?tag.color:'#94A3B8',borderColor:tags.includes(tag.id)?tag.color:'#E2E8F0'}}>
                        {tag.label.split(' ')[0]}
                      </button>
                    ))}
                  </div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontWeight:'700',fontSize:'14px',color:t.amt<0?'#DC2626':'#1E293B'}}>{fmt(t.amt)}</div>
                </div>
              </div>
            </div>
          );
        })}
      </div>
      {pages>1&&(
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <span style={{fontSize:'13px',color:'#64748B'}}>Page {page+1} of {pages} · {filtered.length} records</span>
          <div style={{display:'flex',gap:'8px'}}>
            <button disabled={page===0} onClick={()=>setPage(p=>p-1)} style={{padding:'7px 16px',borderRadius:'8px',border:'1px solid #E2E8F0',background:'white',cursor:page===0?'not-allowed':'pointer',color:page===0?'#CBD5E1':'#334155',fontWeight:'600',fontSize:'13px'}}>← Prev</button>
            <button disabled={page>=pages-1} onClick={()=>setPage(p=>p+1)} style={{padding:'7px 16px',borderRadius:'8px',border:'1px solid #E2E8F0',background:'white',cursor:page>=pages-1?'not-allowed':'pointer',color:page>=pages-1?'#CBD5E1':'#334155',fontWeight:'600',fontSize:'13px'}}>Next →</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Audit Summary Tab ─────────────────────────────────────────────────────────
function AuditSummaryTab({txns,enrichments,auditTags}){
  const [filterTag,setFilterTag]=useState('');
  const tagged=txns.filter(t=>(auditTags[t.id]||[]).length>0);
  const filtered=filterTag?tagged.filter(t=>(auditTags[t.id]||[]).includes(filterTag)):tagged;
  const byTag=AUDIT_TAGS.map(tag=>({...tag,count:tagged.filter(t=>(auditTags[t.id]||[]).includes(tag.id)).length,total:tagged.filter(t=>(auditTags[t.id]||[]).includes(tag.id)).reduce((s,t)=>s+Math.abs(t.amt),0)})).filter(t=>t.count>0);
  const th={padding:'10px 16px',fontSize:'11px',fontWeight:'700',color:'#64748B',textTransform:'uppercase',letterSpacing:'0.05em',textAlign:'left',background:'#F8FAFC',borderBottom:'1px solid #E2E8F0'};
  const td={padding:'10px 16px',fontSize:'12px',color:'#334155',borderBottom:'1px solid #F8FAFC'};
  return(
    <div style={{display:'flex',flexDirection:'column',gap:'18px'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'12px'}}>
        <KpiCard label="Tagged Transactions" value={tagged.length} accent="#64748B"/>
        <KpiCard label="Dollar Value Tagged" value={fmt(tagged.reduce((s,t)=>s+Math.abs(t.amt),0))} accent="#64748B"/>
        <KpiCard label="Tag Types Active" value={byTag.length} accent="#64748B"/>
      </div>
      <div style={{background:'white',borderRadius:'12px',border:'1px solid #E2E8F0',padding:'16px'}}>
        <div style={{fontWeight:'600',fontSize:'14px',color:'#1E293B',marginBottom:'12px'}}>Filter by Tag</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:'8px'}}>
          <button onClick={()=>setFilterTag('')} style={{padding:'6px 14px',borderRadius:'20px',fontSize:'12px',fontWeight:'600',border:'1px solid',cursor:'pointer',background:!filterTag?'#1E293B':'white',color:!filterTag?'white':'#64748B',borderColor:!filterTag?'#1E293B':'#E2E8F0'}}>All ({tagged.length})</button>
          {byTag.map(tag=>(
            <button key={tag.id} onClick={()=>setFilterTag(filterTag===tag.id?'':tag.id)} style={{padding:'6px 14px',borderRadius:'20px',fontSize:'12px',fontWeight:'700',border:'1px solid',cursor:'pointer',background:filterTag===tag.id?tag.color:tag.bg,color:filterTag===tag.id?'white':tag.color,borderColor:tag.color}}>
              {tag.label} ({tag.count}) · {fmtK(tag.total)}
            </button>
          ))}
        </div>
      </div>
      {filtered.length===0?
        <div style={{background:'white',border:'2px dashed #E2E8F0',borderRadius:'12px',padding:'40px',textAlign:'center',color:'#94A3B8'}}>
          <div style={{fontSize:'28px',marginBottom:'8px'}}>🏷️</div><p style={{margin:0,fontSize:'13px'}}>No tagged transactions yet. Use the Enrichment & Audit tab to tag items.</p>
        </div>:
        <div style={{background:'white',borderRadius:'12px',border:'1px solid #E2E8F0',overflow:'hidden'}}>
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead><tr>
              {['Date','Account','Description','Category','Amount','Tags','Notes'].map((h,i)=><th key={h} style={{...th,textAlign:i===4?'right':'left'}}>{h}</th>)}
            </tr></thead>
            <tbody>
              {filtered.map(t=>{

// ── Upload Modal ──────────────────────────────────────────────────────────────
function UploadModal({onClose,onImport,existingCount}){
  const [mode,setMode]=useState('incremental');
  const [preview,setPreview]=useState(null);
  const [parsed,setParsed]=useState(null);
  const [error,setError]=useState('');
  const fileRef=useRef();
  function handleFile(e){
    const file=e.target.files[0];if(!file)return;setError('');
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const rows=parseCSVtoTxns(ev.target.result);
        if(rows.length===0){setError('No valid transactions found. Check the file format.');return;}
        const accts=[...new Set(rows.map(r=>r.account))].filter(Boolean);
        const dates=rows.map(r=>r.date).filter(Boolean).sort();
        setParsed(rows);setPreview({count:rows.length,accts,min:dates[0],max:dates[dates.length-1],name:file.name});
      }catch(e){setError('Could not parse file: '+e.message);}
    };
    reader.readAsText(file);
  }
  function confirm(){if(!parsed)return;onImport(parsed,mode);onClose();}
  const modeBtn=(v,label,desc)=>(
    <button onClick={()=>setMode(v)} style={{textAlign:'left',padding:'14px',borderRadius:'10px',border:`2px solid ${mode===v?'#1D4ED8':'#E2E8F0'}`,background:mode===v?'#EFF6FF':'white',cursor:'pointer',width:'100%'}}>
      <div style={{fontWeight:'700',fontSize:'13px',color:mode===v?'#1D4ED8':'#334155'}}>{label}</div>
      <div style={{fontSize:'12px',color:'#64748B',marginTop:'4px'}}>{desc}</div>
    </button>
  );
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000}}>
      <div style={{background:'white',borderRadius:'16px',width:'100%',maxWidth:'500px',margin:'0 20px',boxShadow:'0 25px 50px rgba(0,0,0,0.25)'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'18px 22px',borderBottom:'1px solid #E2E8F0'}}>
          <h3 style={{margin:0,fontSize:'16px',fontWeight:'700',color:'#1E293B'}}>Import Transactions</h3>
          <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',color:'#94A3B8',fontSize:'22px',lineHeight:1}} onMouseOver={e=>e.target.style.color='#64748B'} onMouseOut={e=>e.target.style.color='#94A3B8'}>×</button>
        </div>
        <div style={{padding:'20px 22px',display:'flex',flexDirection:'column',gap:'16px'}}>
          <p style={{margin:0,fontSize:'13px',color:'#64748B'}}>Current database: <strong style={{color:'#1E293B'}}>{existingCount.toLocaleString()} transactions</strong></p>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}}>
            {modeBtn('incremental','Incremental','Add only new transactions. Use for monthly updates.')}
            {modeBtn('replace','Full Replace','Replace entire dataset. Use to re-verify everything.')}
          </div>
          <div onClick={()=>fileRef.current?.click()} style={{border:'2px dashed #CBD5E1',borderRadius:'12px',padding:'28px',textAlign:'center',cursor:'pointer'}} onMouseOver={e=>{e.currentTarget.style.borderColor='#3B82F6';e.currentTarget.style.background='#F0F9FF';}} onMouseOut={e=>{e.currentTarget.style.borderColor='#CBD5E1';e.currentTarget.style.background='transparent';}}>
            <div style={{fontSize:'24px',marginBottom:'6px'}}>📁</div>
            <div style={{fontWeight:'600',color:'#475569'}}>Click to select a CSV file</div>
            <div style={{fontSize:'12px',color:'#94A3B8',marginTop:'4px'}}>Same format as the original ledger exports</div>
            <input ref={fileRef} type="file" accept=".csv" style={{display:'none'}} onChange={handleFile}/>
          </div>
          {error&&<div style={{background:'#FEF2F2',border:'1px solid #FECACA',borderRadius:'8px',padding:'12px',fontSize:'13px',color:'#991B1B'}}>{error}</div>}
          {preview&&(
            <div style={{background:'#ECFDF5',border:'1px solid #A7F3D0',borderRadius:'12px',padding:'14px'}}>
              <div style={{fontWeight:'700',color:'#065F46',marginBottom:'8px'}}>✅ File parsed successfully</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px',fontSize:'13px',color:'#065F46'}}>
                <div><strong>File:</strong> {preview.name}</div>
                <div><strong>Transactions:</strong> {preview.count.toLocaleString()}</div>
                <div><strong>Accounts:</strong> {preview.accts.join(', ')}</div>
                <div><strong>Dates:</strong> {preview.min} – {preview.max}</div>
              </div>
              {mode==='replace'&&<div style={{marginTop:'8px',fontSize:'12px',color:'#991B1B',fontWeight:'700'}}>⚠ This will replace all {existingCount.toLocaleString()} existing transactions.</div>}
            </div>
          )}
        </div>
        <div style={{display:'flex',gap:'10px',padding:'16px 22px',borderTop:'1px solid #E2E8F0',justifyContent:'flex-end'}}>
          <button onClick={onClose} style={{padding:'8px 18px',borderRadius:'8px',border:'1px solid #E2E8F0',background:'white',cursor:'pointer',color:'#64748B',fontWeight:'600',fontSize:'13px'}}>Cancel</button>
          <button onClick={confirm} disabled={!parsed} style={{padding:'8px 20px',borderRadius:'8px',border:'none',background:parsed?'#1D4ED8':'#E2E8F0',color:parsed?'white':'#94A3B8',cursor:parsed?'pointer':'not-allowed',fontWeight:'700',fontSize:'13px'}}>
            {mode==='incremental'?'Add New Transactions':'Replace All Data'}
          </button>
        </div>
      </div>
    </div>
  );
}

const TABS=[
  {id:'overview',  label:'Overview',           icon:'📊'},
  {id:'budget',    label:'Budget vs. Actual',  icon:'📋'},
  {id:'revenue',   label:'Revenue Tracker',    icon:'💰'},
  {id:'ledger',    label:'Transaction Ledger', icon:'📄'},
  {id:'enrichment',label:'Enrichment & Audit', icon:'✏️'},
  {id:'audit',     label:'Audit Summary',      icon:'🏷️'},
  {id:'carryover', label:'Carryover',          icon:'📈'},
];

function App(){
  // ── Auth state ────────────────────────────────────────────────────────────
  const [user,setUser]=useState(null);
  const [authLoading,setAuthLoading]=useState(true);
  const [dataLoading,setDataLoading]=useState(true);

  // ── Transaction data (embedded + local CSV imports) ───────────────────────
  const [transactions,setTransactions]=useState(()=>{
    const imp=lsGet(LS_TXNS,null);
    if(imp&&imp.length>0){const eIds=new Set(TX.map(t=>t.id));return[...TX,...imp.filter(t=>!eIds.has(t.id))];}
    return TX;
  });

  // ── Shared state (lives in Firestore, synced in real time) ────────────────
  const [enrichments,setEnrichments]=useState({});
  const [auditTags,setAuditTags]=useState({});
  const [todos,setTodos]=useState([]);
  const [events,setEvents]=useState([]);
  const [amendments,setAmendments]=useState([]);

  // ── UI state ──────────────────────────────────────────────────────────────
  const [activeTab,setActiveTab]=useState('overview');
  const [jumpToId,setJumpToId]=useState(null);
  const [showUpload,setShowUpload]=useState(false);
  const enrTimer=useRef(null);

  // ── Firebase Auth listener ────────────────────────────────────────────────
  useEffect(()=>_auth.onAuthStateChanged(u=>{setUser(u);setAuthLoading(false);}),[]);

  // ── Firestore real-time listeners (start only when signed in) ─────────────
  useEffect(()=>{
    if(!user) return;
    let loaded=0;
    const onLoad=()=>{if(++loaded>=5)setDataLoading(false);};
    const subs=[
      _col('todos').onSnapshot(snap=>{
        if(!snap.exists){FS.todos(INITIAL_TODOS);setTodos(INITIAL_TODOS);}
        else setTodos(snap.data().items||[]);
        onLoad();
      }),
      _col('events').onSnapshot(snap=>{setEvents(snap.exists?snap.data().items||[]:[]);onLoad();}),
      _col('amendments').onSnapshot(snap=>{setAmendments(snap.exists?snap.data().items||[]:[]);onLoad();}),
      _col('auditTags').onSnapshot(snap=>{setAuditTags(snap.exists?snap.data().data||{}:{});onLoad();}),
      _col('enrichments').onSnapshot(snap=>{setEnrichments(snap.exists?snap.data().data||{}:{});onLoad();}),
    ];
    return()=>subs.forEach(u=>u());
  },[user]);

  // ── State updaters — write to Firestore + update local state ──────────────
  function updTodos(fn){setTodos(prev=>{const next=typeof fn==='function'?fn(prev):fn;setTimeout(()=>FS.todos(next),0);return next;});}
  function updEvents(fn){setEvents(prev=>{const next=typeof fn==='function'?fn(prev):fn;setTimeout(()=>FS.events(next),0);return next;});}
  function updAmendments(fn){setAmendments(prev=>{const next=typeof fn==='function'?fn(prev):fn;setTimeout(()=>FS.amendments(next),0);return next;});}
  function updTags(fn){setAuditTags(prev=>{const next=typeof fn==='function'?fn(prev):fn;setTimeout(()=>FS.tags(next),0);return next;});}
  // Enrichments: debounce Firestore write (avoid per-keystroke writes)
  function updEnrichments(fn){setEnrichments(prev=>{const next=typeof fn==='function'?fn(prev):fn;if(enrTimer.current)clearTimeout(enrTimer.current);enrTimer.current=setTimeout(()=>FS.enr(next),1500);return next;});}

  function handleImport(rows,mode){
    const eIds=new Set(TX.map(t=>t.id));
    const next=mode==='replace'?[...TX,...rows]:[...transactions,...rows.filter(r=>!new Set(transactions.map(t=>t.id)).has(r.id))];
    setTransactions(next);lsSet(LS_TXNS,rows.filter(r=>!eIds.has(r.id)));
  }

  const taggedCount=Object.values(auditTags).filter(v=>v&&v.length>0).length;
  const activeTabInfo=TABS.find(t=>t.id===activeTab)||TABS[0];

  // ── Render: auth loading ──────────────────────────────────────────────────
  if(authLoading) return(
    <div style={{minHeight:'100vh',background:'#1B2B4B',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{textAlign:'center',color:'#93C5FD',fontSize:'14px'}}>⏳ Loading…</div>
    </div>
  );

  // ── Render: not signed in → show login page ───────────────────────────────
  if(!user) return <LoginPage/>;

  // ── Render: signed in but data still loading ──────────────────────────────
  if(dataLoading) return(
    <div style={{minHeight:'100vh',background:'#1B2B4B',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{textAlign:'center'}}>
        <div style={{fontSize:'36px',marginBottom:'12px'}}>📊</div>
        <div style={{color:'#93C5FD',fontSize:'14px'}}>Loading dashboard data…</div>
        <div style={{color:'rgba(147,197,253,0.5)',fontSize:'12px',marginTop:'6px'}}>Syncing from Firestore</div>
      </div>
    </div>
  );

  // ── Render: dashboard ─────────────────────────────────────────────────────
  return(
    <div style={{display:'flex',height:'100vh',background:'#F1F5F9',fontFamily:'system-ui,-apple-system,sans-serif',overflow:'hidden'}}>
      {showUpload&&<UploadModal onClose={()=>setShowUpload(false)} onImport={handleImport} existingCount={transactions.length}/>}

      {/* Sidebar */}
      <div style={{width:'220px',flexShrink:0,display:'flex',flexDirection:'column',background:'#1B2B4B'}}>
        <div style={{padding:'22px 18px 18px',borderBottom:'1px solid rgba(255,255,255,0.1)'}}>
          <div style={{fontSize:'10px',fontWeight:'700',letterSpacing:'0.12em',color:'#93C5FD',textTransform:'uppercase',marginBottom:'4px'}}>CAL-MSCS</div>
          <div style={{color:'white',fontWeight:'700',fontSize:'14px',lineHeight:'1.3'}}>Financial Dashboard</div>
          <div style={{color:'#93C5FD',fontSize:'11px',marginTop:'3px'}}>OCDE · Ledger 94</div>
        </div>
        <nav style={{flex:1,padding:'10px 0',overflowY:'auto'}}>
          {TABS.map(tab=>(
            <button key={tab.id} onClick={()=>setActiveTab(tab.id)}
              style={{width:'100%',display:'flex',alignItems:'center',gap:'10px',padding:'11px 18px',fontSize:'13px',background:activeTab===tab.id?'rgba(255,255,255,0.15)':'transparent',color:activeTab===tab.id?'white':'#93C5FD',border:'none',cursor:'pointer',textAlign:'left',fontWeight:activeTab===tab.id?'700':'400'}}
              onMouseOver={e=>{if(activeTab!==tab.id)e.currentTarget.style.background='rgba(255,255,255,0.08)';}}
              onMouseOut={e=>{if(activeTab!==tab.id)e.currentTarget.style.background='transparent';}}>
              <span style={{fontSize:'15px'}}>{tab.icon}</span>{tab.label}
              {tab.id==='audit'&&taggedCount>0&&<span style={{marginLeft:'auto',background:'#3B82F6',color:'white',fontSize:'10px',fontWeight:'700',padding:'2px 7px',borderRadius:'20px'}}>{taggedCount}</span>}
            </button>
          ))}
        </nav>
        <div style={{padding:'14px 16px',borderTop:'1px solid rgba(255,255,255,0.1)',display:'flex',flexDirection:'column',gap:'7px'}}>
          <button onClick={()=>setShowUpload(true)}
            style={{display:'flex',alignItems:'center',gap:'8px',background:'rgba(255,255,255,0.1)',border:'none',cursor:'pointer',color:'#93C5FD',padding:'10px 14px',borderRadius:'8px',fontSize:'13px',fontWeight:'600'}}
            onMouseOver={e=>e.currentTarget.style.background='rgba(255,255,255,0.2)'}
            onMouseOut={e=>e.currentTarget.style.background='rgba(255,255,255,0.1)'}>
            📥 Import Data
          </button>
          {/* User info + sign out */}
          <div style={{display:'flex',alignItems:'center',gap:'8px',padding:'6px 0'}}>
            {user.photoURL&&<img src={user.photoURL} alt="" style={{width:'24px',height:'24px',borderRadius:'50%',flexShrink:0}}/>}
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:'11px',fontWeight:'600',color:'#E2E8F0',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user.displayName||user.email}</div>
              <div style={{fontSize:'10px',color:'rgba(147,197,253,0.6)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user.email}</div>
            </div>
            <button onClick={()=>_auth.signOut()}
              style={{background:'none',border:'1px solid rgba(255,255,255,0.15)',borderRadius:'5px',cursor:'pointer',color:'rgba(147,197,253,0.6)',padding:'3px 7px',fontSize:'10px',flexShrink:0}}
              onMouseOver={e=>{e.currentTarget.style.color='white';e.currentTarget.style.borderColor='rgba(255,255,255,0.4)';}}
              onMouseOut={e=>{e.currentTarget.style.color='rgba(147,197,253,0.6)';e.currentTarget.style.borderColor='rgba(255,255,255,0.15)';}}>
              Out
            </button>
          </div>
          <div style={{fontSize:'10px',color:'rgba(147,197,253,0.4)',paddingTop:'2px'}}>{transactions.length.toLocaleString()} transactions · live sync 🟢</div>
        </div>
      </div>

      {/* Main content */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div style={{background:'white',borderBottom:'1px solid #E2E8F0',padding:'16px 24px',display:'flex',alignItems:'center',gap:'10px'}}>
          <span style={{fontSize:'18px'}}>{activeTabInfo.icon}</span>
          <h1 style={{fontSize:'15px',fontWeight:'700',color:'#1E293B',margin:0}}>{activeTabInfo.label}</h1>
          <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:'12px'}}>
            <span style={{fontSize:'12px',color:'#94A3B8'}}>FY2023–24 through FY2025–26 · Fund 94 · SACS</span>
            <button onClick={()=>setShowUpload(true)}
              style={{fontSize:'12px',border:'1px solid #E2E8F0',color:'#64748B',padding:'6px 12px',borderRadius:'8px',background:'white',cursor:'pointer',fontWeight:'600'}}
              onMouseOver={e=>e.currentTarget.style.background='#F8FAFC'}
              onMouseOut={e=>e.currentTarget.style.background='white'}>
              📥 Import
            </button>
          </div>
        </div>
        <div style={{flex:1,overflowY:'auto',padding:'24px'}}>
          {activeTab==='overview'   &&<OverviewTab   txns={transactions} todos={todos} setTodos={updTodos} auditTags={auditTags}/>}
          {activeTab==='budget'     &&<BudgetTab     txns={transactions} amendments={amendments} setAmendments={updAmendments}/>}
          {activeTab==='revenue'    &&<RevenueTab    txns={transactions} events={events} setEvents={updEvents}/>}
          {activeTab==='ledger'     &&<LedgerTab     txns={transactions} enrichments={enrichments} auditTags={auditTags} onJumpToEnrich={id=>{setActiveTab('enrichment');setJumpToId(id);}}/>}
          {activeTab==='enrichment' &&<EnrichmentTab txns={transactions} enrichments={enrichments} setEnrichments={updEnrichments} auditTags={auditTags} setAuditTags={updTags} jumpToId={jumpToId} clearJump={()=>setJumpToId(null)}/>}
          {activeTab==='audit'      &&<AuditSummaryTab txns={transactions} enrichments={enrichments} auditTags={auditTags}/>}
          {activeTab==='carryover'  &&<CarryoverTab  txns={transactions}/>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
