// ── Partner Payments Tab ───────────────────────────────────────────────────────
// Simplified 2026-07: full lifecycle tracking (Draft→Agreement→AP→Processing→
// Paid) replaced with a simple Unpaid/Paid flag. Notes and labels (FY, payment
// type, funding source) are the focal points. Legacy records with old lifecycle
// statuses are treated as 'unpaid' unless they were 'paid'. Old statusHistory
// entries are preserved and still displayed as the activity record.
const PAY_STATUSES={
  unpaid:{label:'Unpaid',color:'#B91C1C',bg:'#FEE2E2'},
  paid:  {label:'Paid',  color:'#059669',bg:'#D1FAE5'},
};
const STATUS_ORDER=['unpaid','paid'];
// Legacy lifecycle values (draft/agreement/submitted/processing) collapse to unpaid
function normPayStatus(s){return s==='paid'?'paid':'unpaid';}
const PAY_TYPES=['Stipend','Travel','Services','Materials','Other'];
const RECIP_TYPES=['LEA','COE','Individual','Vendor','Other'];
const EMPTY_PAY={recipient:'',organization:'',contactName:'',recipientType:'Individual',paymentType:'Services',description:'',amount:'',fundingSource:'primary',fyYear:'',event:'',agreementRef:'',mouId:'',expectedDate:'',txnId:'',paidDate:'',paidAmount:''};

// ── Payment Form (standalone component — MUST be outside PartnerPaymentsTab) ──
// Extracting this fixes a React bug where inline component definitions inside a
// parent that re-renders on every keystroke get remounted, losing input focus.
function PayForm({form,setForm,onSave,onCancel,saveLabel,txns,mous,events,onAddEvent}){
  const inp={border:'1px solid #E2E8F0',borderRadius:'8px',padding:'7px 10px',fontSize:'13px',width:'100%'};
  // 0110238 transactions for the selected fiscal year, newest first. If the
  // form already references a txn outside the current FY filter, keep it in
  // the list so the select can still display it.
  const txn238=useMemo(()=>{
    // Loosened 2026-07: before FY24/25 some COE reimbursements were paid out of
    // the primary allocation (0110029) rather than the dedicated 0110238. So the
    // ledger-match dropdown follows the funding source: Primary Allocation shows
    // 0110029 transactions, COE Reimbursement shows 0110238. (Indirect 0110030
    // is intentionally excluded from matching.)
    const matchAccount=form.fundingSource==='coe'?'0110238':'0110029';
    const list=(txns||[]).filter(t=>t.account===matchAccount&&t.fy===form.fyYear)
      .sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    if(form.txnId&&!list.find(t=>t.id===form.txnId)){
      const cur=(txns||[]).find(t=>t.id===form.txnId);
      if(cur) list.unshift(cur);
    }
    return list;
  },[txns,form.fyYear,form.txnId,form.fundingSource]);
  const matchAccountLabel=form.fundingSource==='coe'?'0110238':'0110029';
  function selectTxn(id){
    if(!id){setForm(p=>({...p,txnId:''}));return;}
    const t=(txns||[]).find(x=>x.id===id);
    // Matching a ledger transaction auto-fills the actual pay date and amount
    if(t) setForm(p=>({...p,txnId:id,paidDate:t.date||p.paidDate,paidAmount:String(t.amt??p.paidAmount)}));
    else setForm(p=>({...p,txnId:id}));
  }
  return(
    <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
      {(()=>{
        // LEA/COE payments go to an organization with a named contact person;
        // Individual payments just need the person's name. Vendor/Other keep the
        // generic single recipient field. Switching types migrates the typed
        // value across so nothing gets lost mid-entry.
        const isOrg=form.recipientType==='LEA'||form.recipientType==='COE';
        function switchType(t){
          const wasOrg=form.recipientType==='LEA'||form.recipientType==='COE';
          const willOrg=t==='LEA'||t==='COE';
          setForm(p=>{
            const next={...p,recipientType:t};
            if(willOrg&&!wasOrg&&!p.organization&&p.recipient){next.organization=p.recipient;next.recipient='';}
            if(!willOrg&&wasOrg&&!p.recipient&&p.organization){next.recipient=p.organization;}
            return next;
          });
        }
        return(
          <div style={{display:'grid',gridTemplateColumns:isOrg?'2fr 2fr 1fr 1fr':'2fr 1fr 1fr',gap:'10px'}}>
            {isOrg?(
              <React.Fragment>
                <div><label style={{display:'block',fontSize:'11px',color:'#64748B',fontWeight:'600',marginBottom:'3px'}}>Organization *</label><input value={form.organization} onChange={e=>setForm(p=>({...p,organization:e.target.value}))} placeholder={form.recipientType==='COE'?'e.g. San Joaquin COE':'e.g. Saddleback Valley USD'} style={inp}/></div>
                <div><label style={{display:'block',fontSize:'11px',color:'#64748B',fontWeight:'600',marginBottom:'3px'}}>Individual / Contact</label><input value={form.contactName} onChange={e=>setForm(p=>({...p,contactName:e.target.value}))} placeholder="Contact person at the organization" style={inp}/></div>
              </React.Fragment>
            ):(
              <div><label style={{display:'block',fontSize:'11px',color:'#64748B',fontWeight:'600',marginBottom:'3px'}}>{form.recipientType==='Individual'?'Individual Name *':'Recipient Name *'}</label><input value={form.recipient} onChange={e=>setForm(p=>({...p,recipient:e.target.value}))} placeholder={form.recipientType==='Individual'?'Person receiving this payment':'Organization or individual name'} style={inp}/></div>
            )}
            <div><label style={{display:'block',fontSize:'11px',color:'#64748B',fontWeight:'600',marginBottom:'3px'}}>Recipient Type</label><select value={form.recipientType} onChange={e=>switchType(e.target.value)} style={inp}>{RECIP_TYPES.map(t=><option key={t} value={t}>{t}</option>)}</select></div>
            <div><label style={{display:'block',fontSize:'11px',color:'#64748B',fontWeight:'600',marginBottom:'3px'}}>Payment Type</label><select value={form.paymentType} onChange={e=>setForm(p=>({...p,paymentType:e.target.value}))} style={inp}>{PAY_TYPES.map(t=><option key={t} value={t}>{t}</option>)}</select></div>
          </div>
        );
      })()}
      <div><label style={{display:'block',fontSize:'11px',color:'#64748B',fontWeight:'600',marginBottom:'3px'}}>Description / Purpose *</label><textarea value={form.description} onChange={e=>setForm(p=>({...p,description:e.target.value}))} placeholder="Describe what this payment is for..." rows={2} style={{...inp,resize:'none'}}/></div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:'10px'}}>
        <div><label style={{display:'block',fontSize:'11px',color:'#64748B',fontWeight:'600',marginBottom:'3px'}}>Expected Amount *</label><input type="number" value={form.amount} onChange={e=>setForm(p=>({...p,amount:e.target.value}))} placeholder="0.00" style={inp}/></div>
        <div><label style={{display:'block',fontSize:'11px',color:'#64748B',fontWeight:'600',marginBottom:'3px'}}>Funding Source</label><select value={form.fundingSource} onChange={e=>setForm(p=>({...p,fundingSource:e.target.value}))} style={inp}><option value="primary">Primary Allocation</option><option value="coe">COE Reimbursement</option></select></div>
        <div><label style={{display:'block',fontSize:'11px',color:'#64748B',fontWeight:'600',marginBottom:'3px'}}>Fiscal Year</label><select value={form.fyYear} onChange={e=>setForm(p=>({...p,fyYear:e.target.value}))} style={inp}>{FY_LIST.map(f=><option key={f} value={f}>{f}</option>)}</select></div>
        <div><label style={{display:'block',fontSize:'11px',color:'#64748B',fontWeight:'600',marginBottom:'3px'}}>Agreement Ref #</label><input value={form.agreementRef} onChange={e=>setForm(p=>({...p,agreementRef:e.target.value}))} placeholder="MOU #, PO #, etc." style={inp}/></div>
      </div>
      {/* Event / Activity — group payments by the activity they belong to.
          Pick an existing event or type a new one inline (adds to the shared list). */}
      {(()=>{
        const [addingEvent,setAddingEvent]=[form._addingEvent,(v)=>setForm(p=>({...p,_addingEvent:v}))];
        return(
          <div><label style={{display:'block',fontSize:'11px',color:'#64748B',fontWeight:'600',marginBottom:'3px'}}>Event / Activity</label>
            {addingEvent?(
              <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
                <input autoFocus value={form.event} onChange={e=>setForm(p=>({...p,event:e.target.value}))} placeholder="Type a new event name..." style={{...inp,flex:1}}/>
                <button type="button" onClick={()=>{const name=(form.event||'').trim();if(name&&onAddEvent)onAddEvent(name);setForm(p=>({...p,_addingEvent:false}));}} style={{background:'#059669',color:'white',border:'none',borderRadius:'7px',padding:'7px 12px',fontSize:'12px',fontWeight:'600',cursor:'pointer',whiteSpace:'nowrap'}}>Add</button>
                <button type="button" onClick={()=>setForm(p=>({...p,_addingEvent:false}))} style={{border:'1px solid #E2E8F0',background:'white',borderRadius:'7px',padding:'7px 12px',fontSize:'12px',cursor:'pointer',color:'#64748B'}}>Cancel</button>
              </div>
            ):(
              <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
                <select value={form.event||''} onChange={e=>setForm(p=>({...p,event:e.target.value}))} style={{...inp,flex:1}}>
                  <option value="">— No event (Unassigned) —</option>
                  {(events||[]).map(ev=><option key={ev} value={ev}>{ev}</option>)}
                  {form.event&&!(events||[]).includes(form.event)&&<option value={form.event}>{form.event}</option>}
                </select>
                <button type="button" onClick={()=>setForm(p=>({...p,_addingEvent:true,event:''}))} style={{border:'1px solid #BFDBFE',background:'#EFF6FF',color:'#1D4ED8',borderRadius:'7px',padding:'7px 12px',fontSize:'12px',fontWeight:'600',cursor:'pointer',whiteSpace:'nowrap'}}>+ New event</button>
              </div>
            )}
          </div>
        );
      })()}
      {/* MOU cross-link: pick a recorded MOU; Agreement Ref stays free text for non-MOU payments */}
      <div><label style={{display:'block',fontSize:'11px',color:'#64748B',fontWeight:'600',marginBottom:'3px'}}>Linked MOU (optional)</label>
        <select value={form.mouId||''} onChange={e=>setForm(p=>({...p,mouId:e.target.value}))} style={inp}>
          <option value="">— No MOU linked —</option>
          {(mous||[]).map(m=><option key={m.id} value={m.id}>{m.partner} — {(m.title||'').slice(0,50)}{m.refNum?' ('+m.refNum+')':''}</option>)}
        </select>
      </div>
      {/* Ledger match: pick the actual 0110238 transaction; date + amount autofill */}
      <div style={{background:'#ECFDF5',border:'1px solid #A7F3D0',borderRadius:'10px',padding:'12px'}}>
        <label style={{display:'block',fontSize:'11px',color:'#047857',fontWeight:'700',marginBottom:'4px'}}>Match Ledger Transaction — {matchAccountLabel}, {form.fyYear||'select FY'}</label>
        <select value={form.txnId} onChange={e=>selectTxn(e.target.value)} style={{...inp,borderColor:'#A7F3D0',marginBottom:'8px'}}>
          <option value="">— No ledger match yet —</option>
          {txn238.map(t=><option key={t.id} value={t.id}>{t.date} · {fmt(t.amt)} · {(t.desc||'').slice(0,48)}</option>)}
        </select>
        {txn238.length===0&&<div style={{fontSize:'11px',color:'#047857',marginBottom:'8px'}}>No {matchAccountLabel} transactions found for {form.fyYear||'the selected year'}. Import newer ledger data or change the fiscal year above.</div>}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'10px'}}>
          <div><label style={{display:'block',fontSize:'11px',color:'#64748B',fontWeight:'600',marginBottom:'3px'}}>Expected Pay Date</label><input type="date" value={form.expectedDate} onChange={e=>setForm(p=>({...p,expectedDate:e.target.value}))} style={inp}/></div>
          <div><label style={{display:'block',fontSize:'11px',color:'#64748B',fontWeight:'600',marginBottom:'3px'}}>Actual Pay Date <span style={{color:'#047857'}}>(auto on match)</span></label><input type="date" value={form.paidDate} onChange={e=>setForm(p=>({...p,paidDate:e.target.value}))} style={inp}/></div>
          <div><label style={{display:'block',fontSize:'11px',color:'#64748B',fontWeight:'600',marginBottom:'3px'}}>Actual Amount Paid <span style={{color:'#047857'}}>(auto on match)</span></label><input type="number" value={form.paidAmount} onChange={e=>setForm(p=>({...p,paidAmount:e.target.value}))} style={inp}/></div>
        </div>
      </div>
      <div style={{display:'flex',gap:'8px',justifyContent:'flex-end',paddingTop:'4px'}}>
        <button onClick={onCancel} style={{border:'1px solid #E2E8F0',background:'white',borderRadius:'8px',padding:'8px 16px',cursor:'pointer',color:'#64748B',fontSize:'13px'}}>Cancel</button>
        <button onClick={onSave} style={{background:'#1D4ED8',color:'white',border:'none',borderRadius:'8px',padding:'8px 16px',fontWeight:'600',cursor:'pointer',fontSize:'13px'}}>{saveLabel}</button>
      </div>
    </div>
  );
}

// ── COE Reimbursement statuses (tracked separately from paid/unpaid) ──────────
const COE_REIMB_STATUSES={
  not_invoiced:{label:'Not Yet Invoiced to COE',color:'#DC2626',bg:'#FEE2E2'},
  invoiced:    {label:'Invoiced — Awaiting Reimbursement',color:'#D97706',bg:'#FEF3C7'},
  received:    {label:'Reimbursement Received',color:'#059669',bg:'#D1FAE5'},
};

function PartnerPaymentsTab({payments,userRole,txns,mous,events}){
  const canManage=userRole==='director'||userRole==='admin_support';
  const [filterSource,setFilterSource]=useState('');
  const [filterStatus,setFilterStatus]=useState('');
  const [filterType,setFilterType]=useState('');
  const [filterFY,setFilterFY]=useState('');
  const [filterEvent,setFilterEvent]=useState('');
  const [search,setSearch]=useState('');
  const [groupSort,setGroupSort]=useState('alpha'); // 'alpha'|'org'|'individual'|'status'
  // Events typed via "+ New event" that have no payment yet — kept so they
  // appear in the dropdown until a payment is assigned to them.
  const [pendingEvents,setPendingEvents]=useState([]);
  const [expandedId,setExpandedId]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [editId,setEditId]=useState(null);
  const [noteInputId,setNoteInputId]=useState(null);
  const [noteText,setNoteText]=useState('');
  const [form,setForm]=useState({...EMPTY_PAY,fyYear:activeGrantFY()});
  const [formError,setFormError]=useState('');

  // All known event names, sorted, for dropdowns and the filter
  const eventList=useMemo(()=>{
    const s=new Set();
    (events||[]).forEach(e=>{if(e.name&&e.name.trim())s.add(e.name.trim());}); // collection events (source of truth)
    payments.forEach(p=>{if(p.event&&p.event.trim())s.add(p.event.trim());}); // legacy free-text on payments
    pendingEvents.forEach(e=>{if(e&&e.trim())s.add(e.trim());});
    return[...s].sort((a,b)=>a.localeCompare(b));
  },[payments,pendingEvents,events]);
  function addEventName(name){setPendingEvents(prev=>prev.includes(name)?prev:[...prev,name]);}

  const filtered=useMemo(()=>{
    let r=payments;
    if(search){const q=search.toLowerCase();r=r.filter(p=>(p.recipient||'').toLowerCase().includes(q)||(p.contactName||'').toLowerCase().includes(q)||(p.description||'').toLowerCase().includes(q));}
    if(filterSource) r=r.filter(p=>p.fundingSource===filterSource);
    if(filterStatus) r=r.filter(p=>normPayStatus(p.status)===filterStatus);
    if(filterType) r=r.filter(p=>p.paymentType===filterType);
    if(filterFY) r=r.filter(p=>p.fyYear===filterFY);
    if(filterEvent){
      if(filterEvent==='__unassigned__') r=r.filter(p=>!(p.event||'').trim());
      else r=r.filter(p=>(p.event||'').trim()===filterEvent);
    }
    return[...r].sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
  },[payments,search,filterSource,filterStatus,filterType,filterFY,filterEvent]);

  // Group the filtered payments by event. Named events first (alphabetical),
  // then a single "Unassigned" group at the bottom for payments with no event.
  const grouped=useMemo(()=>{
    const byEvent={};
    filtered.forEach(p=>{const key=(p.event||'').trim()||'__unassigned__';(byEvent[key]=byEvent[key]||[]).push(p);});
    // Within-group sort: default alphabetical by recipient, or by organization,
    // individual/contact name, or payment status.
    const orgOf=p=>(p.organization||p.recipient||'').toLowerCase();
    const indivOf=p=>(p.contactName||(p.recipientType==='Individual'?p.recipient:'')||'').toLowerCase();
    const sorters={
      alpha:(a,b)=>(a.recipient||'').toLowerCase().localeCompare((b.recipient||'').toLowerCase()),
      org:(a,b)=>orgOf(a).localeCompare(orgOf(b)),
      individual:(a,b)=>indivOf(a).localeCompare(indivOf(b)),
      status:(a,b)=>{const rank=s=>normPayStatus(s)==='unpaid'?0:1;return rank(a.status)-rank(b.status)||(a.recipient||'').localeCompare(b.recipient||'');},
    };
    const cmp=sorters[groupSort]||sorters.alpha;
    Object.keys(byEvent).forEach(k=>byEvent[k].sort(cmp));
    const namedKeys=Object.keys(byEvent).filter(k=>k!=='__unassigned__').sort((a,b)=>a.localeCompare(b));
    const groups=namedKeys.map(k=>({key:k,label:k,items:byEvent[k]}));
    if(byEvent['__unassigned__']) groups.push({key:'__unassigned__',label:'Unassigned / No Event',items:byEvent['__unassigned__']});
    return groups;
  },[filtered,groupSort]);
  // Groups start collapsed by default. We track which groups the user has
  // explicitly opened; everything else renders collapsed. `openedGroups`
  // holds keys the user toggled — combined with the default via isCollapsed().
  const [openedGroups,setOpenedGroups]=useState(()=>new Set());
  function isCollapsed(key){return !openedGroups.has(key);}
  function toggleGroupCollapse(key){setOpenedGroups(s=>{const n=new Set(s);n.has(key)?n.delete(key):n.add(key);return n;});}

  const totalAmt=payments.reduce((s,p)=>s+(parseFloat(p.amount)||0),0);
  const outstanding=payments.filter(p=>normPayStatus(p.status)!=='paid');
  const unpaidAmt=outstanding.reduce((s,p)=>s+(parseFloat(p.amount)||0),0);
  const unpaidN=outstanding.length;
  const paidAmt=payments.filter(p=>normPayStatus(p.status)==='paid').reduce((s,p)=>s+(parseFloat(p.paidAmount||p.amount)||0),0);

  async function handleAdd(){
    setFormError('');
    const isOrg=form.recipientType==='LEA'||form.recipientType==='COE';
    const displayRecipient=(isOrg?form.organization:form.recipient).trim();
    if(!displayRecipient||!form.amount){setFormError((isOrg?'Organization':'Recipient name')+' and expected amount are required.');return;}
    const u=_auth.currentUser;if(!u){setFormError('You are not signed in.');return;}
    const id='p'+Date.now();const now=new Date().toISOString().slice(0,10);
    // A ledger match at creation time means the payment already went out
    const initialStatus=form.txnId?'paid':'unpaid';
    try{
      const {_addingEvent,...formClean}=form;
      await FS.payment(id,{...formClean,event:(form.event||'').trim(),recipient:displayRecipient,id,amount:parseFloat(form.amount)||0,paidAmount:parseFloat(form.paidAmount)||0,status:initialStatus,
        coeReimbursement:form.fundingSource==='coe'&&initialStatus==='paid'?'not_invoiced':null,
        statusHistory:[{status:initialStatus,note:initialStatus==='paid'?'Created with ledger match '+form.txnId:'Payment record created',updatedBy:u.displayName||u.email,updatedAt:now}],
        notes:[],createdAt:now,createdBy:u.displayName||u.email,createdByEmail:u.email});
      logActivity('payment_added',`Added payment: "${displayRecipient}" — ${fmt(parseFloat(form.amount)||0)}`,{type:form.paymentType,source:form.fundingSource,status:initialStatus});
      setShowAdd(false);setForm({...EMPTY_PAY,fyYear:activeGrantFY()});
    }catch(err){
      setFormError('Could not save payment: '+(err&&err.message?err.message:'unknown error')+'. This is usually a permissions issue — confirm your role in Manage Team.');
    }
  }
  async function handleUpdate(){
    setFormError('');
    const isOrg=form.recipientType==='LEA'||form.recipientType==='COE';
    const displayRecipient=(isOrg?form.organization:form.recipient).trim();
    if(!displayRecipient){setFormError((isOrg?'Organization':'Recipient name')+' is required.');return;}
    try{
      const before=payments.find(x=>x.id===editId);
      if(before) await saveEventHistory('updated',{...before,eventName:before.recipient});
      const upd={recipient:displayRecipient,organization:form.organization||'',contactName:form.contactName||'',recipientType:form.recipientType,paymentType:form.paymentType,description:form.description,amount:parseFloat(form.amount)||0,fundingSource:form.fundingSource,fyYear:form.fyYear,event:(form.event||'').trim(),agreementRef:form.agreementRef,mouId:form.mouId||'',expectedDate:form.expectedDate,txnId:form.txnId||'',paidDate:form.paidDate||'',paidAmount:parseFloat(form.paidAmount)||0};
      // Matching a ledger transaction implies the payment was made
      if(form.txnId&&before&&normPayStatus(before.status)!=='paid'){
        upd.status='paid';
        upd.statusHistory=[...(before.statusHistory||[]),{status:'paid',note:'Marked paid via ledger match '+form.txnId,updatedBy:(_auth.currentUser&&(_auth.currentUser.displayName||_auth.currentUser.email))||'',updatedAt:new Date().toISOString().slice(0,10)}];
        if(before.fundingSource==='coe'&&!before.coeReimbursement) upd.coeReimbursement='not_invoiced';
      }
      await FS.paymentUpdate(editId,upd);
      logActivity('payment_edited',`Edited payment: "${displayRecipient}"`,{id:editId});
      setEditId(null);
    }catch(err){
      setFormError('Could not save changes: '+(err&&err.message?err.message:'unknown error')+'. This is usually a permissions issue — confirm your role in Manage Team.');
    }
  }
  async function handleDelete(p){
    if(!window.confirm(`Delete payment for "${p.recipient}"? This cannot be undone — a snapshot will be kept in the retention log.`)) return;
    await saveEventHistory('deleted',{...p,eventName:p.recipient});
    await FS.paymentDelete(p.id);
    logActivity('payment_deleted',`Deleted payment: "${p.recipient}" — ${fmt(parseFloat(p.amount)||0)}`,{id:p.id});
  }
  async function togglePaid(p){
    const u=_auth.currentUser;if(!u) return;
    const now=new Date().toISOString().slice(0,10);
    const cur=normPayStatus(p.status);
    const next=cur==='paid'?'unpaid':'paid';
    const upd={status:next,statusHistory:[...(p.statusHistory||[]),{status:next,note:next==='paid'?'Marked paid':'Reverted to unpaid',updatedBy:u.displayName||u.email,updatedAt:now}]};
    if(next==='paid'){
      if(!p.paidDate) upd.paidDate=now;
      if(p.fundingSource==='coe'&&!p.coeReimbursement) upd.coeReimbursement='not_invoiced';
    }
    await FS.paymentUpdate(p.id,upd);
    logActivity('payment_status',`"${p.recipient}" → ${PAY_STATUSES[next].label}`,{id:p.id,status:next});
  }
async function handleCoeReimbUpdate(p,newStatus){
    const u=_auth.currentUser;if(!u) return;
    const now=new Date().toISOString().slice(0,10);
    const upd={coeReimbursement:newStatus};
    if(newStatus==='invoiced') upd.coeInvoicedDate=now;
    if(newStatus==='received') upd.coeReceivedDate=now;
    await FS.paymentUpdate(p.id,upd);
    logActivity('coe_reimb_status',`"${p.recipient}" reimbursement → ${COE_REIMB_STATUSES[newStatus]?.label}`,{id:p.id,status:newStatus});
  }
  async function handleAddNote(p){
    if(!noteText.trim()) return;
    const u=_auth.currentUser;if(!u) return;
    const note={id:'n'+Date.now(),text:noteText.trim(),author:u.displayName||u.email,authorEmail:u.email,authorPhoto:u.photoURL||null,createdAt:new Date().toISOString().slice(0,10)};
    await FS.paymentUpdate(p.id,{notes:[...(p.notes||[]),note]});
    logActivity('payment_note',`Added note to "${p.recipient}"`,{id:p.id});
    setNoteText('');setNoteInputId(null);
  }
  function startEdit(p){const wasOrg=p.recipientType==='LEA'||p.recipientType==='COE';setEditId(p.id);setForm({recipient:wasOrg?'':(p.recipient||''),organization:p.organization||(wasOrg?(p.recipient||''):''),contactName:p.contactName||'',recipientType:p.recipientType||'Individual',paymentType:p.paymentType||'Services',description:p.description||'',amount:String(p.amount||''),fundingSource:p.fundingSource||'primary',fyYear:p.fyYear||activeGrantFY(),event:p.event||'',agreementRef:p.agreementRef||'',mouId:p.mouId||'',expectedDate:p.expectedDate||'',txnId:p.txnId||'',paidDate:p.paidDate||'',paidAmount:String(p.paidAmount||'')});}

  const inp={border:'1px solid #E2E8F0',borderRadius:'8px',padding:'7px 10px',fontSize:'13px',width:'100%'};
  const srcLabel={primary:'Primary Allocation',coe:'COE Reimbursement'};
  const srcColor={primary:{bg:'#DBEAFE',c:'#1D4ED8'},coe:{bg:'#FEF3C7',c:'#92400E'}};
  const typeColor={Stipend:{bg:'#EDE9FE',c:'#6D28D9'},Travel:{bg:'#FCE7F3',c:'#BE185D'},Services:{bg:'#E0F2FE',c:'#0369A1'},Materials:{bg:'#ECFDF5',c:'#047857'},Other:{bg:'#F3F4F6',c:'#374151'}};

  return(
    <div style={{display:'flex',flexDirection:'column',gap:'16px'}}>
      {/* Summary */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'12px'}}>
        <KpiCard label="Total Tracked" value={fmt(totalAmt)} sub={payments.length+' payments'} accent="#64748B"/>
        <KpiCard label="Unpaid" value={fmt(unpaidAmt)} sub={unpaidN+' outstanding'} color="#DC2626" accent="#DC2626"/>
        <KpiCard label="Paid" value={fmt(paidAmt)} sub={payments.filter(p=>normPayStatus(p.status)==='paid').length+' completed'} color="#059669" accent="#059669"/>
      </div>

      {/* Outstanding banner */}
      {unpaidN>0&&(
        <div style={{background:'#FEF2F2',border:'2px solid #FECACA',borderRadius:'12px',padding:'14px 16px',display:'flex',alignItems:'center',gap:'14px'}}>
          <span style={{fontSize:'22px',flexShrink:0}}>⏳</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:'700',color:'#991B1B',fontSize:'14px'}}>{unpaidN} partner payment{unpaidN!==1?'s':''} still unpaid</div>
            <div style={{fontSize:'12px',color:'#B91C1C',marginTop:'3px'}}>Match each to its 0110238 ledger transaction once the payment posts.</div>
          </div>
          <div style={{textAlign:'right',flexShrink:0}}>
            <div style={{fontSize:'22px',fontWeight:'700',color:'#991B1B'}}>{fmt(unpaidAmt)}</div>
            <div style={{fontSize:'11px',color:'#B91C1C'}}>total outstanding</div>
          </div>
        </div>
      )}

      {/* Filters + Add */}
      <div style={{display:'flex',gap:'8px',flexWrap:'wrap',alignItems:'center'}}>
        <input placeholder="Search recipient or description..." value={search} onChange={e=>setSearch(e.target.value)} style={{...inp,flex:'2',minWidth:'200px'}}/>
        <select value={filterSource} onChange={e=>setFilterSource(e.target.value)} style={{...inp,flex:1,minWidth:'140px'}}><option value="">All Funding Sources</option><option value="primary">Primary Allocation</option><option value="coe">COE Reimbursement</option></select>
        <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} style={{...inp,flex:1,minWidth:'110px'}}><option value="">Paid & Unpaid</option>{STATUS_ORDER.map(s=><option key={s} value={s}>{PAY_STATUSES[s].label}</option>)}</select>
        <select value={filterType} onChange={e=>setFilterType(e.target.value)} style={{...inp,flex:1,minWidth:'110px'}}><option value="">All Types</option>{PAY_TYPES.map(t=><option key={t} value={t}>{t}</option>)}</select>
        <select value={filterFY} onChange={e=>setFilterFY(e.target.value)} style={{...inp,flex:1,minWidth:'100px'}}><option value="">All Years</option>{FY_LIST.map(f=><option key={f} value={f}>{f}</option>)}</select>
        <select value={filterEvent} onChange={e=>setFilterEvent(e.target.value)} style={{...inp,flex:1,minWidth:'150px'}}><option value="">All Events</option>{eventList.map(ev=><option key={ev} value={ev}>{ev}</option>)}<option value="__unassigned__">Unassigned / No Event</option></select>
        <select value={groupSort} onChange={e=>setGroupSort(e.target.value)} style={{...inp,flex:1,minWidth:'150px'}} title="Sort within each event group"><option value="alpha">Sort: Recipient (A–Z)</option><option value="org">Sort: Organization</option><option value="individual">Sort: Individual</option><option value="status">Sort: Payment Status</option></select>
        {canManage&&<button onClick={()=>{setShowAdd(true);setEditId(null);setFormError('');setForm({...EMPTY_PAY,fyYear:activeGrantFY()});}} style={{background:'#1D4ED8',color:'white',border:'none',borderRadius:'8px',padding:'8px 16px',fontSize:'13px',fontWeight:'600',cursor:'pointer',whiteSpace:'nowrap'}}>+ Add Payment</button>}
      </div>

      {/* Add form */}
      {showAdd&&canManage&&(
        <div style={{background:'#EFF6FF',border:'1px solid #BFDBFE',borderRadius:'12px',padding:'18px'}}>
          <div style={{fontWeight:'700',color:'#1D4ED8',fontSize:'14px',marginBottom:'14px'}}>New Payment Record</div>
          {formError&&<div style={{background:'#FEF2F2',border:'1px solid #FECACA',borderRadius:'8px',padding:'10px 12px',fontSize:'12px',color:'#991B1B',marginBottom:'12px'}}>{formError}</div>}
          <PayForm form={form} setForm={setForm} onSave={handleAdd} onCancel={()=>setShowAdd(false)} saveLabel="Create Payment" txns={txns} mous={mous} events={eventList} onAddEvent={addEventName}/>
        </div>

      {/* Empty state */}
      {filtered.length===0&&<div style={{background:'white',border:'2px dashed #E2E8F0',borderRadius:'12px',padding:'40px',textAlign:'center'}}><div style={{fontSize:'32px',marginBottom:'8px'}}>💳</div><p style={{color:'#64748B',fontWeight:'500',margin:0}}>{payments.length===0?'No payments tracked yet.':'No payments match your filters.'}</p>{canManage&&payments.length===0&&<p style={{color:'#94A3B8',fontSize:'13px',margin:'6px 0 0'}}>Click "+ Add Payment" to start tracking outgoing payments.</p>}</div>}

      {/* Payment cards — grouped by event, Unassigned last */}
      {(()=>{

          const sc=srcColor[p.fundingSource]||srcColor.primary;
          const tc=typeColor[p.paymentType]||typeColor.Other;
          const isExpanded=expandedId===p.id;
          const isEditing=editId===p.id;
          const crs=p.coeReimbursement?COE_REIMB_STATUSES[p.coeReimbursement]:null;
          const matchedTxn=p.txnId?(txns||[]).find(t=>t.id===p.txnId):null;

          if(isEditing) return(
            <tr key={p.id}><td colSpan={9} style={{padding:0}}>
