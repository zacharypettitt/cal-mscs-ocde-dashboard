// ── COE Reimbursement statuses (tracked separately from partner payment lifecycle) ──
const COE_REIMB_STATUSES={
  not_invoiced:{label:'Not Yet Invoiced to COE',color:'#DC2626',bg:'#FEE2E2'},
  invoiced:    {label:'Invoiced — Awaiting Reimbursement',color:'#D97706',bg:'#FEF3C7'},
  received:    {label:'Reimbursement Received',color:'#059669',bg:'#D1FAE5'},
};

function PartnerPaymentsTab({payments,userRole}){
  const canManage=userRole==='director'||userRole==='admin_support';
  const [filterSource,setFilterSource]=useState('');
  const [filterStatus,setFilterStatus]=useState('');
  const [filterType,setFilterType]=useState('');
  const [filterFY,setFilterFY]=useState('');
  const [search,setSearch]=useState('');
  const [expandedId,setExpandedId]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [editId,setEditId]=useState(null);
  const [noteInputId,setNoteInputId]=useState(null);
  const [noteText,setNoteText]=useState('');
  const [statusEditId,setStatusEditId]=useState(null);
  const [statusForm,setStatusForm]=useState({status:'',note:''});
  const [form,setForm]=useState({...EMPTY_PAY,fyYear:currentFY()});
  const [formError,setFormError]=useState('');

  const filtered=useMemo(()=>{
    let r=payments;
    if(search){const q=search.toLowerCase();r=r.filter(p=>(p.recipient||'').toLowerCase().includes(q)||(p.description||'').toLowerCase().includes(q));}
    if(filterSource) r=r.filter(p=>p.fundingSource===filterSource);
    if(filterStatus) r=r.filter(p=>p.status===filterStatus);
    if(filterType) r=r.filter(p=>p.paymentType===filterType);
    if(filterFY) r=r.filter(p=>p.fyYear===filterFY);
    return[...r].sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
  },[payments,search,filterSource,filterStatus,filterType,filterFY]);

  const totalAmt=payments.reduce((s,p)=>s+(parseFloat(p.amount)||0),0);
  const outstanding=payments.filter(p=>p.status!=='paid');
  const unpaidAmt=outstanding.reduce((s,p)=>s+(parseFloat(p.amount)||0),0);
  const unpaidN=outstanding.length;
  const paidAmt=payments.filter(p=>p.status==='paid').reduce((s,p)=>s+(parseFloat(p.paidAmount||p.amount)||0),0);

  async function handleAdd(){
    setFormError('');
    if(!form.recipient.trim()||!form.amount){setFormError('Recipient name and expected amount are required.');return;}
    const u=_auth.currentUser;if(!u){setFormError('You are not signed in.');return;}
    const id='p'+Date.now();const now=new Date().toISOString().slice(0,10);
    try{
      await FS.payment(id,{...form,id,amount:parseFloat(form.amount)||0,paidAmount:parseFloat(form.paidAmount)||0,status:'draft',
        coeReimbursement:form.fundingSource==='coe'?'not_invoiced':null,
        statusHistory:[{status:'draft',note:'Payment record created',updatedBy:u.displayName||u.email,updatedAt:now}],
        notes:[],createdAt:now,createdBy:u.displayName||u.email,createdByEmail:u.email});
      logActivity('payment_added',`Added payment: "${form.recipient}" — ${fmt(parseFloat(form.amount)||0)}`,{type:form.paymentType,source:form.fundingSource});
      setShowAdd(false);setForm({...EMPTY_PAY,fyYear:currentFY()});
    }catch(err){
      setFormError('Could not save payment: '+(err&&err.message?err.message:'unknown error')+'. This is usually a permissions issue — confirm your role in Manage Team.');
    }
  }
  async function handleUpdate(){
    setFormError('');
    if(!form.recipient.trim()){setFormError('Recipient name is required.');return;}
    try{
      const before=payments.find(x=>x.id===editId);
      if(before) await saveEventHistory('updated',{...before,eventName:before.recipient});
      await FS.paymentUpdate(editId,{recipient:form.recipient,recipientType:form.recipientType,paymentType:form.paymentType,description:form.description,amount:parseFloat(form.amount)||0,fundingSource:form.fundingSource,fyYear:form.fyYear,agreementRef:form.agreementRef,expectedDate:form.expectedDate,txnId:form.txnId||'',paidDate:form.paidDate||'',paidAmount:parseFloat(form.paidAmount)||0});
      logActivity('payment_edited',`Edited payment: "${form.recipient}"`,{id:editId});
      setEditId(null);
    }catch(err){
      setFormError('Could not save changes: '+(err&&err.message?err.message:'unknown error')+'. This is usually a permissions issue — confirm your role in Manage Team.');
    }
  }
  async function handleDelete(p){
    if(!window.confirm(`Delete payment for "${p.recipient}"? This cannot be undone — a snapshot will be kept in the retention log.`)) return;
    await saveEventHistory('deleted',{...p,eventName:p.recipient});
    await FS.paymentDelete(p.id);
    logActivity('payment_deleted',`Deleted payment: "${p.recipient}" — ${fmt(parseFloat(p.amount)||0)}`,{id:p.id});
  }
  async function handleStatusUpdate(p){
    if(!statusForm.status) return;
    const u=_auth.currentUser;if(!u) return;
    const now=new Date().toISOString().slice(0,10);
    const newHist=[...(p.statusHistory||[]),{status:statusForm.status,note:statusForm.note,updatedBy:u.displayName||u.email,updatedAt:now}];
    const upd={status:statusForm.status,statusHistory:newHist};
    if(statusForm.status==='paid'){
      upd.paidDate=upd.paidDate||now;
      // Initialize COE reimbursement tracking the moment a COE-funded payment is marked Paid
      if(p.fundingSource==='coe'&&!p.coeReimbursement) upd.coeReimbursement='not_invoiced';
    }
    await FS.paymentUpdate(p.id,upd);
    logActivity('payment_status',`"${p.recipient}" → ${PAY_STATUSES[statusForm.status]?.label}`,{id:p.id,status:statusForm.status,note:statusForm.note});
    setStatusEditId(null);setStatusForm({status:'',note:''});
  }
  async function handleCoeReimbUpdate(p,newStatus){
    const u=_auth.currentUser;if(!u) return;
    const now=new Date().toISOString().slice(0,10);
    const upd={coeReimbursement:newStatus};
    if(newStatus==='invoiced') upd.coeInvoicedDate=now;
    if(newStatus==='received') upd.coeReceivedDate=now;
    await FS.paymentUpdate(p.id,upd);
    logActivity('coe_reimb_status',`"${p.recipient}" reimbursement → ${COE_REIMB_STATUSES[newStatus]?.label}`,{id:p.id,status:newStatus});
  }
  async function handleAddNote(p){
    if(!noteText.trim()) return;
    const u=_auth.currentUser;if(!u) return;
    const note={id:'n'+Date.now(),text:noteText.trim(),author:u.displayName||u.email,authorEmail:u.email,authorPhoto:u.photoURL||null,createdAt:new Date().toISOString().slice(0,10)};
    await FS.paymentUpdate(p.id,{notes:[...(p.notes||[]),note]});
    logActivity('payment_note',`Added note to "${p.recipient}"`,{id:p.id});
    setNoteText('');setNoteInputId(null);
  }
  function startEdit(p){setEditId(p.id);setForm({recipient:p.recipient||'',recipientType:p.recipientType||'Individual',paymentType:p.paymentType||'Services',description:p.description||'',amount:String(p.amount||''),fundingSource:p.fundingSource||'primary',fyYear:p.fyYear||currentFY(),agreementRef:p.agreementRef||'',expectedDate:p.expectedDate||'',txnId:p.txnId||'',paidDate:p.paidDate||'',paidAmount:String(p.paidAmount||'')});}

  const inp={border:'1px solid #E2E8F0',borderRadius:'8px',padding:'7px 10px',fontSize:'13px',width:'100%'};
  const srcLabel={primary:'Primary Allocation',coe:'COE Reimbursement'};
  const srcColor={primary:{bg:'#DBEAFE',c:'#1D4ED8'},coe:{bg:'#FEF3C7',c:'#92400E'}};

  return(
    <div style={{display:'flex',flexDirection:'column',gap:'16px'}}>
      {/* Summary */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'12px'}}>
        <KpiCard label="Total Tracked" value={fmt(totalAmt)} sub={payments.length+' payments'} accent="#64748B"/>
        <KpiCard label="Outstanding" value={fmt(unpaidAmt)} sub={unpaidN+' not yet paid'} color="#DC2626" accent="#DC2626"/>
        <KpiCard label="Paid" value={fmt(paidAmt)} sub={payments.filter(p=>p.status==='paid').length+' completed'} color="#059669" accent="#059669"/>
      </div>

      {/* Outstanding payments banner — quick-glance summary of what still needs to be processed */}
      {unpaidN>0&&(
        <div style={{background:'#FEF2F2',border:'2px solid #FECACA',borderRadius:'12px',padding:'14px 16px',display:'flex',alignItems:'center',gap:'14px'}}>
          <span style={{fontSize:'22px',flexShrink:0}}>⏳</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:'700',color:'#991B1B',fontSize:'14px'}}>{unpaidN} partner payment{unpaidN!==1?'s':''} still need{unpaidN===1?'s':''} to be processed</div>
            <div style={{fontSize:'12px',color:'#B91C1C',marginTop:'3px',display:'flex',gap:'14px',flexWrap:'wrap'}}>
              {STATUS_ORDER.filter(s=>s!=='paid').map(s=>{
                const n=outstanding.filter(p=>p.status===s).length;
                return n>0?<span key={s}>{n} {PAY_STATUSES[s].label}</span>:null;
              })}
            </div>
          </div>
          <div style={{textAlign:'right',flexShrink:0}}>
            <div style={{fontSize:'22px',fontWeight:'700',color:'#991B1B'}}>{fmt(unpaidAmt)}</div>
            <div style={{fontSize:'11px',color:'#B91C1C'}}>total outstanding</div>
          </div>
        </div>
      )}

      {/* Filters + Add */}
      <div style={{display:'flex',gap:'8px',flexWrap:'wrap',alignItems:'center'}}>
        <input placeholder="Search recipient or description..." value={search} onChange={e=>setSearch(e.target.value)} style={{...inp,flex:'2',minWidth:'200px'}}/>
        <select value={filterSource} onChange={e=>setFilterSource(e.target.value)} style={{...inp,flex:1,minWidth:'140px'}}><option value="">All Funding Sources</option><option value="primary">Primary Allocation</option><option value="coe">COE Reimbursement</option></select>
        <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} style={{...inp,flex:1,minWidth:'140px'}}><option value="">All Statuses</option>{STATUS_ORDER.map(s=><option key={s} value={s}>{PAY_STATUSES[s].label}</option>)}</select>
        <select value={filterType} onChange={e=>setFilterType(e.target.value)} style={{...inp,flex:1,minWidth:'110px'}}><option value="">All Types</option>{PAY_TYPES.map(t=><option key={t} value={t}>{t}</option>)}</select>
        <select value={filterFY} onChange={e=>setFilterFY(e.target.value)} style={{...inp,flex:1,minWidth:'100px'}}><option value="">All Years</option>{FY_LIST.map(f=><option key={f} value={f}>{f}</option>)}</select>
        {canManage&&<button onClick={()=>{setShowAdd(true);setEditId(null);setFormError('');setForm({...EMPTY_PAY,fyYear:currentFY()});}} style={{background:'#1D4ED8',color:'white',border:'none',borderRadius:'8px',padding:'8px 16px',fontSize:'13px',fontWeight:'600',cursor:'pointer',whiteSpace:'nowrap'}}>+ Add Payment</button>}
      </div>

      {/* Add form */}
      {showAdd&&canManage&&(
        <div style={{background:'#EFF6FF',border:'1px solid #BFDBFE',borderRadius:'12px',padding:'18px'}}>
          <div style={{fontWeight:'700',color:'#1D4ED8',fontSize:'14px',marginBottom:'14px'}}>New Payment Record</div>
          {formError&&<div style={{background:'#FEF2F2',border:'1px solid #FECACA',borderRadius:'8px',padding:'10px 12px',fontSize:'12px',color:'#991B1B',marginBottom:'12px'}}>{formError}</div>}
          <PayForm form={form} setForm={setForm} onSave={handleAdd} onCancel={()=>setShowAdd(false)} saveLabel="Create Payment"/>
        </div>
      )}

      {/* Empty state */}
      {filtered.length===0&&<div style={{background:'white',border:'2px dashed #E2E8F0',borderRadius:'12px',padding:'40px',textAlign:'center'}}><div style={{fontSize:'32px',marginBottom:'8px'}}>💳</div><p style={{color:'#64748B',fontWeight:'500',margin:0}}>{payments.length===0?'No payments tracked yet.':'No payments match your filters.'}</p>{canManage&&payments.length===0&&<p style={{color:'#94A3B8',fontSize:'13px',margin:'6px 0 0'}}>Click "+ Add Payment" to start tracking outgoing payments.</p>}</div>}

      {/* Payment cards */}
      <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
        {filtered.map(p=>{
          const ps=PAY_STATUSES[p.status]||PAY_STATUSES.draft;
          const sc=srcColor[p.fundingSource]||srcColor.primary;
          const isExpanded=expandedId===p.id;
          const isEditing=editId===p.id;
          const isStatusEdit=statusEditId===p.id;
          const curStep=PAY_STATUSES[p.status]?.step||0;
          const crs=p.coeReimbursement?COE_REIMB_STATUSES[p.coeReimbursement]:null;

          if(isEditing) return(
            <div key={p.id} style={{background:'#EFF6FF',border:'2px solid #BFDBFE',borderRadius:'12px',padding:'18px'}}>
              <div style={{fontWeight:'700',color:'#1D4ED8',fontSize:'14px',marginBottom:'14px'}}>Editing: {p.recipient}</div>
              {formError&&<div style={{background:'#FEF2F2',border:'1px solid #FECACA',borderRadius:'8px',padding:'10px 12px',fontSize:'12px',color:'#991B1B',marginBottom:'12px'}}>{formError}</div>}
              <PayForm form={form} setForm={setForm} onSave={handleUpdate} onCancel={()=>setEditId(null)} saveLabel="Save Changes"/>
            </div>
          );

          return(
            <div key={p.id} style={{background:'white',borderRadius:'12px',border:'1px solid #E2E8F0',overflow:'hidden'}}>
              {/* Card header */}
              <div style={{display:'flex',alignItems:'flex-start',gap:'14px',padding:'14px 16px',cursor:'pointer'}} onClick={()=>setExpandedId(isExpanded?null:p.id)}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap',marginBottom:'5px'}}>
                    <span style={{fontWeight:'700',color:'#1E293B',fontSize:'14px'}}>{p.recipient}</span>
                    <span style={{padding:'2px 7px',borderRadius:'20px',fontSize:'11px',fontWeight:'700',background:'#F3F4F6',color:'#374151'}}>{p.recipientType}</span>
                    <span style={{padding:'2px 7px',borderRadius:'20px',fontSize:'11px',fontWeight:'700',background:'#F3F4F6',color:'#374151'}}>{p.paymentType}</span>
                    <span style={{padding:'2px 7px',borderRadius:'20px',fontSize:'11px',fontWeight:'700',background:sc.bg,color:sc.c}}>{srcLabel[p.fundingSource]||p.fundingSource}</span>
                    <span style={{fontSize:'11px',color:'#94A3B8'}}>{p.fyYear}</span>
                    {crs&&<span style={{padding:'2px 7px',borderRadius:'20px',fontSize:'11px',fontWeight:'700',background:crs.bg,color:crs.color}}>{crs.label}</span>}
                  </div>
                  <div style={{fontSize:'13px',color:'#475569',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'500px'}}>{p.description}</div>
                  {(p.notes||[]).length>0&&<div style={{fontSize:'11px',color:'#94A3B8',marginTop:'4px'}}>{p.notes.length} note{p.notes.length!==1?'s':''}</div>}
                </div>
                <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:'6px',flexShrink:0}}>
                  <div style={{fontWeight:'700',fontSize:'16px',color:'#1E293B'}}>{fmt(parseFloat(p.amount)||0)}</div>
                  <span style={{padding:'3px 10px',borderRadius:'20px',fontSize:'11px',fontWeight:'700',background:ps.bg,color:ps.color}}>{ps.label}</span>
                  {p.status==='paid'&&p.paidAmount&&p.paidAmount!==p.amount&&<div style={{fontSize:'11px',color:'#059669'}}>Paid: {fmt(parseFloat(p.paidAmount)||0)}</div>}
                </div>
                <div style={{color:'#94A3B8',fontSize:'14px',flexShrink:0,marginTop:'2px'}}>{isExpanded?'▲':'▼'}</div>
              </div>

              {/* Lifecycle bar */}
              <div style={{display:'flex',padding:'0 16px 10px',gap:'4px',alignItems:'center'}}>
                {STATUS_ORDER.map((s,i)=>{
                  const done=i<=curStep;const current=s===p.status;
                  const ps2=PAY_STATUSES[s];
                  return(<React.Fragment key={s}>
                    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'2px'}}>
                      <div style={{width:'10px',height:'10px',borderRadius:'50%',background:done?ps2.color:'#E2E8F0',border:current?`2px solid ${ps2.color}`:'none',transition:'all .2s'}}/>
                      <span style={{fontSize:'9px',color:done?ps2.color:'#CBD5E1',fontWeight:current?'700':'400',whiteSpace:'nowrap'}}>{ps2.label}</span>
                    </div>
                    {i<STATUS_ORDER.length-1&&<div style={{flex:1,height:'2px',background:i<curStep?'#93C5FD':'#E2E8F0',marginBottom:'14px'}}/>}
                  </React.Fragment>);
                })}
              </div>

              {/* Expanded details */}
              {isExpanded&&(
                <div style={{borderTop:'1px solid #F1F5F9',padding:'16px',display:'flex',flexDirection:'column',gap:'14px'}}>
                  {/* Details row */}
                  <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'10px',background:'#F8FAFC',borderRadius:'8px',padding:'12px'}}>
                    {[['Agreement Ref',p.agreementRef||'—'],['Expected Date',p.expectedDate||'—'],['Paid Date',p.paidDate||'—'],['Ledger Txn ID',p.txnId||'—']].map(([l,v])=>(
                      <div key={l}><div style={{fontSize:'10px',color:'#94A3B8',fontWeight:'600',marginBottom:'2px'}}>{l}</div><div style={{fontSize:'12px',fontWeight:'600',color:v==='—'?'#CBD5E1':'#1E293B',fontFamily:l==='Ledger Txn ID'?'monospace':'inherit'}}>{v}</div></div>
                    ))}
                  </div>

                  {/* COE Reimbursement tracker — only for paid, COE-funded payments */}
                  {p.fundingSource==='coe'&&p.status==='paid'&&(
                    <div style={{background:'#FFFBEB',border:'1px solid #FDE68A',borderRadius:'10px',padding:'14px'}}>
                      <div style={{fontWeight:'700',color:'#92400E',fontSize:'12px',marginBottom:'8px',letterSpacing:'0.03em',textTransform:'uppercase'}}>COE Reimbursement Status</div>
                      <div style={{display:'flex',alignItems:'center',gap:'10px',flexWrap:'wrap'}}>
                        <span style={{padding:'4px 12px',borderRadius:'20px',fontSize:'12px',fontWeight:'700',background:crs?crs.bg:COE_REIMB_STATUSES.not_invoiced.bg,color:crs?crs.color:COE_REIMB_STATUSES.not_invoiced.color}}>{crs?crs.label:COE_REIMB_STATUSES.not_invoiced.label}</span>
                        {canManage&&p.coeReimbursement!=='invoiced'&&p.coeReimbursement!=='received'&&<button onClick={()=>handleCoeReimbUpdate(p,'invoiced')} style={{background:'#D97706',color:'white',border:'none',borderRadius:'7px',padding:'6px 12px',fontSize:'12px',fontWeight:'600',cursor:'pointer'}}>Mark Invoiced →</button>}
                        {canManage&&p.coeReimbursement==='invoiced'&&<button onClick={()=>handleCoeReimbUpdate(p,'received')} style={{background:'#059669',color:'white',border:'none',borderRadius:'7px',padding:'6px 12px',fontSize:'12px',fontWeight:'600',cursor:'pointer'}}>Mark Reimbursement Received →</button>}
                        {p.coeInvoicedDate&&<span style={{fontSize:'11px',color:'#92400E'}}>Invoiced {p.coeInvoicedDate}</span>}
                        {p.coeReceivedDate&&<span style={{fontSize:'11px',color:'#059669'}}>Received {p.coeReceivedDate}</span>}
                      </div>
                    </div>
                  )}

                  {/* Status update */}
                  {canManage&&p.status!=='paid'&&(
                    isStatusEdit?(
                      <div style={{background:'#FFFBEB',border:'1px solid #FDE68A',borderRadius:'10px',padding:'14px',display:'flex',flexDirection:'column',gap:'10px'}}>
                        <div style={{fontWeight:'600',color:'#92400E',fontSize:'13px'}}>Update Status</div>
                        <div style={{display:'grid',gridTemplateColumns:'1fr 2fr auto',gap:'8px',alignItems:'flex-end'}}>
                          <div><label style={{display:'block',fontSize:'11px',color:'#64748B',fontWeight:'600',marginBottom:'3px'}}>New Status</label>
                            <select value={statusForm.status} onChange={e=>setStatusForm(f=>({...f,status:e.target.value}))} style={inp}>
                              <option value="">Select status...</option>
                              {STATUS_ORDER.filter(s=>PAY_STATUSES[s].step>curStep).map(s=><option key={s} value={s}>{PAY_STATUSES[s].label}</option>)}
                            </select>
                          </div>
                          <div><label style={{display:'block',fontSize:'11px',color:'#64748B',fontWeight:'600',marginBottom:'3px'}}>Action taken / Note</label><input value={statusForm.note} onChange={e=>setStatusForm(f=>({...f,note:e.target.value}))} placeholder="Describe what was done to advance this payment..." style={inp}/></div>
                          <div style={{display:'flex',gap:'6px'}}>
                            <button onClick={()=>{setStatusEditId(null);setStatusForm({status:'',note:''}); }} style={{border:'1px solid #E2E8F0',background:'white',borderRadius:'7px',padding:'7px 12px',cursor:'pointer',color:'#64748B',fontSize:'12px'}}>Cancel</button>
                            <button onClick={()=>handleStatusUpdate(p)} disabled={!statusForm.status} style={{background:statusForm.status?'#D97706':'#E2E8F0',color:statusForm.status?'white':'#94A3B8',border:'none',borderRadius:'7px',padding:'7px 12px',fontWeight:'600',cursor:statusForm.status?'pointer':'not-allowed',fontSize:'12px'}}>Update</button>
                          </div>
                        </div>
                      </div>
                    ):(<button onClick={()=>{setStatusEditId(p.id);setStatusForm({status:'',note:''}); }} style={{background:'#FFF7ED',border:'1px solid #FED7AA',borderRadius:'8px',padding:'8px 14px',cursor:'pointer',color:'#D97706',fontSize:'12px',fontWeight:'600',alignSelf:'flex-start'}}>Update Status →</button>)
                  )}

                  {/* Status history */}
                  {(p.statusHistory||[]).length>0&&(
                    <div>
                      <div style={{fontSize:'11px',color:'#64748B',fontWeight:'700',letterSpacing:'0.05em',textTransform:'uppercase',marginBottom:'8px'}}>Status History</div>
                      <div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
                        {[...(p.statusHistory||[])].reverse().map((h,i)=>{
                          const hs=PAY_STATUSES[h.status]||PAY_STATUSES.draft;
                          return(<div key={i} style={{display:'flex',gap:'10px',alignItems:'flex-start'}}>
                            <div style={{width:'8px',height:'8px',borderRadius:'50%',background:hs.color,flexShrink:0,marginTop:'4px'}}/>
                            <div style={{flex:1}}>
                              <div style={{display:'flex',gap:'8px',alignItems:'center',flexWrap:'wrap'}}>
                                <span style={{fontWeight:'600',fontSize:'12px',color:hs.color}}>{hs.label}</span>
                                <span style={{fontSize:'11px',color:'#94A3B8'}}>{h.updatedAt} · {h.updatedBy}</span>
                              </div>
                              {h.note&&<div style={{fontSize:'12px',color:'#475569',marginTop:'2px'}}>{h.note}</div>}
                            </div>
                          </div>);
                        })}
                      </div>
                    </div>
                  )}

                  {/* Notes thread */}
                  <div>
                    <div style={{fontSize:'11px',color:'#64748B',fontWeight:'700',letterSpacing:'0.05em',textTransform:'uppercase',marginBottom:'8px'}}>Notes ({(p.notes||[]).length})</div>
                    {(p.notes||[]).length===0&&noteInputId!==p.id&&<p style={{fontSize:'12px',color:'#94A3B8',margin:'0 0 8px'}}>No notes yet.</p>}
                    <div style={{display:'flex',flexDirection:'column',gap:'6px',marginBottom:'8px'}}>
                      {(p.notes||[]).map(n=>(
                        <div key={n.id} style={{display:'flex',gap:'10px',background:'#F8FAFC',borderRadius:'8px',padding:'10px 12px'}}>
                          {n.authorPhoto?<img src={n.authorPhoto} alt="" style={{width:'24px',height:'24px',borderRadius:'50%',flexShrink:0}}/>:<div style={{width:'24px',height:'24px',borderRadius:'50%',background:'#E2E8F0',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'11px',flexShrink:0}}>👤</div>}
                          <div style={{flex:1}}><div style={{fontSize:'11px',color:'#64748B',marginBottom:'3px'}}><strong style={{color:'#334155'}}>{n.author}</strong> · {n.createdAt}</div><div style={{fontSize:'13px',color:'#1E293B'}}>{n.text}</div></div>
                        </div>
                      ))}
                    </div>
                    {noteInputId===p.id?(
                      <div style={{display:'flex',gap:'8px',alignItems:'flex-end'}}>
                        <textarea value={noteText} onChange={e=>setNoteText(e.target.value)} placeholder="Add a note about this payment..." rows={2} style={{...inp,flex:1,resize:'none'}}/>
                        <div style={{display:'flex',flexDirection:'column',gap:'5px'}}>
                          <button onClick={()=>handleAddNote(p)} style={{background:'#1D4ED8',color:'white',border:'none',borderRadius:'7px',padding:'7px 12px',fontSize:'12px',fontWeight:'600',cursor:'pointer'}}>Save</button>
                          <button onClick={()=>{setNoteInputId(null);setNoteText('');}} style={{border:'1px solid #E2E8F0',background:'white',borderRadius:'7px',padding:'7px 12px',fontSize:'12px',cursor:'pointer',color:'#64748B'}}>Cancel</button>
                        </div>
                      </div>
                    ):(
                      <button onClick={()=>{setNoteInputId(p.id);setNoteText('');}} style={{background:'none',border:'1px solid #E2E8F0',borderRadius:'7px',padding:'6px 12px',cursor:'pointer',color:'#64748B',fontSize:'12px'}}>+ Add note</button>
                    )}
                  </div>

                  {/* Card actions */}
                  {canManage&&(
                    <div style={{display:'flex',gap:'8px',paddingTop:'4px',borderTop:'1px solid #F1F5F9'}}>
                      <button onClick={(e)=>{e.stopPropagation();startEdit(p);setExpandedId(null);setFormError('');}} style={{background:'#EFF6FF',border:'1px solid #BFDBFE',borderRadius:'7px',padding:'6px 12px',cursor:'pointer',color:'#1D4ED8',fontSize:'12px',fontWeight:'600'}}>Edit Payment</button>
                      <button onClick={(e)=>{e.stopPropagation();handleDelete(p);}} style={{background:'none',border:'1px solid #FECACA',borderRadius:'7px',padding:'6px 12px',cursor:'pointer',color:'#991B1B',fontSize:'12px'}}>Delete</button>
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Activity Log Tab (Director only) ─────────────────────────────────────────
function LogTab({logs}){
  const [filterAction,setFilterAction]=useState('');
  const [filterUser,setFilterUser]=useState('');
  const [page,setPage]=useState(0);
  const PAGE=50;

  const ACTION_INFO={
    'todo_added':{label:'To-Do Added',color:'#059669',bg:'#D1FAE5'},
    'todo_edited':{label:'To-Do Edited',color:'#1D4ED8',bg:'#DBEAFE'},
    'todo_completed':{label:'To-Do Completed',color:'#059669',bg:'#D1FAE5'},
    'todo_reopened':{label:'To-Do Reopened',color:'#D97706',bg:'#FEF3C7'},
    'todo_deleted':{label:'To-Do Deleted',color:'#DC2626',bg:'#FEE2E2'},
    'event_added':{label:'Event Added',color:'#D97706',bg:'#FEF3C7'},
    'event_edited':{label:'Event Edited',color:'#1D4ED8',bg:'#DBEAFE'},
    'event_deleted':{label:'Event Deleted',color:'#DC2626',bg:'#FEE2E2'},
    'tag_changed':{label:'Tag Updated',color:'#7C3AED',bg:'#EDE9FE'},
    'data_imported':{label:'Data Imported',color:'#374151',bg:'#F3F4F6'},
  };

  const actionTypes=useMemo(()=>[...new Set(logs.map(l=>l.action))].sort(),[logs]);
  const users=useMemo(()=>[...new Set(logs.map(l=>l.userEmail).filter(Boolean))].sort(),[logs]);

  const filtered=useMemo(()=>{
    let r=logs;
    if(filterAction) r=r.filter(l=>l.action===filterAction);
    if(filterUser) r=r.filter(l=>l.userEmail===filterUser);
    return r;
  },[logs,filterAction,filterUser]);

  const pages=Math.ceil(filtered.length/PAGE);
  const shown=filtered.slice(page*PAGE,(page+1)*PAGE);

  function formatTs(ts){
    if(!ts) return '—';
    try{const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+' '+d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});}
    catch(err){return '—';}
  }

  const inp={border:'1px solid #E2E8F0',borderRadius:'8px',padding:'7px 10px',fontSize:'13px'};

  return(
    <div style={{display:'flex',flexDirection:'column',gap:'16px'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'10px'}}>
        <div>
          <h2 style={{fontSize:'16px',fontWeight:'700',color:'#0F172A',margin:0}}>Activity Log</h2>
          <p style={{fontSize:'13px',color:'#64748B',margin:'4px 0 0'}}>{filtered.length.toLocaleString()} entries · Director view only</p>
        </div>
        <div style={{display:'flex',gap:'8px'}}>
          <select value={filterAction} onChange={e=>{setFilterAction(e.target.value);setPage(0);}} style={inp}>
            <option value="">All Action Types</option>
            {actionTypes.map(a=><option key={a} value={a}>{ACTION_INFO[a]?ACTION_INFO[a].label:a}</option>)}
          </select>
          <select value={filterUser} onChange={e=>{setFilterUser(e.target.value);setPage(0);}} style={inp}>
            <option value="">All Users</option>
            {users.map(u=><option key={u} value={u}>{u}</option>)}
          </select>
          {(filterAction||filterUser)&&<button onClick={()=>{setFilterAction('');setFilterUser('');setPage(0);}} style={{...inp,cursor:'pointer',color:'#64748B',background:'white'}}>Clear</button>}
        </div>
      </div>

      {logs.length===0&&(
        <div style={{background:'white',border:'2px dashed #E2E8F0',borderRadius:'12px',padding:'40px',textAlign:'center'}}>
          <div style={{fontSize:'28px',marginBottom:'8px'}}>📋</div>
          <p style={{color:'#64748B',fontWeight:'500',margin:0}}>No activity logged yet.</p>
          <p style={{color:'#94A3B8',fontSize:'13px',margin:'6px 0 0'}}>Actions like adding to-dos, editing events, and tagging transactions will appear here.</p>
        </div>
      )}

      {filtered.length===0&&logs.length>0&&(
        <div style={{background:'white',border:'1px solid #E2E8F0',borderRadius:'12px',padding:'24px',textAlign:'center',color:'#94A3B8'}}>No entries match your filters.</div>
      )}

      {shown.length>0&&(
        <div style={{background:'white',borderRadius:'12px',border:'1px solid #E2E8F0',overflow:'hidden'}}>
          {shown.map((entry,i)=>{
            const ai=ACTION_INFO[entry.action]||{label:entry.action,color:'#64748B',bg:'#F3F4F6'};
            return(
              <div key={entry.id||i} style={{display:'flex',gap:'14px',padding:'14px 18px',borderBottom:i<shown.length-1?'1px solid #F8FAFC':'none',alignItems:'flex-start'}}>
                {entry.userPhoto?
                  <img src={entry.userPhoto} alt="" style={{width:'32px',height:'32px',borderRadius:'50%',flexShrink:0,marginTop:'2px'}}/>:
                  <div style={{width:'32px',height:'32px',borderRadius:'50%',background:'#E2E8F0',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'14px',flexShrink:0,marginTop:'2px'}}>👤</div>
                }
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap',marginBottom:'4px'}}>
                    <span style={{fontWeight:'600',color:'#1E293B',fontSize:'13px'}}>{entry.userName||entry.userEmail||'Unknown'}</span>
                    <span style={{padding:'2px 8px',borderRadius:'20px',fontSize:'11px',fontWeight:'700',background:ai.bg,color:ai.color}}>{ai.label}</span>
                  </div>
                  <div style={{fontSize:'13px',color:'#475569'}}>{entry.description}</div>
                  {entry.details&&Object.keys(entry.details).length>0&&(
                    <div style={{marginTop:'5px',display:'flex',gap:'10px',flexWrap:'wrap'}}>
                      {Object.entries(entry.details).filter(([k])=>!['todoId','eventId'].includes(k)).map(([k,v])=>v&&String(v).length<40?(
                        <span key={k} style={{fontSize:'11px',color:'#94A3B8'}}><span style={{fontWeight:'600'}}>{k}:</span> {String(v)}</span>
                      ):null)}
                    </div>
                  )}
                </div>
                <div style={{fontSize:'11px',color:'#94A3B8',whiteSpace:'nowrap',marginTop:'3px',flexShrink:0}}>{formatTs(entry.timestamp)}</div>
              </div>
            );
          })}
        </div>
      )}

      {pages>1&&(
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <span style={{fontSize:'13px',color:'#64748B'}}>Page {page+1} of {pages}</span>
          <div style={{display:'flex',gap:'8px'}}>
            <button disabled={page===0} onClick={()=>setPage(p=>p-1)} style={{padding:'7px 16px',borderRadius:'8px',border:'1px solid #E2E8F0',background:'white',cursor:page===0?'not-allowed':'pointer',color:page===0?'#CBD5E1':'#334155',fontWeight:'600',fontSize:'13px'}}>Prev</button>
            <button disabled={page>=pages-1} onClick={()=>setPage(p=>p+1)} style={{padding:'7px 16px',borderRadius:'8px',border:'1px solid #E2E8F0',background:'white',cursor:page>=pages-1?'not-allowed':'pointer',color:page>=pages-1?'#CBD5E1':'#334155',fontWeight:'600',fontSize:'13px'}}>Next</button>
          </div>
        </div>
      )}
    </div>
  );
}


const TABS=[
  {id:'overview',  label:'Overview',          icon:'📊'},
  {id:'fiscal',    label:'Fiscal Health',     icon:'📋'},
  {id:'payments',  label:'Partner Payments',  icon:'💳'},
  {id:'dataaudit', label:'Data & Audit',      icon:'📄'},
  {id:'log',       label:'Activity Log',      icon:'📋'},
];


function App(){
  const [user,setUser]=useState(null);
  const [authLoading,setAuthLoading]=useState(true);
  const [userRole,setUserRole]=useState('team_member');
  const [roleLoading,setRoleLoading]=useState(true);
  const [dataLoading,setDataLoading]=useState(true);
  const [showTeamPanel,setShowTeamPanel]=useState(false);
  const [activityLogs,setActivityLogs]=useState([]);
  const [teamMembers,setTeamMembers]=useState([]);

  const [transactions,setTransactions]=useState([]);
  const [txnLoading,setTxnLoading]=useState(true);
  const [enrichments,setEnrichments]=useState({});
  const [auditTags,setAuditTags]=useState({});
  const [todos,setTodos]=useState([]);
  const [amendments,setAmendments]=useState([]);
  const [payments,setPayments]=useState([]);

  const [activeTab,setActiveTab]=useState('overview');
  const [jumpToId,setJumpToId]=useState(null);
  const [dataAuditView,setDataAuditView]=useState('ledger');
  const [showUpload,setShowUpload]=useState(false);
  const enrTimer=useRef(null);

  useEffect(()=>_auth.onAuthStateChanged(u=>{setUser(u);setAuthLoading(false);}),[]);

  useEffect(()=>{
    if(!user){setRoleLoading(false);return;}
    const uRef=_db.collection('users').doc(user.uid);
    return uRef.onSnapshot(async snap=>{
      if(!snap.exists){
        const all=await _db.collection('users').limit(2).get().catch(()=>({empty:false}));
        const role=all.empty?'director':'team_member';
        await uRef.set({email:user.email,displayName:user.displayName||user.email,photoURL:user.photoURL||null,role,createdAt:firebase.firestore.FieldValue.serverTimestamp()}).catch(console.error);
        setUserRole(role);
      }else{setUserRole(snap.data().role||'team_member');}
      setRoleLoading(false);
    });
  },[user]);

  useEffect(()=>{
    if(!user||roleLoading)return;
    let n=0;const done=()=>{if(++n>=5)setDataLoading(false);};
    const subs=[
      _db.collection('transactions').onSnapshot(s=>{setTransactions(s.docs.map(d=>d.data()));setTxnLoading(false);done();},e=>{console.error('Txn:',e);setTxnLoading(false);done();}),
      _col('todos').onSnapshot(s=>{if(!s.exists){FS.todos(INITIAL_TODOS);setTodos(INITIAL_TODOS);}else setTodos(s.data().items||[]);done();}),
      _col('amendments').onSnapshot(s=>{setAmendments(s.exists?s.data().items||[]:[]);done();}),
      _col('auditTags').onSnapshot(s=>{setAuditTags(s.exists?s.data().data||{}:{});done();}),
      _col('enrichments').onSnapshot(s=>{setEnrichments(s.exists?s.data().data||{}:{});done();}),
    ];
    // Payments subscription (independent, doesn't block main load)
    const paymentsSub=_db.collection('payments').onSnapshot(s=>{setPayments(s.docs.map(d=>({...d.data(),id:d.id})));},e=>console.error('Payments:',e));
    return()=>{subs.forEach(u=>u());paymentsSub();};
  },[user,roleLoading]);

  useEffect(()=>{
    if(userRole!=='director')return;
    return _db.collection('activityLog').orderBy('timestamp','desc').limit(500)
      .onSnapshot(s=>setActivityLogs(s.docs.map(d=>({id:d.id,...d.data()}))));
  },[userRole]);

  // Team member directory — powers the "Assign to" dropdown on Overview to-dos.
  // Available to all roles (not gated) since anyone can view assignments.
  useEffect(()=>{
    if(!user)return;
    return _db.collection('users').onSnapshot(s=>{
      setTeamMembers(s.docs.map(d=>({uid:d.id,...d.data()})).sort((a,b)=>(a.displayName||a.email||'').localeCompare(b.displayName||b.email||'')));
    },e=>console.error('Team members:',e));
  },[user]);

  function updTodos(fn){setTodos(p=>{const n=typeof fn==='function'?fn(p):fn;setTimeout(()=>FS.todos(n),0);return n;});}
  function updAmendments(fn){setAmendments(p=>{const n=typeof fn==='function'?fn(p):fn;setTimeout(()=>FS.amendments(n),0);return n;});}
  function updTags(fn){setAuditTags(p=>{const n=typeof fn==='function'?fn(p):fn;setTimeout(()=>FS.tags(n),0);return n;});}
  function updEnrichments(fn){setEnrichments(p=>{const n=typeof fn==='function'?fn(p):fn;if(enrTimer.current)clearTimeout(enrTimer.current);enrTimer.current=setTimeout(()=>FS.enr(n),1500);return n;});}
  async function handleImport(rows,mode){
    const BSIZE=499;
    if(mode==='replace'){const ex=await _db.collection('transactions').get().catch(()=>({docs:[]}));const nIds=new Set(rows.map(r=>r.id));const tDel=ex.docs.filter(d=>!nIds.has(d.id));for(let i=0;i<tDel.length;i+=BSIZE){const b=_db.batch();tDel.slice(i,i+BSIZE).forEach(d=>b.delete(d.ref));await b.commit();}}
    const exist=mode==='incremental'?new Set(transactions.map(t=>t.id)):new Set();
    const toW=mode==='incremental'?rows.filter(r=>!exist.has(r.id)):rows;
    for(let i=0;i<toW.length;i+=BSIZE){const b=_db.batch();toW.slice(i,i+BSIZE).forEach(r=>b.set(_db.collection('transactions').doc(r.id),r));await b.commit();}
    logActivity('data_imported',`Imported ${toW.length} transactions (${mode} mode)`,{count:toW.length,mode});
  }

  function jumpToEnrich(id){
    setActiveTab('dataaudit');
    setDataAuditView('enrichment');
    setJumpToId(id);
  }

  const allowedTabIds=ROLE_TAB_ACCESS[userRole];
  const visibleTabs=allowedTabIds?TABS.filter(t=>allowedTabIds.includes(t.id)):TABS;
  useEffect(()=>{if(visibleTabs.length&&!visibleTabs.find(t=>t.id===activeTab))setActiveTab(visibleTabs[0].id);},[userRole]);

  const untaggedCount=useMemo(()=>transactions.filter(t=>!(auditTags[t.id]&&auditTags[t.id].length>0)).length,[transactions,auditTags]);
  const untaggedLabel=untaggedCount>=1000?(untaggedCount/1000).toFixed(1)+'k':String(untaggedCount);
  const canManage=userRole==='director'||userRole==='admin_support';
  const activeTabInfo=visibleTabs.find(t=>t.id===activeTab)||visibleTabs[0]||TABS[0];

  if(authLoading)return(<div style={{minHeight:'100vh',background:'#1A6B7A',display:'flex',alignItems:'center',justifyContent:'center'}}><div style={{color:'#93C5FD'}}>Loading...</div></div>);
  if(!user)return <LoginPage/>;
  if(roleLoading||dataLoading||txnLoading)return(
    <div style={{minHeight:'100vh',background:'#1A6B7A',display:'flex',alignItems:'center',justifyContent:'center'}}>

              style={{width:'100%',display:'flex',alignItems:'center',gap:'10px',padding:'10px 15px 10px 18px',fontSize:'13px',background:activeTab===tab.id?'rgba(42,171,130,0.18)':'transparent',color:activeTab===tab.id?'white':'rgba(255,255,255,0.65)',border:'none',borderRight:activeTab===tab.id?'3px solid #2AAB82':'3px solid transparent',cursor:'pointer',textAlign:'left',fontWeight:activeTab===tab.id?'700':'400'}}
              onMouseOver={e=>{if(activeTab!==tab.id)e.currentTarget.style.background='rgba(255,255,255,0.08)';}}
              onMouseOut={e=>{if(activeTab!==tab.id)e.currentTarget.style.background='transparent';}}>
              <span style={{fontSize:'14px'}}>{tab.icon}</span>{tab.label}
              {tab.id==='dataaudit'&&untaggedCount>0&&<span style={{marginLeft:'auto',background:'#F59E0B',color:'white',fontSize:'10px',fontWeight:'700',padding:'2px 6px',borderRadius:'20px'}} title={untaggedCount+' untagged transactions'}>{untaggedLabel}</span>}
            </button>
          ))}
        </nav>
        <div style={{padding:'12px 14px',borderTop:'1px solid rgba(255,255,255,0.1)',display:'flex',flexDirection:'column',gap:'6px'}}>
          {canManage&&<button onClick={()=>setShowUpload(true)} style={{display:'flex',alignItems:'center',gap:'8px',background:'rgba(42,171,130,0.15)',border:'1px solid rgba(42,171,130,0.3)',cursor:'pointer',color:'rgba(255,255,255,0.85)',padding:'9px 12px',borderRadius:'8px',fontSize:'12px',fontWeight:'600'}} onMouseOver={e=>e.currentTarget.style.background='rgba(255,255,255,0.18)'} onMouseOut={e=>e.currentTarget.style.background='rgba(255,255,255,0.1)'}>Import Data</button>}
          {canManage&&<button onClick={()=>setShowTeamPanel(true)} style={{display:'flex',alignItems:'center',gap:'8px',background:'rgba(255,255,255,0.06)',border:'none',cursor:'pointer',color:'#93C5FD',padding:'9px 12px',borderRadius:'8px',fontSize:'12px'}} onMouseOver={e=>e.currentTarget.style.background='rgba(255,255,255,0.14)'} onMouseOut={e=>e.currentTarget.style.background='rgba(255,255,255,0.06)'}>Manage Team</button>}
          <div style={{display:'flex',alignItems:'center',gap:'8px',padding:'4px 2px'}}>
            {user.photoURL&&<img src={user.photoURL} alt="" style={{width:'26px',height:'26px',borderRadius:'50%',flexShrink:0}}/>}
            <div style={{flex:1,minWidth:0}}><div style={{fontSize:'11px',fontWeight:'600',color:'#E2E8F0',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user.displayName||user.email}</div><div style={{fontSize:'10px',color:'rgba(147,197,253,0.6)'}}>{ROLES[userRole]||'Team Member'}</div></div>
            <button onClick={()=>_auth.signOut()} style={{background:'none',border:'1px solid rgba(255,255,255,0.15)',borderRadius:'5px',cursor:'pointer',color:'rgba(147,197,253,0.6)',padding:'3px 7px',fontSize:'10px',flexShrink:0}} onMouseOver={e=>{e.currentTarget.style.color='white';e.currentTarget.style.borderColor='rgba(255,255,255,0.4)';}} onMouseOut={e=>{e.currentTarget.style.color='rgba(147,197,253,0.6)';e.currentTarget.style.borderColor='rgba(255,255,255,0.15)';}}>Sign out</button>
          </div>
          <div style={{fontSize:'10px',color:'rgba(147,197,253,0.35)',paddingTop:'2px'}}>{transactions.length.toLocaleString()} txns · live sync 🟢</div>
        </div>
      </div>

      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div style={{background:'white',borderBottom:'1px solid #E2E8F0',padding:'14px 24px',display:'flex',alignItems:'center',gap:'10px'}}>
          <span style={{fontSize:'18px'}}>{activeTabInfo.icon}</span>
          <h1 style={{fontSize:'15px',fontWeight:'700',color:'#1E293B',margin:0}}>{activeTabInfo.label}</h1>
          <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:'10px'}}>
            <span style={{fontSize:'11px',color:'#94A3B8'}}>FY2023-24 through FY2025-26 · Fund 94 · SACS</span>
            {canManage&&<button onClick={()=>setShowUpload(true)} style={{fontSize:'12px',border:'1px solid #E2E8F0',color:'#64748B',padding:'5px 10px',borderRadius:'7px',background:'white',cursor:'pointer',fontWeight:'600'}} onMouseOver={e=>e.currentTarget.style.background='#F8FAFC'} onMouseOut={e=>e.currentTarget.style.background='white'}>Import</button>}
          </div>
        </div>
        <div style={{flex:1,overflowY:'auto',padding:'24px'}}>
          {activeTab==='overview'  &&<OverviewTab    txns={transactions} todos={todos} setTodos={updTodos} auditTags={auditTags} userRole={userRole} payments={payments} teamMembers={teamMembers} currentUid={user.uid}/>}
          {activeTab==='fiscal'    &&<FiscalHealthTab txns={transactions} amendments={amendments} setAmendments={updAmendments}/>}
          {activeTab==='payments'  &&<PartnerPaymentsTab payments={payments} userRole={userRole}/>}
          {activeTab==='dataaudit' &&<DataAuditTab   txns={transactions} enrichments={enrichments} setEnrichments={updEnrichments} auditTags={auditTags} setAuditTags={updTags} jumpToId={jumpToId} clearJump={()=>setJumpToId(null)} initialView={dataAuditView} onViewChange={setDataAuditView} onJumpToEnrich={jumpToEnrich}/>}
          {activeTab==='log'       &&<LogTab logs={activityLogs}/>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
