              {formError&&<div style={{background:'#FEF2F2',border:'1px solid #FECACA',borderRadius:'8px',padding:'10px 12px',fontSize:'12px',color:'#991B1B',marginBottom:'12px'}}>{formError}</div>}
              <PayForm form={form} setForm={setForm} onSave={handleUpdate} onCancel={()=>setEditId(null)} saveLabel="Save Changes" txns={txns} mous={mous} events={eventList} onAddEvent={addEventName}/>
            </div>
            </td></tr>
          );

          return(
            <React.Fragment key={p.id}>
              {/* Dense table row — scannable; click to expand */}
              <tr onClick={()=>setExpandedId(isExpanded?null:p.id)} style={{cursor:'pointer',background:isExpanded?'#F8FAFC':'white',borderLeft:status==='unpaid'?'3px solid #FCA5A5':'3px solid transparent'}}>
                <td style={{padding:'9px 12px',borderBottom:'1px solid #F1F5F9'}}>
                  <div style={{fontWeight:'600',fontSize:'13px',color:'#1E293B'}}>{p.recipient}</div>
                  {p.contactName&&<div style={{fontSize:'11px',color:'#94A3B8'}}>👤 {p.contactName}</div>}
                </td>
                <td style={{padding:'9px 12px',borderBottom:'1px solid #F1F5F9',maxWidth:'240px'}}><div style={{fontSize:'12px',color:'#475569',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.description}</div></td>
                <td style={{padding:'9px 12px',borderBottom:'1px solid #F1F5F9'}}><span style={{padding:'2px 8px',borderRadius:'20px',fontSize:'11px',fontWeight:'700',background:tc.bg,color:tc.c}}>{p.paymentType}</span></td>
                <td style={{padding:'9px 12px',borderBottom:'1px solid #F1F5F9'}}><span style={{padding:'2px 8px',borderRadius:'20px',fontSize:'11px',fontWeight:'700',background:sc.bg,color:sc.c}}>{p.fundingSource==='coe'?'COE':'Primary'}</span></td>
                <td style={{padding:'9px 12px',borderBottom:'1px solid #F1F5F9',fontSize:'11px',color:'#64748B',fontWeight:'600'}}>{p.fyYear}</td>
                <td style={{padding:'9px 12px',borderBottom:'1px solid #F1F5F9',textAlign:'right',fontWeight:'700',fontSize:'13px',color:'#1E293B',whiteSpace:'nowrap'}}>{fmt(parseFloat(p.amount)||0)}</td>
                <td style={{padding:'9px 12px',borderBottom:'1px solid #F1F5F9',whiteSpace:'nowrap'}}>{matchedTxn?<span style={{fontSize:'11px',color:'#047857',fontWeight:'600'}}>✓ {matchedTxn.date}</span>:<span style={{fontSize:'11px',color:'#CBD5E1'}}>—</span>}</td>
                <td style={{padding:'9px 12px',borderBottom:'1px solid #F1F5F9'}}><span style={{padding:'3px 10px',borderRadius:'20px',fontSize:'11px',fontWeight:'700',background:ps.bg,color:ps.color}}>{ps.label}</span></td>
                <td style={{padding:'9px 12px',borderBottom:'1px solid #F1F5F9',color:'#94A3B8',fontSize:'12px',textAlign:'center'}}>{isExpanded?'▲':'▼'}</td>
              </tr>
              {isExpanded&&(
                <tr>
                  <td colSpan={9} style={{padding:0,borderBottom:'1px solid #E2E8F0',background:'#F8FAFC'}}>
                  <div style={{padding:'16px',display:'flex',flexDirection:'column',gap:'14px'}}>
                    {/* Labels row (moved here from the old card header) */}
                    <div style={{display:'flex',alignItems:'center',gap:'7px',flexWrap:'wrap'}}>
                      <span style={{padding:'3px 9px',borderRadius:'20px',fontSize:'11px',fontWeight:'700',background:'#1A6B7A',color:'white'}}>{p.fyYear}</span>
                      <span style={{padding:'3px 9px',borderRadius:'20px',fontSize:'11px',fontWeight:'700',background:'#F3F4F6',color:'#374151'}}>{p.recipientType}</span>
                      {crs&&<span style={{padding:'3px 9px',borderRadius:'20px',fontSize:'11px',fontWeight:'700',background:crs.bg,color:crs.color}}>{crs.label}</span>}
                      {(p.notes||[]).length>0&&<span style={{fontSize:'11px',color:'#1D4ED8',fontWeight:'600'}}>💬 {p.notes.length} note{p.notes.length!==1?'s':''}</span>}
                      {p.mouId&&(()=>{const m=(mous||[]).find(x=>x.id===p.mouId);return m?<span style={{fontSize:'11px',color:'#6D28D9',fontWeight:'600'}}>📝 MOU: {m.partner}</span>:null;})()}
                    </div>
                  <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'10px',background:'#F8FAFC',borderRadius:'8px',padding:'12px'}}>
                    {[['Agreement Ref',p.agreementRef||'—'],['Expected Date',p.expectedDate||'—'],['Paid Date',p.paidDate||'—'],['Ledger Match',matchedTxn?matchedTxn.date+' · '+fmt(matchedTxn.amt):(p.txnId||'—')]].map(([l,v])=>(
                      <div key={l}><div style={{fontSize:'10px',color:'#94A3B8',fontWeight:'600',marginBottom:'2px'}}>{l}</div><div style={{fontSize:'12px',fontWeight:'600',color:v==='—'?'#CBD5E1':'#1E293B'}}>{v}</div></div>
                    ))}
                  </div>
                  {matchedTxn&&<div style={{fontSize:'12px',color:'#475569',background:'#ECFDF5',border:'1px solid #A7F3D0',borderRadius:'8px',padding:'8px 12px'}}><strong style={{color:'#047857'}}>Matched 0110238 transaction:</strong> {matchedTxn.date} · {fmt(matchedTxn.amt)} · {matchedTxn.desc}</div>}

                  {/* COE Reimbursement tracker — only for paid, COE-funded payments */}
                  {p.fundingSource==='coe'&&status==='paid'&&(
                    <div style={{background:'#FFFBEB',border:'1px solid #FDE68A',borderRadius:'10px',padding:'14px'}}>
                      <div style={{fontWeight:'700',color:'#92400E',fontSize:'12px',marginBottom:'8px',letterSpacing:'0.03em',textTransform:'uppercase'}}>COE Reimbursement Status</div>
                      <div style={{display:'flex',alignItems:'center',gap:'10px',flexWrap:'wrap'}}>
                        <span style={{padding:'4px 12px',borderRadius:'20px',fontSize:'12px',fontWeight:'700',background:crs?crs.bg:COE_REIMB_STATUSES.not_invoiced.bg,color:crs?crs.color:COE_REIMB_STATUSES.not_invoiced.color}}>{crs?crs.label:COE_REIMB_STATUSES.not_invoiced.label}</span>
                        {canManage&&p.coeReimbursement!=='invoiced'&&p.coeReimbursement!=='received'&&<button onClick={()=>handleCoeReimbUpdate(p,'invoiced')} style={{background:'#D97706',color:'white',border:'none',borderRadius:'7px',padding:'6px 12px',fontSize:'12px',fontWeight:'600',cursor:'pointer'}}>Mark Invoiced →</button>}
                        {canManage&&p.coeReimbursement==='invoiced'&&<button onClick={()=>handleCoeReimbUpdate(p,'received')} style={{background:'#059669',color:'white',border:'none',borderRadius:'7px',padding:'6px 12px',fontSize:'12px',fontWeight:'600',cursor:'pointer'}}>Mark Reimbursement Received →</button>}
                        {p.coeInvoicedDate&&<span style={{fontSize:'11px',color:'#92400E'}}>Invoiced {p.coeInvoicedDate}</span>}
                        {p.coeReceivedDate&&<span style={{fontSize:'11px',color:'#059669'}}>Received {p.coeReceivedDate}</span>}
                      </div>
                    </div>
                  )}

                  {/* Activity record (kept from lifecycle era + paid/unpaid changes) */}
                  {(p.statusHistory||[]).length>0&&(
                    <div>
                      <div style={{fontSize:'11px',color:'#64748B',fontWeight:'700',letterSpacing:'0.05em',textTransform:'uppercase',marginBottom:'8px'}}>Activity Record</div>
                      <div style={{display:'flex',flexDirection:'column',gap:'6px'}}>
                        {[...(p.statusHistory||[])].reverse().map((h,i)=>{
                          const hs=PAY_STATUSES[normPayStatus(h.status)];
                          const legacyLabel={draft:'Draft',agreement:'Agreement Signed',submitted:'Submitted to AP',processing:'Processing',paid:'Paid',unpaid:'Unpaid'}[h.status]||h.status;
                          return(<div key={i} style={{display:'flex',gap:'10px',alignItems:'flex-start'}}>
                            <div style={{width:'8px',height:'8px',borderRadius:'50%',background:hs.color,flexShrink:0,marginTop:'4px'}}/>
                            <div style={{flex:1}}>
                              <div style={{display:'flex',gap:'8px',alignItems:'center',flexWrap:'wrap'}}>
                                <span style={{fontWeight:'600',fontSize:'12px',color:hs.color}}>{legacyLabel}</span>
                                <span style={{fontSize:'11px',color:'#94A3B8'}}>{h.updatedAt} · {h.updatedBy}</span>
                              </div>
                              {h.note&&<div style={{fontSize:'12px',color:'#475569',marginTop:'2px'}}>{h.note}</div>}
                            </div>
                          </div>);
                        })}
                      </div>
                    </div>
                  )}

                  {/* Notes thread */}
                  <div>
                    <div style={{fontSize:'11px',color:'#64748B',fontWeight:'700',letterSpacing:'0.05em',textTransform:'uppercase',marginBottom:'8px'}}>Notes ({(p.notes||[]).length})</div>
                    {(p.notes||[]).length===0&&noteInputId!==p.id&&<p style={{fontSize:'12px',color:'#94A3B8',margin:'0 0 8px'}}>No notes yet.</p>}
                    <div style={{display:'flex',flexDirection:'column',gap:'6px',marginBottom:'8px'}}>
                      {(p.notes||[]).map(n=>(
                        <div key={n.id} style={{display:'flex',gap:'10px',background:'#F8FAFC',borderRadius:'8px',padding:'10px 12px'}}>
                          {n.authorPhoto?<img src={n.authorPhoto} alt="" style={{width:'24px',height:'24px',borderRadius:'50%',flexShrink:0}}/>:<div style={{width:'24px',height:'24px',borderRadius:'50%',background:'#E2E8F0',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'11px',flexShrink:0}}>👤</div>}
                          <div style={{flex:1}}><div style={{fontSize:'11px',color:'#64748B',marginBottom:'3px'}}><strong style={{color:'#334155'}}>{n.author}</strong> · {n.createdAt}</div><div style={{fontSize:'13px',color:'#1E293B'}}>{n.text}</div></div>
                        </div>
                      ))}
                    </div>
                    {noteInputId===p.id?(
                      <div style={{display:'flex',gap:'8px',alignItems:'flex-end'}}>
                        <textarea value={noteText} onChange={e=>setNoteText(e.target.value)} placeholder="Add a note about this payment..." rows={2} style={{...inp,flex:1,resize:'none'}}/>
                        <div style={{display:'flex',flexDirection:'column',gap:'5px'}}>
                          <button onClick={()=>handleAddNote(p)} style={{background:'#1D4ED8',color:'white',border:'none',borderRadius:'7px',padding:'7px 12px',fontSize:'12px',fontWeight:'600',cursor:'pointer'}}>Save</button>
                          <button onClick={()=>{setNoteInputId(null);setNoteText('');}} style={{border:'1px solid #E2E8F0',background:'white',borderRadius:'7px',padding:'7px 12px',fontSize:'12px',cursor:'pointer',color:'#64748B'}}>Cancel</button>
                        </div>
                      </div>
                    ):(
                      <button onClick={()=>{setNoteInputId(p.id);setNoteText('');}} style={{background:'none',border:'1px solid #E2E8F0',borderRadius:'7px',padding:'6px 12px',cursor:'pointer',color:'#64748B',fontSize:'12px'}}>+ Add note</button>
                    )}
                  </div>

                  {/* Card actions */}
                  {canManage&&(
                    <div style={{display:'flex',gap:'8px',paddingTop:'4px',borderTop:'1px solid #F1F5F9',alignItems:'center'}}>
                      <button onClick={(e)=>{e.stopPropagation();togglePaid(p);}} style={{background:status==='paid'?'#FFF7ED':'#059669',border:status==='paid'?'1px solid #FED7AA':'none',borderRadius:'7px',padding:'6px 14px',cursor:'pointer',color:status==='paid'?'#D97706':'white',fontSize:'12px',fontWeight:'700'}}>{status==='paid'?'Revert to Unpaid':'Mark as Paid'}</button>
                      <button onClick={(e)=>{e.stopPropagation();startEdit(p);setExpandedId(null);setFormError('');}} style={{background:'#EFF6FF',border:'1px solid #BFDBFE',borderRadius:'7px',padding:'6px 12px',cursor:'pointer',color:'#1D4ED8',fontSize:'12px',fontWeight:'600'}}>Edit Payment</button>
                      <button onClick={(e)=>{e.stopPropagation();handleDelete(p);}} style={{background:'none',border:'1px solid #FECACA',borderRadius:'7px',padding:'6px 12px',cursor:'pointer',color:'#991B1B',fontSize:'12px'}}>Delete</button>
                    </div>
                  )}
                  </div>
                  </td>
                </tr>
              )}
            </React.Fragment>
          );
        };
        // Table-header cells for the dense group tables
        const th={padding:'8px 12px',fontSize:'11px',fontWeight:'700',color:'#64748B',textTransform:'uppercase',letterSpacing:'0.04em',textAlign:'left',background:'#F8FAFC',borderBottom:'1px solid #E2E8F0'};
        return(
          <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
            {grouped.map(g=>{
              const collapsed=isCollapsed(g.key);
              const groupTotal=g.items.reduce((s,p)=>s+(parseFloat(p.amount)||0),0);
              const groupUnpaid=g.items.filter(p=>normPayStatus(p.status)!=='paid').length;
              const groupPaid=g.items.length-groupUnpaid;
              const isUnassigned=g.key==='__unassigned__';
              return(
                <div key={g.key} style={{border:'1px solid '+(isUnassigned?'#E2E8F0':'#99F6E4'),borderRadius:'12px',overflow:'hidden'}}>
                  {/* Group header */}
                  <div onClick={()=>toggleGroupCollapse(g.key)} style={{display:'flex',alignItems:'center',gap:'10px',cursor:'pointer',padding:'10px 14px',background:isUnassigned?'#F8FAFC':'#F0FDFA'}}>
                    <span style={{fontSize:'12px',color:'#94A3B8',transform:collapsed?'rotate(-90deg)':'none',transition:'transform .15s'}}>▼</span>
                    <span style={{fontSize:'14px',fontWeight:'700',color:isUnassigned?'#64748B':'#0F766E'}}>{g.label}</span>
                    <span style={{background:isUnassigned?'#E2E8F0':'#CCFBF1',color:isUnassigned?'#475569':'#0F766E',fontSize:'12px',fontWeight:'700',padding:'2px 9px',borderRadius:'20px'}}>{g.items.length}</span>
                    <div style={{display:'flex',gap:'6px'}}>
                      {groupUnpaid>0&&<span style={{background:'#FEE2E2',color:'#B91C1C',fontSize:'11px',fontWeight:'700',padding:'2px 8px',borderRadius:'20px'}}>{groupUnpaid} unpaid</span>}
                      {groupPaid>0&&<span style={{background:'#D1FAE5',color:'#059669',fontSize:'11px',fontWeight:'700',padding:'2px 8px',borderRadius:'20px'}}>{groupPaid} paid</span>}
                    </div>
                    <span style={{marginLeft:'auto',fontSize:'13px',fontWeight:'700',color:'#1E293B'}}>{fmt(groupTotal)}</span>
                  </div>
                  {/* Dense table of payments in this group */}
                  {!collapsed&&(
                    <div style={{overflowX:'auto'}}>
                      <table style={{width:'100%',borderCollapse:'collapse',minWidth:'760px'}}>
                        <thead><tr>
                          <th style={th}>Recipient</th><th style={th}>Purpose</th><th style={th}>Type</th><th style={th}>Source</th><th style={th}>FY</th><th style={{...th,textAlign:'right'}}>Amount</th><th style={th}>Ledger</th><th style={th}>Status</th><th style={{...th,width:'32px'}}></th>
                        </tr></thead>
                        <tbody>{g.items.map(renderCard)}</tbody>
                      </table>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        );
      })()}
    </div>
  );
}



// ── Events Tab ─────────────────────────────────────────────────────────────────
// Persistent events (name, description, date) in the /events collection. These
// are the source of truth for the Partner Payments "Event / Activity" dropdown.
// Payments link to events BY NAME (link-by-name, agreed 2026-07): renaming an
// event here rewrites the event field on every payment currently referencing
// the old name, so the change propagates. Access mirrors Payments/MOUs:
// everyone views, managers create/edit/delete.
// ── Event Form (standalone — MUST be outside EventsTab) ───────────────────────
// Defined inline inside EventsTab, this remounted on every keystroke (parent
// re-renders on each setForm), stealing focus from the name/date inputs. Same
// fix as PayForm: hoist it out and pass form/setForm as props.
function EventForm({form,setForm,onSave,onCancel,saveLabel}){
  const inp={border:'1px solid #E2E8F0',borderRadius:'8px',padding:'7px 10px',fontSize:'13px',width:'100%'};
  return(
    <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:'10px'}}>
        <div><label style={{display:'block',fontSize:'11px',color:'#64748B',fontWeight:'600',marginBottom:'3px'}}>Event Name *</label><input value={form.name} onChange={ev=>setForm(p=>({...p,name:ev.target.value}))} placeholder="e.g. Math CoP Spring 2026" style={inp}/></div>
        <div><label style={{display:'block',fontSize:'11px',color:'#64748B',fontWeight:'600',marginBottom:'3px'}}>Date</label><input type="date" value={form.date} onChange={ev=>setForm(p=>({...p,date:ev.target.value}))} style={inp}/></div>
      </div>
      <div><label style={{display:'block',fontSize:'11px',color:'#64748B',fontWeight:'600',marginBottom:'3px'}}>Description</label><textarea value={form.description} onChange={ev=>setForm(p=>({...p,description:ev.target.value}))} placeholder="What is this event or activity?" rows={2} style={{...inp,resize:'vertical'}}/></div>
      <div style={{display:'flex',gap:'8px',justifyContent:'flex-end'}}>
        <button onClick={onCancel} style={{border:'1px solid #E2E8F0',background:'white',borderRadius:'8px',padding:'8px 16px',cursor:'pointer',color:'#64748B',fontSize:'13px'}}>Cancel</button>
        <button onClick={onSave} style={{background:'#1D4ED8',color:'white',border:'none',borderRadius:'8px',padding:'8px 16px',fontWeight:'600',cursor:'pointer',fontSize:'13px'}}>{saveLabel}</button>
      </div>
    </div>
  );
}

function EventsTab({events,payments,userRole}){
  const canManage=userRole==='director'||userRole==='admin_support';
  const [search,setSearch]=useState('');
  const [sortBy,setSortBy]=useState('name'); // 'name'|'date'
  const [showAdd,setShowAdd]=useState(false);
  const [editId,setEditId]=useState(null);
  const [form,setForm]=useState({name:'',description:'',date:''});
  const [formError,setFormError]=useState('');

  // Count payments per event name (link-by-name) for the "used by" indicator
  const countByName=useMemo(()=>{
    const m={};(payments||[]).forEach(p=>{const n=(p.event||'').trim();if(n)m[n]=(m[n]||0)+1;});
    return m;
  },[payments]);

  // Legacy events: names that exist on payments but have no /events record yet.
  // Surface them so they can be formalized (given a description/date).
  const orphanNames=useMemo(()=>{
    const known=new Set((events||[]).map(e=>(e.name||'').trim()));
    return Object.keys(countByName).filter(n=>!known.has(n)).sort((a,b)=>a.localeCompare(b));
  },[events,countByName]);

  const filtered=useMemo(()=>{
    let r=events;
    if(search){const q=search.toLowerCase();r=r.filter(e=>(e.name||'').toLowerCase().includes(q)||(e.description||'').toLowerCase().includes(q));}
    const byName=(a,b)=>(a.name||'').localeCompare(b.name||'');
    // Date sort: newest first; events without a date sort to the bottom, then by name.
    const byDate=(a,b)=>{const da=a.date||'',db=b.date||'';if(!da&&!db)return byName(a,b);if(!da)return 1;if(!db)return -1;return db.localeCompare(da)||byName(a,b);};
    return[...r].sort(sortBy==='date'?byDate:byName);
  },[events,search,sortBy]);

  async function handleAdd(){
    setFormError('');
    const name=form.name.trim();
    if(!name){setFormError('Event name is required.');return;}
    if((events||[]).some(e=>(e.name||'').trim().toLowerCase()===name.toLowerCase())){setFormError('An event with that name already exists.');return;}
    const u=_auth.currentUser;if(!u){setFormError('You are not signed in.');return;}
    const id='e'+Date.now();const now=new Date().toISOString().slice(0,10);
    try{
      await FS.event(id,{id,name,description:form.description.trim(),date:form.date,createdAt:now,createdBy:u.displayName||u.email,createdByEmail:u.email});
      logActivity('event_created',`Created event: "${name}"`,{date:form.date});
      setShowAdd(false);setForm({name:'',description:'',date:''});
    }catch(err){
      setFormError('Could not save event: '+(err&&err.message?err.message:'unknown error')+'. This is usually a permissions issue — confirm your role in Manage Team.');
    }
  }

  async function handleUpdate(){
    setFormError('');
    const name=form.name.trim();
    if(!name){setFormError('Event name is required.');return;}
    const before=events.find(e=>e.id===editId);
    if(!before){setEditId(null);return;}
    const oldName=(before.name||'').trim();
    // Name collision guard (against OTHER events)
    if((events||[]).some(e=>e.id!==editId&&(e.name||'').trim().toLowerCase()===name.toLowerCase())){setFormError('Another event already uses that name.');return;}
    const affected=oldName&&oldName!==name?(payments||[]).filter(p=>(p.event||'').trim()===oldName):[];
    if(affected.length>0){
      if(!window.confirm(`Renaming "${oldName}" to "${name}" will update the event on ${affected.length} payment${affected.length!==1?'s':''}. Continue?`)) return;
    }
    try{
      await FS.eventUpdate(editId,{name,description:form.description.trim(),date:form.date});
      // Propagate rename to all payments referencing the old name (link-by-name)
      if(affected.length>0){
        for(const p of affected){ await FS.paymentUpdate(p.id,{event:name}); }
        logActivity('event_renamed',`Renamed event "${oldName}" → "${name}" (${affected.length} payment${affected.length!==1?'s':''} updated)`,{count:affected.length});
      }else{
        logActivity('event_updated',`Updated event: "${name}"`,{});
      }
      setEditId(null);
    }catch(err){
      setFormError('Could not save changes: '+(err&&err.message?err.message:'unknown error')+'. This is usually a permissions issue — confirm your role in Manage Team.');
    }
  }

  async function handleDelete(e){
    const count=countByName[(e.name||'').trim()]||0;
    const msg=count>0
      ? `Delete event "${e.name}"? ${count} payment${count!==1?'s':''} reference it — those payments will keep the event name as free text but the event record (description/date) will be gone. Continue?`
      : `Delete event "${e.name}"? This cannot be undone.`;
    if(!window.confirm(msg)) return;
    await FS.eventDelete(e.id);
    logActivity('event_removed',`Deleted event: "${e.name}"`,{id:e.id});
  }

  // Formalize a legacy free-text event name into a real record
  function formalize(name){setShowAdd(true);setEditId(null);setFormError('');setForm({name,description:'',date:''});}
  function startEdit(e){setEditId(e.id);setShowAdd(false);setFormError('');setForm({name:e.name||'',description:e.description||'',date:e.date||''});}

  const inp={border:'1px solid #E2E8F0',borderRadius:'8px',padding:'7px 10px',fontSize:'13px',width:'100%'};

  return(
    <div style={{display:'flex',flexDirection:'column',gap:'16px'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'12px'}}>
        <KpiCard label="Total Events" value={events.length} accent="#64748B"/>
        <KpiCard label="Payments Linked" value={Object.values(countByName).reduce((a,b)=>a+b,0)} sub="across all events" accent="#1A6B7A"/>
        <KpiCard label="Unformalized Names" value={orphanNames.length} sub="on payments, no record yet" accent="#D97706"/>
      </div>

      <div style={{display:'flex',gap:'8px',flexWrap:'wrap',alignItems:'center'}}>
        <input placeholder="Search events..." value={search} onChange={e=>setSearch(e.target.value)} style={{...inp,flex:'2',minWidth:'200px'}}/>
        <select value={sortBy} onChange={e=>setSortBy(e.target.value)} style={{...inp,flex:'1',minWidth:'150px'}} title="Sort events"><option value="name">Sort: Name (A–Z)</option><option value="date">Sort: Date (newest)</option></select>
        {canManage&&<button onClick={()=>{setShowAdd(true);setEditId(null);setFormError('');setForm({name:'',description:'',date:''});}} style={{background:'#1D4ED8',color:'white',border:'none',borderRadius:'8px',padding:'8px 16px',fontSize:'13px',fontWeight:'600',cursor:'pointer',whiteSpace:'nowrap'}}>+ Add Event</button>}
      </div>

      {showAdd&&canManage&&(
        <div style={{background:'#EFF6FF',border:'1px solid #BFDBFE',borderRadius:'12px',padding:'18px'}}>
          <div style={{fontWeight:'700',color:'#1D4ED8',fontSize:'14px',marginBottom:'14px'}}>New Event</div>
          {formError&&<div style={{background:'#FEF2F2',border:'1px solid #FECACA',borderRadius:'8px',padding:'10px 12px',fontSize:'12px',color:'#991B1B',marginBottom:'12px'}}>{formError}</div>}
          <EventForm form={form} setForm={setForm} onSave={handleAdd} onCancel={()=>setShowAdd(false)} saveLabel="Create Event"/>
        </div>
      )}

      {/* Legacy free-text event names that could be formalized */}
      {canManage&&orphanNames.length>0&&(
        <div style={{background:'#FFFBEB',border:'1px solid #FDE68A',borderRadius:'12px',padding:'14px 16px'}}>
          <div style={{fontSize:'12px',fontWeight:'700',color:'#92400E',marginBottom:'8px'}}>Event names used on payments without a record yet</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:'8px'}}>
            {orphanNames.map(n=>(
              <button key={n} onClick={()=>formalize(n)} style={{background:'white',border:'1px solid #FDE68A',borderRadius:'20px',padding:'5px 12px',fontSize:'12px',color:'#92400E',cursor:'pointer',fontWeight:'600'}}>
                {n} <span style={{color:'#B45309'}}>({countByName[n]})</span> <span style={{color:'#059669'}}>+ formalize</span>
              </button>
            ))}
          </div>
        </div>
      )}

      {filtered.length===0&&<div style={{background:'white',border:'2px dashed #E2E8F0',borderRadius:'12px',padding:'40px',textAlign:'center'}}><div style={{fontSize:'32px',marginBottom:'8px'}}>📅</div><p style={{color:'#64748B',fontWeight:'500',margin:0}}>{events.length===0?'No events created yet.':'No events match your search.'}</p>{canManage&&events.length===0&&<p style={{color:'#94A3B8',fontSize:'13px',margin:'6px 0 0'}}>Click "+ Add Event" to create your first event.</p>}</div>}

      {filtered.length>0&&(()=>{
        const th={padding:'8px 12px',fontSize:'11px',fontWeight:'700',color:'#64748B',textTransform:'uppercase',letterSpacing:'0.04em',textAlign:'left',background:'#F8FAFC',borderBottom:'1px solid #E2E8F0'};
        const cell={padding:'9px 12px',borderBottom:'1px solid #F1F5F9',verticalAlign:'top'};
        return(
          <div style={{border:'1px solid #E2E8F0',borderRadius:'12px',overflow:'hidden'}}>
            <div style={{overflowX:'auto'}}>
              <table style={{width:'100%',borderCollapse:'collapse',minWidth:'640px'}}>
                <thead><tr>
                  <th style={th}>Event</th><th style={th}>Date</th><th style={th}>Payments</th><th style={th}>Description</th>{canManage&&<th style={{...th,width:'150px'}}></th>}
                </tr></thead>
                <tbody>
                  {filtered.map(e=>{
                    const isEditing=editId===e.id;
                    const count=countByName[(e.name||'').trim()]||0;
                    if(isEditing) return(
                      <tr key={e.id}><td colSpan={canManage?5:4} style={{padding:0}}>
                        <div style={{background:'#EFF6FF',border:'2px solid #BFDBFE',borderRadius:'12px',padding:'18px',margin:'8px'}}>
                          <div style={{fontWeight:'700',color:'#1D4ED8',fontSize:'14px',marginBottom:'14px'}}>Editing: {e.name}</div>
                          {formError&&<div style={{background:'#FEF2F2',border:'1px solid #FECACA',borderRadius:'8px',padding:'10px 12px',fontSize:'12px',color:'#991B1B',marginBottom:'12px'}}>{formError}</div>}
                          <EventForm form={form} setForm={setForm} onSave={handleUpdate} onCancel={()=>setEditId(null)} saveLabel="Save Changes"/>
                        </div>
                      </td></tr>
                    );
                    return(
                      <tr key={e.id}>
                        <td style={{...cell,fontWeight:'700',color:'#1E293B',fontSize:'13px',whiteSpace:'nowrap'}}>{e.name}</td>
                        <td style={{...cell,whiteSpace:'nowrap'}}>{e.date?<span style={{padding:'2px 9px',borderRadius:'20px',fontSize:'11px',fontWeight:'700',background:'#DBEAFE',color:'#1D4ED8'}}>📅 {e.date}</span>:<span style={{fontSize:'12px',color:'#CBD5E1'}}>—</span>}</td>
                        <td style={{...cell,whiteSpace:'nowrap'}}><span style={{padding:'2px 9px',borderRadius:'20px',fontSize:'11px',fontWeight:'700',background:count>0?'#F0FDFA':'#F1F5F9',color:count>0?'#0F766E':'#94A3B8'}}>{count}</span></td>
                        <td style={{...cell,fontSize:'12px',color:'#475569',lineHeight:'1.4'}}>{e.description||<span style={{color:'#CBD5E1'}}>—</span>}</td>
                        {canManage&&(
                          <td style={{...cell,whiteSpace:'nowrap',textAlign:'right'}}>
                            <button onClick={()=>startEdit(e)} style={{background:'#EFF6FF',border:'1px solid #BFDBFE',borderRadius:'7px',padding:'5px 11px',cursor:'pointer',color:'#1D4ED8',fontSize:'12px',fontWeight:'600',marginRight:'6px'}}>Edit</button>
                            <button onClick={()=>handleDelete(e)} style={{background:'none',border:'1px solid #FECACA',borderRadius:'7px',padding:'5px 11px',cursor:'pointer',color:'#991B1B',fontSize:'12px'}}>Delete</button>
                          </td>
                        )}
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

// ── MOUs Tab ───────────────────────────────────────────────────────────────────
// Records Memorandums of Understanding with partner COEs/districts. One-time
// agreements (no expiration tracking by design). Access mirrors Partner
// Payments: everyone views, Team Members add notes only, managers create/edit/
// delete. Cross-linking: an MOU can point at the Primary Grant Allocation or a
// specific Partner Payment; payments can independently point at an MOU
// (payment.mouId) and show up here via reverse lookup.
const MOU_PARTNER_TYPES=['COE','District','Other'];
const MOU_EMPTY={partner:'',partnerType:'COE',title:'',refNum:'',fyYear:'',amount:'',signedDate:'',docLink:'',linkType:'none',linkedPaymentId:''};
const MOU_TYPE_COLOR={COE:{bg:'#FEF3C7',c:'#92400E'},District:{bg:'#E0F2FE',c:'#0369A1'},Other:{bg:'#F3F4F6',c:'#374151'}};

function MouForm({form,setForm,onSave,onCancel,saveLabel,payments}){
  const inp={border:'1px solid #E2E8F0',borderRadius:'8px',padding:'7px 10px',fontSize:'13px',width:'100%'};
  const payOpts=useMemo(()=>[...(payments||[])].sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||'')),[payments]);
  return(
    <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
      <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr',gap:'10px'}}>
        <div><label style={{display:'block',fontSize:'11px',color:'#64748B',fontWeight:'600',marginBottom:'3px'}}>Partner Organization *</label><input value={form.partner} onChange={e=>setForm(p=>({...p,partner:e.target.value}))} placeholder="e.g. San Joaquin COE, Saddleback Valley USD" style={inp}/></div>
        <div><label style={{display:'block',fontSize:'11px',color:'#64748B',fontWeight:'600',marginBottom:'3px'}}>Partner Type</label><select value={form.partnerType} onChange={e=>setForm(p=>({...p,partnerType:e.target.value}))} style={inp}>{MOU_PARTNER_TYPES.map(t=><option key={t} value={t}>{t}</option>)}</select></div>
        <div><label style={{display:'block',fontSize:'11px',color:'#64748B',fontWeight:'600',marginBottom:'3px'}}>Fiscal Year</label><select value={form.fyYear} onChange={e=>setForm(p=>({...p,fyYear:e.target.value}))} style={inp}>{FY_LIST.map(f=><option key={f} value={f}>{f}</option>)}</select></div>
      </div>
      <div><label style={{display:'block',fontSize:'11px',color:'#64748B',fontWeight:'600',marginBottom:'3px'}}>Title / Purpose *</label><textarea value={form.title} onChange={e=>setForm(p=>({...p,title:e.target.value}))} placeholder="What does this MOU cover?" rows={2} style={{...inp,resize:'none'}}/></div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:'10px'}}>
        <div><label style={{display:'block',fontSize:'11px',color:'#64748B',fontWeight:'600',marginBottom:'3px'}}>Reference #</label><input value={form.refNum} onChange={e=>setForm(p=>({...p,refNum:e.target.value}))} placeholder="MOU #, contract #" style={inp}/></div>
        <div><label style={{display:'block',fontSize:'11px',color:'#64748B',fontWeight:'600',marginBottom:'3px'}}>Amount (optional)</label><input type="number" value={form.amount} onChange={e=>setForm(p=>({...p,amount:e.target.value}))} placeholder="0.00" style={inp}/></div>
        <div><label style={{display:'block',fontSize:'11px',color:'#64748B',fontWeight:'600',marginBottom:'3px'}}>Date Signed</label><input type="date" value={form.signedDate} onChange={e=>setForm(p=>({...p,signedDate:e.target.value}))} style={inp}/></div>
        <div><label style={{display:'block',fontSize:'11px',color:'#64748B',fontWeight:'600',marginBottom:'3px'}}>Document Link</label><input value={form.docLink} onChange={e=>setForm(p=>({...p,docLink:e.target.value}))} placeholder="https:// (Drive/SharePoint)" style={inp}/></div>
      </div>
      {/* Funding cross-link */}
      <div style={{background:'#EFF6FF',border:'1px solid #BFDBFE',borderRadius:'10px',padding:'12px'}}>
        <label style={{display:'block',fontSize:'11px',color:'#1D4ED8',fontWeight:'700',marginBottom:'6px'}}>Linked Funding (optional)</label>
        <div style={{display:'grid',gridTemplateColumns:form.linkType==='payment'?'1fr 2fr':'1fr',gap:'10px'}}>
          <select value={form.linkType} onChange={e=>setForm(p=>({...p,linkType:e.target.value,linkedPaymentId:e.target.value==='payment'?p.linkedPaymentId:''}))} style={inp}>
            <option value="none">Not linked</option>
            <option value="primary">Primary Grant Allocation</option>
            <option value="payment">Specific Partner Payment</option>
          </select>
          {form.linkType==='payment'&&(
            <select value={form.linkedPaymentId} onChange={e=>setForm(p=>({...p,linkedPaymentId:e.target.value}))} style={inp}>
              <option value="">Select a payment...</option>
              {payOpts.map(p=><option key={p.id} value={p.id}>{p.recipient} · {fmt(parseFloat(p.amount)||0)} · {p.fyYear}</option>)}
            </select>
          )}
        </div>
      </div>
      <div style={{display:'flex',gap:'8px',justifyContent:'flex-end',paddingTop:'4px'}}>
        <button onClick={onCancel} style={{border:'1px solid #E2E8F0',background:'white',borderRadius:'8px',padding:'8px 16px',cursor:'pointer',color:'#64748B',fontSize:'13px'}}>Cancel</button>
        <button onClick={onSave} style={{background:'#1D4ED8',color:'white',border:'none',borderRadius:'8px',padding:'8px 16px',fontWeight:'600',cursor:'pointer',fontSize:'13px'}}>{saveLabel}</button>
      </div>
    </div>
  );
}

function MousTab({mous,payments,userRole}){
  const canManage=userRole==='director'||userRole==='admin_support';
  const [search,setSearch]=useState('');
  const [filterType,setFilterType]=useState('');
  const [filterFY,setFilterFY]=useState('');
  const [expandedId,setExpandedId]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [editId,setEditId]=useState(null);
  const [noteInputId,setNoteInputId]=useState(null);
  const [noteText,setNoteText]=useState('');
  const [form,setForm]=useState({...MOU_EMPTY,fyYear:activeGrantFY()});
  const [formError,setFormError]=useState('');

  const filtered=useMemo(()=>{
    let r=mous;
    if(search){const q=search.toLowerCase();r=r.filter(m=>(m.partner||'').toLowerCase().includes(q)||(m.title||'').toLowerCase().includes(q)||(m.refNum||'').toLowerCase().includes(q));}
    if(filterType) r=r.filter(m=>m.partnerType===filterType);
    if(filterFY) r=r.filter(m=>m.fyYear===filterFY);
    return[...r].sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
  },[mous,search,filterType,filterFY]);

  const totalValue=mous.reduce((s,m)=>s+(parseFloat(m.amount)||0),0);
  const linkedCount=mous.filter(m=>m.linkType&&m.linkType!=='none').length;

  async function handleAdd(){
    setFormError('');
    if(!form.partner.trim()||!form.title.trim()){setFormError('Partner organization and title are required.');return;}
    const u=_auth.currentUser;if(!u){setFormError('You are not signed in.');return;}
    const id='m'+Date.now();const now=new Date().toISOString().slice(0,10);
    try{
      await FS.mou(id,{...form,id,amount:parseFloat(form.amount)||0,notes:[],createdAt:now,createdBy:u.displayName||u.email,createdByEmail:u.email});
      logActivity('mou_added',`Added MOU: "${form.title}" with ${form.partner}`,{partnerType:form.partnerType,fy:form.fyYear,linkType:form.linkType});
      setShowAdd(false);setForm({...MOU_EMPTY,fyYear:activeGrantFY()});
    }catch(err){
      setFormError('Could not save MOU: '+(err&&err.message?err.message:'unknown error')+'. This is usually a permissions issue — confirm your role in Manage Team.');
    }
  }
  async function handleUpdate(){
    setFormError('');
    if(!form.partner.trim()||!form.title.trim()){setFormError('Partner organization and title are required.');return;}
    try{
      const before=mous.find(x=>x.id===editId);
      if(before) await saveEventHistory('updated',{...before,eventName:before.title});
      await FS.mouUpdate(editId,{partner:form.partner,partnerType:form.partnerType,title:form.title,refNum:form.refNum,fyYear:form.fyYear,amount:parseFloat(form.amount)||0,signedDate:form.signedDate,docLink:form.docLink,linkType:form.linkType,linkedPaymentId:form.linkType==='payment'?form.linkedPaymentId:''});
      logActivity('mou_edited',`Edited MOU: "${form.title}"`,{id:editId});
      setEditId(null);
    }catch(err){
      setFormError('Could not save changes: '+(err&&err.message?err.message:'unknown error')+'. This is usually a permissions issue — confirm your role in Manage Team.');
    }
  }
  async function handleDelete(m){
    if(!window.confirm(`Delete MOU "${m.title}"? This cannot be undone — a snapshot will be kept in the retention log.`)) return;
    await saveEventHistory('deleted',{...m,eventName:m.title});
    await FS.mouDelete(m.id);
    logActivity('mou_deleted',`Deleted MOU: "${m.title}" (${m.partner})`,{id:m.id});
  }
  async function handleAddNote(m){
    if(!noteText.trim()) return;
    const u=_auth.currentUser;if(!u) return;
    const note={id:'n'+Date.now(),text:noteText.trim(),author:u.displayName||u.email,authorEmail:u.email,authorPhoto:u.photoURL||null,createdAt:new Date().toISOString().slice(0,10)};
    await FS.mouUpdate(m.id,{notes:[...(m.notes||[]),note]});
    logActivity('mou_note',`Added note to MOU "${m.title}"`,{id:m.id});
    setNoteText('');setNoteInputId(null);
  }
  function startEdit(m){setEditId(m.id);setForm({partner:m.partner||'',partnerType:m.partnerType||'COE',title:m.title||'',refNum:m.refNum||'',fyYear:m.fyYear||activeGrantFY(),amount:String(m.amount||''),signedDate:m.signedDate||'',docLink:m.docLink||'',linkType:m.linkType||'none',linkedPaymentId:m.linkedPaymentId||''});}

  const inp={border:'1px solid #E2E8F0',borderRadius:'8px',padding:'7px 10px',fontSize:'13px',width:'100%'};

  return(
    <div style={{display:'flex',flexDirection:'column',gap:'16px'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'12px'}}>
        <KpiCard label="Total MOUs" value={mous.length} sub={linkedCount+' linked to funding'} accent="#64748B"/>
        <KpiCard label="Total Value" value={fmt(totalValue)} sub="where amounts recorded" accent="#1A6B7A"/>
        <KpiCard label="Partners" value={[...new Set(mous.map(m=>m.partner).filter(Boolean))].length} sub="unique organizations" accent="#2AAB82"/>
      </div>

      <div style={{display:'flex',gap:'8px',flexWrap:'wrap',alignItems:'center'}}>
        <input placeholder="Search partner, title, or reference #..." value={search} onChange={e=>setSearch(e.target.value)} style={{...inp,flex:'2',minWidth:'200px'}}/>
        <select value={filterType} onChange={e=>setFilterType(e.target.value)} style={{...inp,flex:1,minWidth:'120px'}}><option value="">All Partner Types</option>{MOU_PARTNER_TYPES.map(t=><option key={t} value={t}>{t}</option>)}</select>
        <select value={filterFY} onChange={e=>setFilterFY(e.target.value)} style={{...inp,flex:1,minWidth:'100px'}}><option value="">All Years</option>{FY_LIST.map(f=><option key={f} value={f}>{f}</option>)}</select>
        {canManage&&<button onClick={()=>{setShowAdd(true);setEditId(null);setFormError('');setForm({...MOU_EMPTY,fyYear:activeGrantFY()});}} style={{background:'#1D4ED8',color:'white',border:'none',borderRadius:'8px',padding:'8px 16px',fontSize:'13px',fontWeight:'600',cursor:'pointer',whiteSpace:'nowrap'}}>+ Add MOU</button>}
      </div>

      {showAdd&&canManage&&(
        <div style={{background:'#EFF6FF',border:'1px solid #BFDBFE',borderRadius:'12px',padding:'18px'}}>
          <div style={{fontWeight:'700',color:'#1D4ED8',fontSize:'14px',marginBottom:'14px'}}>New MOU Record</div>
          {formError&&<div style={{background:'#FEF2F2',border:'1px solid #FECACA',borderRadius:'8px',padding:'10px 12px',fontSize:'12px',color:'#991B1B',marginBottom:'12px'}}>{formError}</div>}
          <MouForm form={form} setForm={setForm} onSave={handleAdd} onCancel={()=>setShowAdd(false)} saveLabel="Create MOU" payments={payments}/>
        </div>
      )}

      {filtered.length===0&&<div style={{background:'white',border:'2px dashed #E2E8F0',borderRadius:'12px',padding:'40px',textAlign:'center'}}><div style={{fontSize:'32px',marginBottom:'8px'}}>📝</div><p style={{color:'#64748B',fontWeight:'500',margin:0}}>{mous.length===0?'No MOUs recorded yet.':'No MOUs match your filters.'}</p>{canManage&&mous.length===0&&<p style={{color:'#94A3B8',fontSize:'13px',margin:'6px 0 0'}}>Click "+ Add MOU" to record your first agreement.</p>}</div>}

      <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
        {filtered.map(m=>{
          const tc=MOU_TYPE_COLOR[m.partnerType]||MOU_TYPE_COLOR.Other;
          const isExpanded=expandedId===m.id;
          const isEditing=editId===m.id;
          const linkedPayment=m.linkType==='payment'&&m.linkedPaymentId?(payments||[]).find(p=>p.id===m.linkedPaymentId):null;
          const referencingPayments=(payments||[]).filter(p=>p.mouId===m.id);

          if(isEditing) return(
            <div key={m.id} style={{background:'#EFF6FF',border:'2px solid #BFDBFE',borderRadius:'12px',padding:'18px'}}>
              <div style={{fontWeight:'700',color:'#1D4ED8',fontSize:'14px',marginBottom:'14px'}}>Editing: {m.title}</div>
              {formError&&<div style={{background:'#FEF2F2',border:'1px solid #FECACA',borderRadius:'8px',padding:'10px 12px',fontSize:'12px',color:'#991B1B',marginBottom:'12px'}}>{formError}</div>}
              <MouForm form={form} setForm={setForm} onSave={handleUpdate} onCancel={()=>setEditId(null)} saveLabel="Save Changes" payments={payments}/>
            </div>
          );

          return(
            <div key={m.id} style={{background:'white',borderRadius:'12px',border:'1px solid #E2E8F0',overflow:'hidden'}}>
              <div style={{display:'flex',alignItems:'flex-start',gap:'14px',padding:'14px 16px',cursor:'pointer'}} onClick={()=>setExpandedId(isExpanded?null:m.id)}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:'7px',flexWrap:'wrap',marginBottom:'6px'}}>
                    <span style={{fontWeight:'700',color:'#1E293B',fontSize:'15px'}}>{m.partner}</span>
                    <span style={{padding:'3px 9px',borderRadius:'20px',fontSize:'11px',fontWeight:'700',background:tc.bg,color:tc.c}}>{m.partnerType}</span>
                    <span style={{padding:'3px 9px',borderRadius:'20px',fontSize:'11px',fontWeight:'700',background:'#1A6B7A',color:'white'}}>{m.fyYear}</span>
                    {m.linkType==='primary'&&<span style={{padding:'3px 9px',borderRadius:'20px',fontSize:'11px',fontWeight:'700',background:'#DBEAFE',color:'#1D4ED8'}}>Primary Allocation</span>}
                    {linkedPayment&&<span style={{padding:'3px 9px',borderRadius:'20px',fontSize:'11px',fontWeight:'700',background:'#EDE9FE',color:'#6D28D9'}}>Linked: {linkedPayment.recipient}</span>}
                  </div>
                  <div style={{fontSize:'13px',color:'#475569',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'520px'}}>{m.title}</div>
                  <div style={{display:'flex',gap:'12px',marginTop:'5px',flexWrap:'wrap'}}>
                    {m.refNum&&<span style={{fontSize:'11px',color:'#94A3B8'}}>Ref: {m.refNum}</span>}
                    {m.signedDate&&<span style={{fontSize:'11px',color:'#047857',fontWeight:'600'}}>✓ Signed {m.signedDate}</span>}
                    {(m.notes||[]).length>0&&<span style={{fontSize:'11px',color:'#1D4ED8',fontWeight:'600'}}>💬 {m.notes.length} note{m.notes.length!==1?'s':''}</span>}
                    {referencingPayments.length>0&&<span style={{fontSize:'11px',color:'#6D28D9',fontWeight:'600'}}>💳 {referencingPayments.length} payment{referencingPayments.length!==1?'s':''} reference this</span>}
                    {m.docLink&&<a href={m.docLink} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()} style={{fontSize:'11px',color:'#1D4ED8',fontWeight:'600',textDecoration:'none'}}>View Document ↗</a>}
                  </div>
                </div>
                <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:'6px',flexShrink:0}}>
                  {(parseFloat(m.amount)||0)>0&&<div style={{fontWeight:'700',fontSize:'16px',color:'#1E293B'}}>{fmt(parseFloat(m.amount)||0)}</div>}
                </div>
                <div style={{color:'#94A3B8',fontSize:'14px',flexShrink:0,marginTop:'2px'}}>{isExpanded?'▲':'▼'}</div>
              </div>

              {isExpanded&&(
                <div style={{borderTop:'1px solid #F1F5F9',padding:'16px',display:'flex',flexDirection:'column',gap:'14px'}}>
                  <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'10px',background:'#F8FAFC',borderRadius:'8px',padding:'12px'}}>
                    {[['Reference #',m.refNum||'—'],['Date Signed',m.signedDate||'—'],['Amount',(parseFloat(m.amount)||0)>0?fmt(parseFloat(m.amount)):'—'],['Linked Funding',m.linkType==='primary'?'Primary Grant Allocation':linkedPayment?('Payment: '+linkedPayment.recipient):'—']].map(([l,v])=>(
                      <div key={l}><div style={{fontSize:'10px',color:'#94A3B8',fontWeight:'600',marginBottom:'2px'}}>{l}</div><div style={{fontSize:'12px',fontWeight:'600',color:v==='—'?'#CBD5E1':'#1E293B'}}>{v}</div></div>
                    ))}
                  </div>
                  {linkedPayment&&<div style={{fontSize:'12px',color:'#475569',background:'#EDE9FE',border:'1px solid #DDD6FE',borderRadius:'8px',padding:'8px 12px'}}><strong style={{color:'#6D28D9'}}>Linked payment:</strong> {linkedPayment.recipient} · {fmt(parseFloat(linkedPayment.amount)||0)} · {linkedPayment.fyYear} · {normPayStatus(linkedPayment.status)==='paid'?'Paid':'Unpaid'}</div>}
                  {referencingPayments.length>0&&(
                    <div style={{fontSize:'12px',color:'#475569',background:'#F8FAFC',border:'1px solid #E2E8F0',borderRadius:'8px',padding:'8px 12px'}}>
                      <strong>Payments referencing this MOU:</strong>
                      {referencingPayments.map(p=><div key={p.id} style={{marginTop:'4px'}}>💳 {p.recipient} · {fmt(parseFloat(p.amount)||0)} · {p.fyYear} · {normPayStatus(p.status)==='paid'?'Paid':'Unpaid'}</div>)}
                    </div>
                  )}

                  <div>
                    <div style={{fontSize:'11px',color:'#64748B',fontWeight:'700',letterSpacing:'0.05em',textTransform:'uppercase',marginBottom:'8px'}}>Notes ({(m.notes||[]).length})</div>
                    {(m.notes||[]).length===0&&noteInputId!==m.id&&<p style={{fontSize:'12px',color:'#94A3B8',margin:'0 0 8px'}}>No notes yet.</p>}
                    <div style={{display:'flex',flexDirection:'column',gap:'6px',marginBottom:'8px'}}>
                      {(m.notes||[]).map(n=>(
                        <div key={n.id} style={{display:'flex',gap:'10px',background:'#F8FAFC',borderRadius:'8px',padding:'10px 12px'}}>
                          {n.authorPhoto?<img src={n.authorPhoto} alt="" style={{width:'24px',height:'24px',borderRadius:'50%',flexShrink:0}}/>:<div style={{width:'24px',height:'24px',borderRadius:'50%',background:'#E2E8F0',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'11px',flexShrink:0}}>👤</div>}
                          <div style={{flex:1}}><div style={{fontSize:'11px',color:'#64748B',marginBottom:'3px'}}><strong style={{color:'#334155'}}>{n.author}</strong> · {n.createdAt}</div><div style={{fontSize:'13px',color:'#1E293B'}}>{n.text}</div></div>
                        </div>
                      ))}
                    </div>
                    {noteInputId===m.id?(
                      <div style={{display:'flex',gap:'8px',alignItems:'flex-end'}}>
                        <textarea value={noteText} onChange={e=>setNoteText(e.target.value)} placeholder="Add a note about this MOU..." rows={2} style={{...inp,flex:1,resize:'none'}}/>
                        <div style={{display:'flex',flexDirection:'column',gap:'5px'}}>
                          <button onClick={()=>handleAddNote(m)} style={{background:'#1D4ED8',color:'white',border:'none',borderRadius:'7px',padding:'7px 12px',fontSize:'12px',fontWeight:'600',cursor:'pointer'}}>Save</button>
                          <button onClick={()=>{setNoteInputId(null);setNoteText('');}} style={{border:'1px solid #E2E8F0',background:'white',borderRadius:'7px',padding:'7px 12px',fontSize:'12px',cursor:'pointer',color:'#64748B'}}>Cancel</button>
                        </div>
                      </div>
                    ):(
                      <button onClick={()=>{setNoteInputId(m.id);setNoteText('');}} style={{background:'none',border:'1px solid #E2E8F0',borderRadius:'7px',padding:'6px 12px',cursor:'pointer',color:'#64748B',fontSize:'12px'}}>+ Add note</button>
                    )}
                  </div>

                  {canManage&&(
                    <div style={{display:'flex',gap:'8px',paddingTop:'4px',borderTop:'1px solid #F1F5F9'}}>
                      <button onClick={(e)=>{e.stopPropagation();startEdit(m);setExpandedId(null);setFormError('');}} style={{background:'#EFF6FF',border:'1px solid #BFDBFE',borderRadius:'7px',padding:'6px 12px',cursor:'pointer',color:'#1D4ED8',fontSize:'12px',fontWeight:'600'}}>Edit MOU</button>
                      <button onClick={(e)=>{e.stopPropagation();handleDelete(m);}} style={{background:'none',border:'1px solid #FECACA',borderRadius:'7px',padding:'6px 12px',cursor:'pointer',color:'#991B1B',fontSize:'12px'}}>Delete</button>
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}


// ── Activity Log Tab (Director only) ─────────────────────────────────────────
function LogTab({logs}){
  const [filterAction,setFilterAction]=useState('');
  const [filterUser,setFilterUser]=useState('');
  const [page,setPage]=useState(0);
  const PAGE=50;

  const ACTION_INFO={
    'todo_added':{label:'To-Do Added',color:'#059669',bg:'#D1FAE5'},
    'todo_edited':{label:'To-Do Edited',color:'#1D4ED8',bg:'#DBEAFE'},
    'todo_completed':{label:'To-Do Completed',color:'#059669',bg:'#D1FAE5'},
    'todo_reopened':{label:'To-Do Reopened',color:'#D97706',bg:'#FEF3C7'},
    'todo_deleted':{label:'To-Do Deleted',color:'#DC2626',bg:'#FEE2E2'},
    'event_added':{label:'Event Added',color:'#D97706',bg:'#FEF3C7'},
    'event_edited':{label:'Event Edited',color:'#1D4ED8',bg:'#DBEAFE'},
    'event_deleted':{label:'Event Deleted',color:'#DC2626',bg:'#FEE2E2'},
    'tag_changed':{label:'Tag Updated',color:'#7C3AED',bg:'#EDE9FE'},
    'data_imported':{label:'Data Imported',color:'#374151',bg:'#F3F4F6'},
    'payment_added':{label:'Payment Added',color:'#059669',bg:'#D1FAE5'},
    'payment_edited':{label:'Payment Edited',color:'#1D4ED8',bg:'#DBEAFE'},
    'payment_deleted':{label:'Payment Deleted',color:'#DC2626',bg:'#FEE2E2'},
    'payment_status':{label:'Payment Status Changed',color:'#D97706',bg:'#FEF3C7'},
    'payment_note':{label:'Payment Note Added',color:'#64748B',bg:'#F1F5F9'},
    'coe_reimb_status':{label:'COE Reimbursement Updated',color:'#92400E',bg:'#FEF3C7'},
    'mou_added':{label:'MOU Added',color:'#059669',bg:'#D1FAE5'},
    'mou_edited':{label:'MOU Edited',color:'#1D4ED8',bg:'#DBEAFE'},
    'mou_deleted':{label:'MOU Deleted',color:'#DC2626',bg:'#FEE2E2'},
    'mou_note':{label:'MOU Note Added',color:'#64748B',bg:'#F1F5F9'},
    'event_created':{label:'Event Created',color:'#059669',bg:'#D1FAE5'},
    'event_updated':{label:'Event Updated',color:'#1D4ED8',bg:'#DBEAFE'},
    'event_removed':{label:'Event Deleted',color:'#DC2626',bg:'#FEE2E2'},
    'event_renamed':{label:'Event Renamed',color:'#D97706',bg:'#FEF3C7'},
  };

  const actionTypes=useMemo(()=>[...new Set(logs.map(l=>l.action))].sort(),[logs]);
  const users=useMemo(()=>[...new Set(logs.map(l=>l.userEmail).filter(Boolean))].sort(),[logs]);

  const filtered=useMemo(()=>{
    let r=logs;
    if(filterAction) r=r.filter(l=>l.action===filterAction);
    if(filterUser) r=r.filter(l=>l.userEmail===filterUser);
    return r;
  },[logs,filterAction,filterUser]);

  const pages=Math.ceil(filtered.length/PAGE);
  const shown=filtered.slice(page*PAGE,(page+1)*PAGE);

  function formatTs(ts){
    if(!ts) return '—';
    try{const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+' '+d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});}
    catch(err){return '—';}
  }

  const inp={border:'1px solid #E2E8F0',borderRadius:'8px',padding:'7px 10px',fontSize:'13px'};

  return(
    <div style={{display:'flex',flexDirection:'column',gap:'16px'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'10px'}}>
        <div>
          <h2 style={{fontSize:'16px',fontWeight:'700',color:'#0F172A',margin:0}}>Activity Log</h2>
          <p style={{fontSize:'13px',color:'#64748B',margin:'4px 0 0'}}>{filtered.length.toLocaleString()} entries · Director view only</p>
        </div>
        <div style={{display:'flex',gap:'8px'}}>
          <select value={filterAction} onChange={e=>{setFilterAction(e.target.value);setPage(0);}} style={inp}>
            <option value="">All Action Types</option>
            {actionTypes.map(a=><option key={a} value={a}>{ACTION_INFO[a]?ACTION_INFO[a].label:a}</option>)}
          </select>
          <select value={filterUser} onChange={e=>{setFilterUser(e.target.value);setPage(0);}} style={inp}>
            <option value="">All Users</option>
            {users.map(u=><option key={u} value={u}>{u}</option>)}
          </select>
          {(filterAction||filterUser)&&<button onClick={()=>{setFilterAction('');setFilterUser('');setPage(0);}} style={{...inp,cursor:'pointer',color:'#64748B',background:'white'}}>Clear</button>}
        </div>
      </div>

      {logs.length===0&&(
        <div style={{background:'white',border:'2px dashed #E2E8F0',borderRadius:'12px',padding:'40px',textAlign:'center'}}>
          <div style={{fontSize:'28px',marginBottom:'8px'}}>📋</div>
          <p style={{color:'#64748B',fontWeight:'500',margin:0}}>No activity logged yet.</p>
          <p style={{color:'#94A3B8',fontSize:'13px',margin:'6px 0 0'}}>Actions like adding to-dos, editing events, and tagging transactions will appear here.</p>
        </div>
      )}

      {filtered.length===0&&logs.length>0&&(
        <div style={{background:'white',border:'1px solid #E2E8F0',borderRadius:'12px',padding:'24px',textAlign:'center',color:'#94A3B8'}}>No entries match your filters.</div>
      )}

      {shown.length>0&&(
        <div style={{background:'white',borderRadius:'12px',border:'1px solid #E2E8F0',overflow:'hidden'}}>
          {shown.map((entry,i)=>{
            const ai=ACTION_INFO[entry.action]||{label:entry.action,color:'#64748B',bg:'#F3F4F6'};
            return(
              <div key={entry.id||i} style={{display:'flex',gap:'14px',padding:'14px 18px',borderBottom:i<shown.length-1?'1px solid #F8FAFC':'none',alignItems:'flex-start'}}>
                {entry.userPhoto?
                  <img src={entry.userPhoto} alt="" style={{width:'32px',height:'32px',borderRadius:'50%',flexShrink:0,marginTop:'2px'}}/>:
                  <div style={{width:'32px',height:'32px',borderRadius:'50%',background:'#E2E8F0',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'14px',flexShrink:0,marginTop:'2px'}}>👤</div>
                }
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap',marginBottom:'4px'}}>
                    <span style={{fontWeight:'600',color:'#1E293B',fontSize:'13px'}}>{entry.userName||entry.userEmail||'Unknown'}</span>
                    <span style={{padding:'2px 8px',borderRadius:'20px',fontSize:'11px',fontWeight:'700',background:ai.bg,color:ai.color}}>{ai.label}</span>
                  </div>
                  <div style={{fontSize:'13px',color:'#475569'}}>{entry.description}</div>
                  {entry.details&&Object.keys(entry.details).length>0&&(
                    <div style={{marginTop:'5px',display:'flex',gap:'10px',flexWrap:'wrap'}}>
                      {Object.entries(entry.details).filter(([k])=>!['todoId','eventId'].includes(k)).map(([k,v])=>v&&String(v).length<40?(
                        <span key={k} style={{fontSize:'11px',color:'#94A3B8'}}><span style={{fontWeight:'600'}}>{k}:</span> {String(v)}</span>
                      ):null)}
                    </div>
                  )}
                </div>
                <div style={{fontSize:'11px',color:'#94A3B8',whiteSpace:'nowrap',marginTop:'3px',flexShrink:0}}>{formatTs(entry.timestamp)}</div>
              </div>
            );
          })}
        </div>
      )}

      {pages>1&&(
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <span style={{fontSize:'13px',color:'#64748B'}}>Page {page+1} of {pages}</span>
          <div style={{display:'flex',gap:'8px'}}>
            <button disabled={page===0} onClick={()=>setPage(p=>p-1)} style={{padding:'7px 16px',borderRadius:'8px',border:'1px solid #E2E8F0',background:'white',cursor:page===0?'not-allowed':'pointer',color:page===0?'#CBD5E1':'#334155',fontWeight:'600',fontSize:'13px'}}>Prev</button>
            <button disabled={page>=pages-1} onClick={()=>setPage(p=>p+1)} style={{padding:'7px 16px',borderRadius:'8px',border:'1px solid #E2E8F0',background:'white',cursor:page>=pages-1?'not-allowed':'pointer',color:page>=pages-1?'#CBD5E1':'#334155',fontWeight:'600',fontSize:'13px'}}>Next</button>
          </div>
        </div>
      )}
    </div>
  );
}


const TABS=[
  {id:'overview',  label:'Overview',          icon:'📊'},
  {id:'fiscal',    label:'Fiscal Health',     icon:'📋'},
  {id:'events',    label:'Events',            icon:'📅'},
  {id:'payments',  label:'Partner Payments',  icon:'💳'},
  {id:'mous',      label:'MOUs',              icon:'📝'},
  {id:'dataaudit', label:'Data & Audit',      icon:'📄'},
  {id:'log',       label:'Activity Log',      icon:'📋'},
];


function App(){
  const [user,setUser]=useState(null);
  const [authLoading,setAuthLoading]=useState(true);
  const [userRole,setUserRole]=useState('team_member');
  const [roleLoading,setRoleLoading]=useState(true);
  const [dataLoading,setDataLoading]=useState(true);
  const [showTeamPanel,setShowTeamPanel]=useState(false);
  const [activityLogs,setActivityLogs]=useState([]);
  const [teamMembers,setTeamMembers]=useState([]);

  const [transactions,setTransactions]=useState([]);
  const [txnLoading,setTxnLoading]=useState(true);
  const [enrichments,setEnrichments]=useState({});
  const [auditTags,setAuditTags]=useState({});
  const [todos,setTodos]=useState([]);
  const [amendments,setAmendments]=useState([]);
  const [accountGuide,setAccountGuide]=useState(DEFAULT_ACCOUNT_GUIDE);
  const [payments,setPayments]=useState([]);
  const [mous,setMous]=useState([]);
  const [events,setEvents]=useState([]);

  const [activeTab,setActiveTab]=useState('overview');
  const [jumpToId,setJumpToId]=useState(null);
  const [dataAuditView,setDataAuditView]=useState('ledger');
  const [fiscalView,setFiscalView]=useState('year');
  const [showUpload,setShowUpload]=useState(false);
  const enrTimer=useRef(null);

  useEffect(()=>_auth.onAuthStateChanged(u=>{setUser(u);setAuthLoading(false);}),[]);

  useEffect(()=>{
    if(!user){setRoleLoading(false);return;}
    const uRef=_db.collection('users').doc(user.uid);
    return uRef.onSnapshot(async snap=>{
      if(!snap.exists){
        const all=await _db.collection('users').limit(2).get().catch(()=>({empty:false}));
        const role=all.empty?'director':'team_member';
        await uRef.set({email:user.email,displayName:user.displayName||user.email,photoURL:user.photoURL||null,role,createdAt:firebase.firestore.FieldValue.serverTimestamp()}).catch(console.error);
        setUserRole(role);
      }else{setUserRole(snap.data().role||'team_member');}
      setRoleLoading(false);
    });
  },[user]);

  useEffect(()=>{
    if(!user||roleLoading)return;
    let n=0;const done=()=>{if(++n>=5)setDataLoading(false);};
    const subs=[
      _db.collection('transactions').onSnapshot(s=>{setTransactions(s.docs.map(d=>d.data()));setTxnLoading(false);done();},e=>{console.error('Txn:',e);setTxnLoading(false);done();}),
      _col('todos').onSnapshot(s=>{if(!s.exists){FS.todos(INITIAL_TODOS);setTodos(INITIAL_TODOS);}else setTodos(s.data().items||[]);done();}),
      _col('amendments').onSnapshot(s=>{setAmendments(s.exists?s.data().items||[]:[]);done();}),
      _col('auditTags').onSnapshot(s=>{
        const raw=s.exists?s.data().data||{}:{};
        // One-time cleanup: remove any retired tags still stored on transactions.
        let changed=false;const clean={};
        Object.entries(raw).forEach(([id,tags])=>{
          const kept=(tags||[]).filter(t=>!RETIRED_TAG_IDS.includes(t));
          if(kept.length!==(tags||[]).length) changed=true;
          if(kept.length) clean[id]=kept;
        });
        setAuditTags(clean);
        if(changed) FS.tags(clean); // persist cleaned map back once
        done();
      }),
      _col('enrichments').onSnapshot(s=>{setEnrichments(s.exists?s.data().data||{}:{});done();}),
    ];
    // Payments subscription (independent, doesn't block main load)
    const paymentsSub=_db.collection('payments').onSnapshot(s=>{setPayments(s.docs.map(d=>({...d.data(),id:d.id})));},e=>console.error('Payments:',e));
    const mousSub=_db.collection('mous').onSnapshot(s=>{setMous(s.docs.map(d=>({...d.data(),id:d.id})));},e=>console.error('MOUs:',e));
    const eventsSub=_db.collection('events').onSnapshot(s=>{setEvents(s.docs.map(d=>({...d.data(),id:d.id})));},e=>console.error('Events:',e));
    const guideSub=_col('accountGuide').onSnapshot(s=>{setAccountGuide(s.exists&&s.data().items?s.data().items:DEFAULT_ACCOUNT_GUIDE);},e=>console.error('Guide:',e));
    return()=>{subs.forEach(u=>u());paymentsSub();mousSub();eventsSub();guideSub();};
  },[user,roleLoading]);

  useEffect(()=>{
    if(userRole!=='director')return;
    return _db.collection('activityLog').orderBy('timestamp','desc').limit(500)
      .onSnapshot(s=>setActivityLogs(s.docs.map(d=>({id:d.id,...d.data()}))));
  },[userRole]);

  // Team member directory — powers the "Assign to" dropdown on Overview to-dos.
  // Available to all roles (not gated) since anyone can view assignments.
  useEffect(()=>{
    if(!user)return;
    return _db.collection('users').onSnapshot(s=>{
      setTeamMembers(s.docs.map(d=>({uid:d.id,...d.data()})).sort((a,b)=>(a.displayName||a.email||'').localeCompare(b.displayName||b.email||'')));
    },e=>console.error('Team members:',e));
  },[user]);

  function updTodos(fn){setTodos(p=>{const n=typeof fn==='function'?fn(p):fn;setTimeout(()=>FS.todos(n),0);return n;});}
  function updAmendments(fn){setAmendments(p=>{const n=typeof fn==='function'?fn(p):fn;setTimeout(()=>FS.amendments(n),0);return n;});}
  function updAccountGuide(items){setAccountGuide(items);FS.accountGuide(items);}
  function updTags(fn){setAuditTags(p=>{const n=typeof fn==='function'?fn(p):fn;setTimeout(()=>FS.tags(n),0);return n;});}
  function updEnrichments(fn){setEnrichments(p=>{const n=typeof fn==='function'?fn(p):fn;if(enrTimer.current)clearTimeout(enrTimer.current);enrTimer.current=setTimeout(()=>FS.enr(n),1500);return n;});}
  async function handleImport(rows,mode){
    const BSIZE=499;
    // Batches aren't atomic across commits, so order matters for failure
    // recovery: WRITE the new dataset first, DELETE orphans last. A mid-import
    // failure then leaves a harmless superset (re-run Replace to finish)
    // instead of a dataset with rows already deleted but not yet rewritten.
    const orphans=mode==='replace'
      ?(await _db.collection('transactions').get().catch(()=>({docs:[]}))).docs.filter(d=>!new Set(rows.map(r=>r.id)).has(d.id))
      :[];
    const exist=mode==='incremental'?new Set(transactions.map(t=>t.id)):new Set();
    const toW=mode==='incremental'?rows.filter(r=>!exist.has(r.id)):rows;
    for(let i=0;i<toW.length;i+=BSIZE){const b=_db.batch();toW.slice(i,i+BSIZE).forEach(r=>b.set(_db.collection('transactions').doc(r.id),r));await b.commit();}
    for(let i=0;i<orphans.length;i+=BSIZE){const b=_db.batch();orphans.slice(i,i+BSIZE).forEach(d=>b.delete(d.ref));await b.commit();}
    logActivity('data_imported',`Imported ${toW.length} transactions (${mode} mode)`,{count:toW.length,mode,orphansRemoved:orphans.length});
  }

  function jumpToEnrich(id){
    setActiveTab('dataaudit');
    setDataAuditView('enrichment');
    setJumpToId(id);
  }
  function jumpToAllocation(){
    setActiveTab('fiscal');
    setFiscalView('allocation');
  }

  const allowedTabIds=ROLE_TAB_ACCESS[userRole];
  const visibleTabs=allowedTabIds?TABS.filter(t=>allowedTabIds.includes(t.id)):TABS;
  useEffect(()=>{if(visibleTabs.length&&!visibleTabs.find(t=>t.id===activeTab))setActiveTab(visibleTabs[0].id);},[userRole]);

  const untaggedCount=useMemo(()=>transactions.filter(t=>!(auditTags[t.id]&&auditTags[t.id].length>0)).length,[transactions,auditTags]);
  // Header range derives from data actually loaded, so it never goes stale
  const fyRangeLabel=useMemo(()=>{
    const fys=[...new Set(transactions.map(t=>t.fy))].filter(f=>/^FY\d\d\/\d\d$/.test(f)).sort();
    if(fys.length===0) return '';
    const expand=f=>`FY20${f.slice(2,4)}-${f.slice(5)}`;
    return fys.length===1?expand(fys[0]):`${expand(fys[0])} through ${expand(fys[fys.length-1])}`;
  },[transactions]);
  const untaggedLabel=untaggedCount>=1000?(untaggedCount/1000).toFixed(1)+'k':String(untaggedCount);
  const canManage=userRole==='director'||userRole==='admin_support';
  const activeTabInfo=visibleTabs.find(t=>t.id===activeTab)||visibleTabs[0]||TABS[0];

  if(authLoading)return(<div style={{minHeight:'100vh',background:'#1A6B7A',display:'flex',alignItems:'center',justifyContent:'center'}}><div style={{color:'#93C5FD'}}>Loading...</div></div>);
  if(!user)return <LoginPage/>;
  if(roleLoading||dataLoading||txnLoading)return(
    <div style={{minHeight:'100vh',background:'#1A6B7A',display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{textAlign:'center'}}><img src="assets/logo.avif" alt="CAL-MSCS" style={{width:'64px',height:'64px',objectFit:'contain',marginBottom:'14px'}}/><div style={{color:'#93C5FD',fontSize:'14px'}}>Loading dashboard...</div><div style={{color:'rgba(147,197,253,0.5)',fontSize:'12px',marginTop:'6px'}}>Syncing from Firestore</div></div>
    </div>
  );

  return(
    <div style={{display:'flex',height:'100vh',background:'#F1F5F9',fontFamily:'system-ui,-apple-system,sans-serif',overflow:'hidden'}}>
      {showUpload&&<UploadModal onClose={()=>setShowUpload(false)} onImport={handleImport} existingCount={transactions.length} existingTxns={transactions}/>}
      {showTeamPanel&&<TeamPanel currentUid={user.uid} currentRole={userRole} onClose={()=>setShowTeamPanel(false)}/>}

      <div style={{width:'220px',flexShrink:0,display:'flex',flexDirection:'column',background:'#1A6B7A'}}>
        <div style={{padding:'14px 14px 12px',borderBottom:'1px solid rgba(255,255,255,0.15)',display:'flex',alignItems:'center',gap:'12px'}}>
          <img src="assets/logo.avif" alt="CAL-MSCS Logo" style={{width:'50px',height:'50px',objectFit:'contain',flexShrink:0}}/>
          <div>
            <div style={{color:'white',fontWeight:'700',fontSize:'12px',lineHeight:'1.4'}}>Financial Dashboard</div>
            <div style={{color:'rgba(255,255,255,0.55)',fontSize:'10px',marginTop:'2px'}}>OCDE · Ledger 94</div>
          </div>
        </div>
        <nav style={{flex:1,padding:'10px 0',overflowY:'auto'}}>
          {visibleTabs.map(tab=>(
            <button key={tab.id} onClick={()=>setActiveTab(tab.id)}
              style={{width:'100%',display:'flex',alignItems:'center',gap:'10px',padding:'10px 15px 10px 18px',fontSize:'13px',background:activeTab===tab.id?'rgba(42,171,130,0.18)':'transparent',color:activeTab===tab.id?'white':'rgba(255,255,255,0.65)',border:'none',borderRight:activeTab===tab.id?'3px solid #2AAB82':'3px solid transparent',cursor:'pointer',textAlign:'left',fontWeight:activeTab===tab.id?'700':'400'}}
              onMouseOver={e=>{if(activeTab!==tab.id)e.currentTarget.style.background='rgba(255,255,255,0.08)';}}
              onMouseOut={e=>{if(activeTab!==tab.id)e.currentTarget.style.background='transparent';}}>
              <span style={{fontSize:'14px'}}>{tab.icon}</span>{tab.label}
              {tab.id==='dataaudit'&&untaggedCount>0&&<span style={{marginLeft:'auto',background:'#F59E0B',color:'white',fontSize:'10px',fontWeight:'700',padding:'2px 6px',borderRadius:'20px'}} title={untaggedCount+' untagged transactions'}>{untaggedLabel}</span>}
            </button>
          ))}
        </nav>
        <div style={{padding:'12px 14px',borderTop:'1px solid rgba(255,255,255,0.1)',display:'flex',flexDirection:'column',gap:'6px'}}>
          {canManage&&<button onClick={()=>setShowUpload(true)} style={{display:'flex',alignItems:'center',gap:'8px',background:'rgba(42,171,130,0.15)',border:'1px solid rgba(42,171,130,0.3)',cursor:'pointer',color:'rgba(255,255,255,0.85)',padding:'9px 12px',borderRadius:'8px',fontSize:'12px',fontWeight:'600'}} onMouseOver={e=>e.currentTarget.style.background='rgba(255,255,255,0.18)'} onMouseOut={e=>e.currentTarget.style.background='rgba(255,255,255,0.1)'}>Import Data</button>}
          {canManage&&<button onClick={()=>setShowTeamPanel(true)} style={{display:'flex',alignItems:'center',gap:'8px',background:'rgba(255,255,255,0.06)',border:'none',cursor:'pointer',color:'#93C5FD',padding:'9px 12px',borderRadius:'8px',fontSize:'12px'}} onMouseOver={e=>e.currentTarget.style.background='rgba(255,255,255,0.14)'} onMouseOut={e=>e.currentTarget.style.background='rgba(255,255,255,0.06)'}>Manage Team</button>}
          <div style={{display:'flex',alignItems:'center',gap:'8px',padding:'4px 2px'}}>
            {user.photoURL&&<img src={user.photoURL} alt="" style={{width:'26px',height:'26px',borderRadius:'50%',flexShrink:0}}/>}
            <div style={{flex:1,minWidth:0}}><div style={{fontSize:'11px',fontWeight:'600',color:'#E2E8F0',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user.displayName||user.email}</div><div style={{fontSize:'10px',color:'rgba(147,197,253,0.6)'}}>{ROLES[userRole]||'Team Member'}</div></div>
            <button onClick={()=>_auth.signOut()} style={{background:'none',border:'1px solid rgba(255,255,255,0.15)',borderRadius:'5px',cursor:'pointer',color:'rgba(147,197,253,0.6)',padding:'3px 7px',fontSize:'10px',flexShrink:0}} onMouseOver={e=>{e.currentTarget.style.color='white';e.currentTarget.style.borderColor='rgba(255,255,255,0.4)';}} onMouseOut={e=>{e.currentTarget.style.color='rgba(147,197,253,0.6)';e.currentTarget.style.borderColor='rgba(255,255,255,0.15)';}}>Sign out</button>
          </div>
          <div style={{fontSize:'10px',color:'rgba(147,197,253,0.35)',paddingTop:'2px'}}>{transactions.length.toLocaleString()} txns · live sync 🟢</div>
        </div>
      </div>

      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div style={{background:'white',borderBottom:'1px solid #E2E8F0',padding:'14px 24px',display:'flex',alignItems:'center',gap:'10px'}}>
          <span style={{fontSize:'18px'}}>{activeTabInfo.icon}</span>
          <h1 style={{fontSize:'15px',fontWeight:'700',color:'#1E293B',margin:0}}>{activeTabInfo.label}</h1>
          <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:'10px'}}>
            <span style={{fontSize:'11px',color:'#94A3B8'}}>{fyRangeLabel?fyRangeLabel+' · ':''}Fund 94 · SACS</span>
            {canManage&&<button onClick={()=>setShowUpload(true)} style={{fontSize:'12px',border:'1px solid #E2E8F0',color:'#64748B',padding:'5px 10px',borderRadius:'7px',background:'white',cursor:'pointer',fontWeight:'600'}} onMouseOver={e=>e.currentTarget.style.background='#F8FAFC'} onMouseOut={e=>e.currentTarget.style.background='white'}>Import</button>}
          </div>
        </div>
        <div style={{flex:1,overflowY:'auto',padding:'24px'}}>
          {activeTab==='overview'  &&<OverviewTab    txns={transactions} todos={todos} setTodos={updTodos} auditTags={auditTags} userRole={userRole} payments={payments} teamMembers={teamMembers} currentUid={user.uid} onJumpToAllocation={jumpToAllocation} accountGuide={accountGuide} setAccountGuide={updAccountGuide}/>}
          {activeTab==='fiscal'    &&<FiscalHealthTab txns={transactions} amendments={amendments} setAmendments={updAmendments} initialView={fiscalView} onViewChange={setFiscalView}/>}
          {activeTab==='payments'  &&<PartnerPaymentsTab payments={payments} userRole={userRole} txns={transactions} mous={mous} events={events}/>}
          {activeTab==='events'    &&<EventsTab events={events} payments={payments} userRole={userRole}/>}
          {activeTab==='mous'      &&<MousTab mous={mous} payments={payments} userRole={userRole}/>}
          {activeTab==='dataaudit' &&<DataAuditTab   txns={transactions} enrichments={enrichments} setEnrichments={updEnrichments} auditTags={auditTags} setAuditTags={updTags} jumpToId={jumpToId} clearJump={()=>setJumpToId(null)} initialView={dataAuditView} onViewChange={setDataAuditView} onJumpToEnrich={jumpToEnrich} userRole={userRole}/>}
          {activeTab==='log'       &&<LogTab logs={activityLogs}/>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
